<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MakanBox</title>
  <link rel="stylesheet" href="../makan-theme.css">
  <script type="importmap">
    {"imports":{"three":"./three.module.min.js"}}
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); }

    /* ── Warm multi-radial background + dot grid overlay ──────────────── */
    body {
      background:
        radial-gradient(ellipse at 42% 34%, rgba(255,130,55,0.26) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 72%, rgba(239,71,111,0.11) 0%, transparent 44%),
        radial-gradient(ellipse at 18% 80%, rgba(255,210,63,0.13) 0%, transparent 38%),
        linear-gradient(160deg, #fff8f2 0%, #fef2e6 50%, #fde5d0 100%);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,107,53,0.10) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    /* ── WebGL canvas ──────────────────────────────────────────────────── */
    #game-scene { position: fixed; inset: 0; z-index: 1; }
    #die-canvas {
      width: 100%; height: 100%; display: block;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* ── Background floating particles (shown in-game) ─────────────────── */
    #bg-particles {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; display: none;
    }
    .bgp {
      position: absolute; opacity: 0.10;
      animation: fe-float var(--d, 7s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    @keyframes fe-float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      30%       { transform: translateY(-20px) rotate(8deg) scale(1.06); }
      65%       { transform: translateY(11px) rotate(-3deg) scale(0.96); }
    }

    /* ── In-game brand badge ────────────────────────────────────────────── */
    #game-badge {
      position: fixed; top: 16px; left: 16px;
      z-index: 50; display: none;
      padding: 7px 14px;
      background: rgba(255,255,255,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,107,53,0.22);
      border-radius: 99px;
      font-size: 13px; font-weight: 800;
      color: var(--makan-brown); letter-spacing: -0.01em;
    }

    /* ── Roll hint pill ─────────────────────────────────────────────────── */
    #roll-hint {
      position: fixed;
      bottom: max(14%, calc(env(safe-area-inset-bottom, 0px) + 76px));
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      font-size: 11px; font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.18em; text-transform: uppercase;
      background: rgba(100,50,15,0.42); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 7px 18px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.14);
      pointer-events: none; white-space: nowrap;
      transition: opacity 0.45s ease;
    }
    #roll-hint.hidden { opacity: 0; }

    /* ── Filters ────────────────────────────────────────────────────────── */
    #filter-wrap { display: none; flex-direction: column; gap: 9px; width: 100%; margin-top: 4px; }
    .filter-row { display: flex; align-items: flex-start; gap: 7px; }
    .flabel {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--makan-text-muted);
      min-width: 46px; padding-top: 5px; flex-shrink: 0; text-align: right;
    }
    .fpills { display: flex; flex-wrap: wrap; gap: 5px; }
    .fpill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 10px; border: none; border-radius: 99px;
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer;
      background: rgba(45,21,6,0.07); color: var(--makan-text-2);
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.15s ease, box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    .fpill:hover  { background: rgba(255,107,53,0.14); transform: scale(1.07); }
    .fpill.active { background: var(--makan-orange); color: #fff;
                    box-shadow: 0 2px 10px rgba(255,107,53,0.38); transform: scale(1.05); }
    .filter-divider { width: 100%; height: 1px; background: rgba(255,107,53,0.12); margin: 2px 0; }
    #filter-count { font-size: 12px; font-weight: 700; color: var(--makan-text-muted); text-align: center; transition: color 0.2s ease; }
    #filter-count.empty { color: var(--makan-coral); }

    /* ── Start / Loading screen ─────────────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #fff4e8 0%, #ffe0c4 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease; overflow: hidden;
    }
    .fe {
      position: absolute; opacity: 0.22;
      animation: fe-float var(--d, 6s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    .start-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 28px; padding: 44px 54px 40px;
      box-shadow: 0 8px 48px rgba(255,107,53,0.16), 0 2px 8px rgba(0,0,0,0.06);
      border: 2px solid rgba(255,107,53,0.14); text-align: center;
    }
    .start-icon {
      font-size: 68px; line-height: 1;
      animation: makan-bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .start-title { font-size: 46px; font-weight: 900; color: var(--makan-orange); letter-spacing: -2px; line-height: 1; margin-top: 2px; }
    .start-rule { width: 44px; height: 4px; background: linear-gradient(90deg, var(--makan-orange), var(--makan-yellow)); border-radius: 2px; margin: 2px 0 4px; }
    .start-sub { font-size: 15px; font-weight: 700; color: var(--makan-text-2); max-width: 230px; line-height: 1.45; }
    #loading-state { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 4px; }
    #loading-text { font-size: 15px; font-weight: 700; color: var(--makan-text-2); }
    #tap-prompt {
      display: none; margin-top: 4px;
      font-size: 18px; font-weight: 900; cursor: pointer;
      padding: 15px 46px;
      background: var(--makan-orange); color: #fff;
      border: none; border-radius: var(--r-full);
      box-shadow: 0 4px 22px rgba(255,107,53,0.42);
      font-family: var(--font);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease, opacity 0.2s ease;
      user-select: none; -webkit-user-select: none;
    }
    #tap-prompt:not(:disabled):hover { transform: scale(1.07); box-shadow: 0 6px 32px rgba(255,107,53,0.52); }
    #tap-prompt:disabled { cursor: not-allowed; }

    /* ── Backdrop ───────────────────────────────────────────────────────── */
    #backdrop {
      position: fixed; inset: 0;
      background: rgba(30,12,4,0.65);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #backdrop.visible { opacity: 1; pointer-events: auto; cursor: pointer; }

    /* ── Reveal overlay ─────────────────────────────────────────────────── */
    #reveal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.22s ease;
    }
    #reveal-overlay.visible { opacity: 1; }
    .reveal-card {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 52px 48px 40px; border-radius: 32px;
      background: #ffffff;
      box-shadow: 0 12px 64px rgba(0,0,0,0.28), 0 4px 20px rgba(0,0,0,0.14);
      text-align: center; min-width: 280px; max-width: 380px;
      animation: rev-pop 0.48s cubic-bezier(0.34,1.56,0.64,1) both;
      overflow: hidden; position: relative; pointer-events: auto;
    }
    .reveal-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: var(--rev-bg, #FF6B35);
    }
    @keyframes rev-pop {
      from { transform: scale(0.55) translateY(18px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    #rev-close {
      position: absolute; top: 12px; right: 12px;
      width: 30px; height: 30px;
      background: rgba(0,0,0,0.07); border: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: rgba(0,0,0,0.38);
      font-family: var(--font);
      transition: background 0.15s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent; z-index: 1;
    }
    #rev-close:hover { background: rgba(0,0,0,0.12); transform: scale(1.1); }
    .reveal-logo {
      width: 110px; height: 110px; border-radius: 50%;
      background: #f5f5f5; object-fit: contain; flex-shrink: 0;
      border: 3px solid var(--rev-bg, #FF6B35);
      box-shadow: 0 0 0 3.5px #ffffff, 0 4px 18px rgba(0,0,0,0.14);
    }
    .reveal-logo-fb {
      width: 110px; height: 110px; border-radius: 50%;
      background: var(--rev-bg, #FF6B35);
      display: none; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 900; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 0 3.5px #ffffff, 0 4px 18px rgba(0,0,0,0.14);
    }
    @keyframes logo-pop-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .reveal-logo.popping, .reveal-logo-fb.popping {
      animation: logo-pop-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .reveal-name { font-size: 28px; font-weight: 900; color: #1a0a00; line-height: 1.25; max-width: 300px; margin-top: 2px; }
    .reveal-venue { font-size: 13px; font-weight: 700; color: #7a4830; background: #f3ece5; border-radius: 99px; padding: 5px 14px; margin-top: -4px; display: none; }
    .reveal-venue:not(:empty) { display: inline-block; }

    /* ── New Boxes button ───────────────────────────────────────────────── */
    #reroll-btn {
      position: fixed;
      bottom: max(24px, calc(env(safe-area-inset-bottom, 0px) + 12px));
      left: 50%; transform: translateX(-50%);
      z-index: 1001; display: none;
      padding: 13px 34px; border: none; border-radius: var(--r-full);
      background: var(--makan-orange); color: #fff;
      font-size: 16px; font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 22px rgba(255,107,53,0.44);
      font-family: var(--font);
      transition: background 0.15s ease, box-shadow 0.15s ease,
        transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    #reroll-btn:hover {
      background: var(--makan-orange-dk);
      box-shadow: 0 6px 30px rgba(255,107,53,0.54);
      transform: translateX(-50%) scale(1.07);
    }

    /* ── Shuffle FAB — bottom-left ──────────────────────────────────────── */
    #refresh-btn {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      left: calc(20px + env(safe-area-inset-left));
      z-index: 20; display: none;
      padding: 12px 18px;
      background: rgba(255,255,255,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,107,53,0.24);
      color: var(--makan-brown); border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s ease;
    }
    #refresh-btn:hover  { background: rgba(255,255,255,0.80); transform: scale(1.08); }
    #refresh-btn:active { transform: scale(0.95); }
    @keyframes refresh-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #refresh-btn.spinning .rf-icon { display: inline-block; animation: refresh-spin 0.5s ease both; }

    /* ── Browse All FAB — bottom-right ──────────────────────────────────── */
    #browse-btn {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      right: calc(20px + env(safe-area-inset-right));
      z-index: 20; display: none;
      padding: 12px 18px;
      background: var(--makan-orange);
      color: #fff; border: none; border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 18px rgba(255,107,53,0.40);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    }
    #browse-btn:hover  { transform: scale(1.08); box-shadow: 0 6px 26px rgba(255,107,53,0.55); }
    #browse-btn:active { transform: scale(0.95); }

    /* ── Browse sheet ────────────────────────────────────────────────────── */
    #browse-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 30; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #browse-backdrop.visible { opacity: 1; pointer-events: auto; }
    #browse-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 31; min-height: 240px; max-height: min(72vh, 640px);
      background: #fff; border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.20);
    }
    #browse-sheet.visible { transform: translateY(0); }
    #browse-sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: #d1d5db; margin: 12px auto 8px; flex-shrink: 0; }
    #browse-sheet-title {
      font-size: 17px; font-weight: 800; color: #1a0a00;
      padding: 0 20px 12px; text-align: center;
      border-bottom: 1px solid #f5ede6; flex-shrink: 0;
    }
    #browse-sheet-title span { font-size: 13px; font-weight: 700; color: #8a6050; }
    #browse-list { overflow-y: auto; flex: 1; padding: 6px 0; -webkit-overflow-scrolling: touch; }
    .browse-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; cursor: pointer;
      transition: background 0.12s ease;
      border-bottom: 1px solid #fdf6f1;
    }
    .browse-item:hover  { background: #fff5ef; }
    .browse-item:active { background: #ffe8d8; }
    .browse-item:last-child { border-bottom: none; }
    .browse-item-logo { width: 44px; height: 44px; border-radius: 50%; object-fit: contain; flex-shrink: 0; background: #f5ede6; }
    .browse-item-logo-fb {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
    }
    .browse-item-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .browse-item-name { font-size: 15px; font-weight: 700; color: #1a0a00; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .browse-item-venue { font-size: 12px; color: #8a6050; font-weight: 600; }
    @keyframes browse-item-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .browse-item--enter {
      animation: browse-item-enter 0.26s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay: calc(var(--i, 0) * 22ms);
    }

    /* ── Peek layer (HTML restaurant logo glimpse during lid opening) ───── */
    #peek-layer { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
    .box-peek {
      position: absolute;
      width: 76px; height: 76px;
      border-radius: 50%;
      overflow: hidden;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.30s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 0 3.5px rgba(255,255,255,0.94), 0 6px 24px rgba(0,0,0,0.28);
      background: #fff;
    }
    .box-peek.visible { transform: translate(-50%, -50%) scale(1); }
    .box-peek img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .peek-fb {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: #fff;
    }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .start-card  { padding: 28px 20px 24px; }
      .start-title { font-size: 38px; }
      .start-icon  { font-size: 56px; }
      .start-sub   { font-size: 14px; max-width: 200px; }
      .reveal-card { padding: 44px 28px 32px; min-width: 0; max-width: 88vw; }
      .reveal-logo, .reveal-logo-fb { width: 88px; height: 88px; }
      .reveal-logo-fb { font-size: 36px; }
      .reveal-name  { font-size: 22px; }
      .reveal-venue { font-size: 12px; padding: 4px 12px; }
      .flabel { min-width: 38px; font-size: 9px; }
      .fpill  { font-size: 11px; padding: 3px 8px; }
    }
  </style>
</head>
<body>

  <!-- ── Start / loading screen ────────────────────────────────────────── -->
  <div id="loading-overlay">
    <span class="fe" style="top:7%;left:5%;font-size:34px;--d:5.4s;--del:0s">🍜</span>
    <span class="fe" style="top:68%;left:3%;font-size:22px;--d:6.9s;--del:1.1s">🥢</span>
    <span class="fe" style="top:14%;right:7%;font-size:40px;--d:4.8s;--del:0.6s">🍔</span>
    <span class="fe" style="top:76%;right:5%;font-size:27px;--d:7.3s;--del:2.0s">🍣</span>
    <span class="fe" style="top:44%;left:2%;font-size:20px;--d:5.8s;--del:1.5s">🧆</span>
    <span class="fe" style="top:36%;right:3%;font-size:32px;--d:6.2s;--del:0.3s">🌮</span>
    <span class="fe" style="bottom:16%;left:11%;font-size:26px;--d:5.1s;--del:2.5s">🍕</span>
    <span class="fe" style="bottom:10%;right:11%;font-size:36px;--d:7.7s;--del:1.8s">🍱</span>

    <div class="start-card">
      <div class="start-icon">🎁</div>
      <h1 class="start-title">MakanBox</h1>
      <div class="start-rule"></div>
      <p class="start-sub">Pick a mystery gift box to reveal your next restaurant!</p>

      <div id="filter-wrap">
        <div class="filter-divider"></div>
        <div class="filter-row">
          <span class="flabel">Dietary</span>
          <div class="fpills">
            <button class="fpill" data-catid="724">🌙 Halal</button>
            <button class="fpill" data-catid="732">🐷 Pork Free</button>
            <button class="fpill" data-catid="735">🥗 Veg</button>
            <button class="fpill" data-catid="728">👦 Kids</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Cuisine</span>
          <div class="fpills">
            <button class="fpill" data-catid="730">🍜 Local</button>
            <button class="fpill" data-catid="720">🥢 Chinese</button>
            <button class="fpill" data-catid="727">🍱 Japanese</button>
            <button class="fpill" data-catid="729">🌶️ Korean</button>
            <button class="fpill" data-catid="737">🍔 Western</button>
            <button class="fpill" data-catid="725">🍛 Indian</button>
            <button class="fpill" data-catid="734">🌿 Thai</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Type</span>
          <div class="fpills">
            <button class="fpill" data-catid="721">🍰 Desserts</button>
            <button class="fpill" data-catid="722">🥤 Drinks</button>
            <button class="fpill" data-catid="719">☕ Café</button>
            <button class="fpill" data-catid="718">🥐 Bakery</button>
            <button class="fpill" data-catid="723">⚡ Fast Food</button>
            <button class="fpill" data-catid="733">🍿 Snack</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Boxes</span>
          <div class="fpills" id="box-count-pills">
            <button class="fpill count-pill" data-count="3">3</button>
            <button class="fpill count-pill active" data-count="6">6</button>
            <button class="fpill count-pill" data-count="9">9</button>
          </div>
        </div>
        <p id="filter-count"></p>
        <div class="filter-divider"></div>
      </div>

      <div id="loading-state">
        <div class="makan-spinner"></div>
        <p id="loading-text">Loading restaurants…</p>
      </div>
      <button id="tap-prompt">Pick a Box! 🎁</button>
    </div>
  </div>

  <!-- ── Three.js game scene ───────────────────────────────────────────── -->
  <div id="game-scene">
    <canvas id="die-canvas"></canvas>
  </div>

  <!-- ── Background particles (in-game only) ──────────────────────────── -->
  <div id="bg-particles">
    <span class="bgp" style="top:5%;left:6%;font-size:30px;--d:8.2s;--del:0s">🎁</span>
    <span class="bgp" style="top:82%;left:4%;font-size:20px;--d:6.8s;--del:1.3s">🎀</span>
    <span class="bgp" style="top:11%;right:5%;font-size:34px;--d:7.4s;--del:0.7s">🎊</span>
    <span class="bgp" style="top:79%;right:6%;font-size:24px;--d:9.1s;--del:2.1s">✨</span>
    <span class="bgp" style="top:46%;left:2%;font-size:18px;--d:6.3s;--del:1.8s">🌟</span>
    <span class="bgp" style="top:58%;right:3%;font-size:22px;--d:7.8s;--del:0.4s">🎉</span>
  </div>

  <!-- ── In-game brand badge ───────────────────────────────────────────── -->
  <div id="game-badge">🎁 MakanBox</div>

  <!-- ── Tap hint ──────────────────────────────────────────────────────── -->
  <div id="roll-hint" class="hidden">🎁 Tap any box to open!</div>

  <!-- ── Backdrop ─────────────────────────────────────────────────────── -->
  <div id="backdrop"></div>

  <!-- ── Reveal ───────────────────────────────────────────────────────── -->
  <div id="reveal-overlay">
    <div class="reveal-card" id="reveal-card">
      <button id="rev-close" aria-label="Close">✕</button>
      <img  class="reveal-logo"    id="rev-logo" src="" alt="" style="display:none">
      <div  class="reveal-logo-fb" id="rev-fb"></div>
      <h2   class="reveal-name"    id="rev-name"></h2>
      <p    class="reveal-venue"   id="rev-venue"></p>
    </div>
  </div>

  <!-- ── Buttons ──────────────────────────────────────────────────────── -->
  <button id="reroll-btn">New Boxes 🎁</button>
  <button id="refresh-btn"><span class="rf-icon">🔀</span> Shuffle</button>
  <button id="browse-btn">📋 Browse All</button>

  <!-- ── Browse sheet ─────────────────────────────────────────────────── -->
  <div id="browse-backdrop"></div>
  <div id="browse-sheet">
    <div id="browse-sheet-handle"></div>
    <div id="browse-sheet-title">Choose a Restaurant <span id="browse-count"></span></div>
    <div id="browse-list"></div>
  </div>

  <!-- ── Peek layer (logo glimpse shown during lid open) ──────────────── -->
  <div id="peek-layer"></div>

  <script src="data.js"></script>
  <script type="module">
  import * as THREE from 'three';

  // ── Filter config ─────────────────────────────────────────────────────
  const FILTER_GROUPS = {
    dietary: [724, 732, 735, 728],
    cuisine: [730, 720, 727, 729, 737, 725, 734],
    type:    [721, 722, 719, 718, 723, 733],
  };

  const PALETTE = [
    { c: '#FF6B35', cd: '#c94e1a' },
    { c: '#EF476F', cd: '#bf2950' },
    { c: '#FFD23F', cd: '#c49500' },
    { c: '#06D6A0', cd: '#04977a' },
    { c: '#9D4EDD', cd: '#6e2faa' },
    { c: '#118AB2', cd: '#0d6484' },
  ];

  let allShops      = [];
  let activeFilters = new Set();
  let boxCount      = 6;
  let gameStarted   = false;

  function getFilteredShops() {
    if (activeFilters.size === 0) return allShops;
    const byGroup = {};
    for (const id of activeFilters) {
      for (const [grp, ids] of Object.entries(FILTER_GROUPS)) {
        if (ids.includes(id)) { (byGroup[grp] = byGroup[grp] || []).push(id); break; }
      }
    }
    return allShops.filter(s =>
      Object.values(byGroup).every(g => g.some(id => s.categories.includes(id)))
    );
  }

  function updateFilterCount() {
    const n   = getFilteredShops().length;
    const el  = document.getElementById('filter-count');
    const btn = document.getElementById('tap-prompt');
    el.textContent = n === 0
      ? 'No restaurants match — try fewer filters'
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
    el.classList.toggle('empty', n === 0);
    btn.disabled      = n === 0;
    btn.style.opacity = n === 0 ? '0.45' : '';
  }

  function initFilters() {
    const wrap = document.getElementById('filter-wrap');
    wrap.style.display = 'flex';
    updateFilterCount();
    wrap.querySelectorAll('.fpill[data-catid]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.catid);
        if (activeFilters.has(id)) { activeFilters.delete(id); btn.classList.remove('active'); }
        else                        { activeFilters.add(id);    btn.classList.add('active'); }
        updateFilterCount();
      });
    });
    wrap.querySelectorAll('.count-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        boxCount = Number(btn.dataset.count);
        wrap.querySelectorAll('.count-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  }

  // ── Audio ─────────────────────────────────────────────────────────────
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playPickSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(280, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.14);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.26);
  }

  // Sparkle tones — plays when the logo peek first appears inside the box
  function playSparkle() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [1046.5, 1318.5, 1568].forEach((f, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = f;
      const g = audioCtx.createGain(); const s = i * 0.06;
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.07, t + s + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + 0.22);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + s); osc.stop(t + s + 0.26);
    });
  }

  function playLand() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.12);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.28, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.25);
  }

  function playChime() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [523.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const g = audioCtx.createGain(); const s = i * 0.09;
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.11, t + s + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + 0.36);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + s); osc.stop(t + s + 0.40);
    });
  }

  // ── Three.js setup ────────────────────────────────────────────────────
  const dieCanvas = document.getElementById('die-canvas');
  const scene     = new THREE.Scene();

  // Camera from above-front: looking down at ~22° so you can see into open box tops
  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 3.6, 8.2);
  camera.lookAt(0, 0.2, 0);

  const renderer = new THREE.WebGLRenderer({ canvas: dieCanvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.toneMapping       = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  let lastOrient = innerWidth >= innerHeight;
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    // Rebuild grid if orientation flips (portrait ↔ landscape)
    if (gameStarted && phase === 'idle') {
      const orient = innerWidth >= innerHeight;
      if (orient !== lastOrient) {
        lastOrient = orient;
        buildBoxes(pickN(getFilteredShops(), boxCount));
      }
    }
  });

  // ── Lighting ──────────────────────────────────────────────────────────
  scene.add(new THREE.HemisphereLight(0xffeedd, 0xffd0a0, 0.9));

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
  keyLight.position.set(5, 9, 5);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.setScalar(2048);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far  = 26;
  keyLight.shadow.camera.left = keyLight.shadow.camera.bottom = -9;
  keyLight.shadow.camera.right = keyLight.shadow.camera.top   =  9;
  keyLight.shadow.radius = 14;
  scene.add(keyLight);

  const rimLight = new THREE.DirectionalLight(0xddeeff, 0.38);
  rimLight.position.set(-5, 2, -5);
  scene.add(rimLight);

  const fillLight = new THREE.PointLight(0xffcc88, 0.55, 22);
  fillLight.position.set(0, -1.5, 6);
  scene.add(fillLight);

  // Warm uplight for dramatic reveal moment
  const glowLight = new THREE.PointLight(0xff9944, 0.30, 14);
  glowLight.position.set(0, -3.5, 0);
  scene.add(glowLight);

  // ── Shadow floor — well below all boxes ──────────────────────────────
  // Boxes sit at y = ±1.1 (centre). Box bottom = y − BODY_H/2 = −1.1 − 0.46 = −1.56.
  // Floor at −2.2 is safely below, so no box appears to sink into it.
  const floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.ShadowMaterial({ opacity: 0.07 })
  );
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = -2.2;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);

  // ── Box constants ─────────────────────────────────────────────────────
  const BODY_W = 1.25, BODY_H = 0.92, BODY_D = 1.25, LID_H = 0.28;
  const LID_REST_Y = BODY_H / 2 + LID_H / 2;   // 0.60
  const BOB_OFFSETS = [0, 1.05, 2.10, 0.55, 1.60, 2.85, 0.35, 1.75, 0.90];
  const OPEN_DUR = 0.70;

  // ── Ease helper ───────────────────────────────────────────────────────
  function easeOutBack(t) {
    if (t <= 0) return 0; if (t >= 1) return 1;
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  // ── Peek overlay helpers ──────────────────────────────────────────────
  // An HTML div (.box-peek) is positioned at the opened box's screen
  // coordinates and scaled in via CSS transition. This bypasses all WebGL
  // depth-testing issues so the restaurant logo always shows cleanly.

  function createPeekEl(shop, hexColor) {
    removePeekEl();
    const el = document.createElement('div');
    el.className = 'box-peek';
    if (shop.logo) {
      const img = document.createElement('img');
      img.src = shop.logo; img.alt = '';
      img.onerror = () => img.replaceWith(makePeekFb(shop, hexColor));
      el.appendChild(img);
    } else {
      el.appendChild(makePeekFb(shop, hexColor));
    }
    document.getElementById('peek-layer').appendChild(el);
    peekEl = el;
  }

  function makePeekFb(shop, hexColor) {
    const fb = document.createElement('div');
    fb.className = 'peek-fb';
    fb.style.background = hexColor;
    fb.textContent = (shop.title || '?')[0].toUpperCase();
    return fb;
  }

  function showPeekEl() {
    if (peekEl) peekEl.classList.add('visible');
  }

  function removePeekEl() {
    if (!peekEl) return;
    const el = peekEl; peekEl = null;
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 320);
  }

  // Project the opened box's top-opening position to screen and move peekEl there.
  const _peekV = new THREE.Vector3();
  function updatePeekPos() {
    if (!peekEl || openedIdx < 0 || !boxes[openedIdx]) return;
    _peekV.copy(boxes[openedIdx].group.position);
    _peekV.y += BODY_H / 2;   // aim at the box opening
    const ndc = _peekV.clone().project(camera);
    peekEl.style.left = ((ndc.x + 1) / 2 * innerWidth)  + 'px';
    peekEl.style.top  = ((-ndc.y + 1) / 2 * innerHeight) + 'px';
  }

  // ── Responsive grid positions ─────────────────────────────────────────
  // Supports n = 3 / 6 / 9 boxes.  Landscape vs portrait layouts.
  function getBoxPositions(n) {
    const ls = innerWidth >= innerHeight;
    let pts;
    if (n === 3) {
      pts = ls
        ? [[-2.20, 0, 0], [0, 0, 0], [2.20, 0, 0]]
        : [[0, 1.80, 0], [0, 0, 0], [0, -1.80, 0]];
    } else if (n === 9) {
      // Landscape Y spacing = 1.60 → gap 0.40 (lid top 0.74 + body half 0.46 = 1.20 min)
      // Portrait X spacing = 1.40 → gap 0.15 (body half-width 0.625; 1.20 min)
      pts = ls
        ? [[-2.20,1.60,0],[0,1.60,0],[2.20,1.60,0],
           [-2.20,0,0],   [0,0,0],   [2.20,0,0],
           [-2.20,-1.60,0],[0,-1.60,0],[2.20,-1.60,0]]
        : [[-1.40,2.10,0],[0,2.10,0],[1.40,2.10,0],
           [-1.40,0.60,0],[0,0.60,0],[1.40,0.60,0],
           [-1.40,-0.90,0],[0,-0.90,0],[1.40,-0.90,0]];
    } else {
      // default: 6
      pts = ls
        ? [[-2.20,1.05,0],[0,1.05,0],[2.20,1.05,0],
           [-2.20,-1.05,0],[0,-1.05,0],[2.20,-1.05,0]]
        : [[-1.30,1.80,0],[1.30,1.80,0],
           [-1.30,0,0],[1.30,0,0],
           [-1.30,-1.80,0],[1.30,-1.80,0]];
    }
    return pts.map(([x, y, z]) => new THREE.Vector3(x, y, z));
  }

  // ── Gift box factory ──────────────────────────────────────────────────
  // Returns a group containing:
  //   - Outer body shell  (FrontSide — renders exterior)
  //   - Inner liner       (BackSide  — renders interior walls/floor from above)
  //   - Ribbon cross
  //   - Lid group         (animates upward on open)
  //   - Reveal disc       (logo circle, sits atop body under lid, fades in on open)
  function makeGiftBox(hexColor) {
    const group    = new THREE.Group();
    const baseCol  = new THREE.Color(hexColor);
    const lidCol   = baseCol.clone().multiplyScalar(0.78);
    const innerCol = baseCol.clone().multiplyScalar(0.58);  // darker interior

    // Outer shell — FrontSide
    const bodyMat = new THREE.MeshStandardMaterial({
      color: baseCol, roughness: 0.62, metalness: 0.04, transparent: true
    });
    const body = new THREE.Mesh(new THREE.BoxGeometry(BODY_W, BODY_H, BODY_D), bodyMat);
    body.castShadow = body.receiveShadow = true;
    group.add(body);

    // Inner liner — BackSide renders interior from above:
    // · Back and side walls visible when lid is open
    // · Top face is invisible from above (BackSide faces away from top camera)
    // · Floor visible looking straight down
    const innerMat = new THREE.MeshStandardMaterial({
      color: innerCol, roughness: 0.90, metalness: 0.0,
      side: THREE.BackSide, transparent: true
    });
    const inner = new THREE.Mesh(
      new THREE.BoxGeometry(BODY_W - 0.03, BODY_H, BODY_D - 0.03), innerMat
    );
    group.add(inner);

    // Body ribbon cross — two thin slabs
    const bodyRibMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, roughness: 0.22, metalness: 0.12, transparent: true
    });
    const bR1 = new THREE.Mesh(
      new THREE.BoxGeometry(0.10, BODY_H + 0.01, BODY_D + 0.01), bodyRibMat
    );
    const bR2 = new THREE.Mesh(
      new THREE.BoxGeometry(BODY_W + 0.01, BODY_H + 0.01, 0.10), bodyRibMat
    );
    group.add(bR1, bR2);

    // Lid group — animates upward on open
    const lidGroup = new THREE.Group();
    lidGroup.position.y = LID_REST_Y;

    const lidMat = new THREE.MeshStandardMaterial({
      color: lidCol, roughness: 0.62, metalness: 0.04, transparent: true
    });
    const lid = new THREE.Mesh(
      new THREE.BoxGeometry(BODY_W + 0.07, LID_H, BODY_D + 0.07), lidMat
    );
    lid.castShadow = true;
    lidGroup.add(lid);

    const lidRibMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, roughness: 0.22, metalness: 0.12, transparent: true
    });
    const lR1 = new THREE.Mesh(
      new THREE.BoxGeometry(0.10, LID_H + 0.01, BODY_D + 0.09), lidRibMat
    );
    const lR2 = new THREE.Mesh(
      new THREE.BoxGeometry(BODY_W + 0.09, LID_H + 0.01, 0.10), lidRibMat
    );
    lidGroup.add(lR1, lR2);

    // Bow — squashed sphere centred on lid top
    const bow = new THREE.Mesh(new THREE.SphereGeometry(0.14, 14, 10), lidRibMat);
    bow.scale.y = 0.70;
    bow.position.y = LID_H / 2 + 0.08;
    lidGroup.add(bow);

    group.add(lidGroup);

    // Inner glow disc — a colored circle deep inside the box body.
    // Uses depthTest:false so it always renders through the top face from above.
    // Gives a warm glowing interior effect as the lid lifts open.
    // (The actual restaurant logo is shown via the HTML #peek-layer overlay.)
    const glowMat = new THREE.MeshBasicMaterial({
      color: baseCol, transparent: true, opacity: 0,
      depthTest: false, depthWrite: false,
    });
    const glowDisc = new THREE.Mesh(new THREE.CircleGeometry(0.42, 32), glowMat);
    glowDisc.rotation.x = -Math.PI / 2;
    glowDisc.position.y = BODY_H / 2 - 0.10;   // well inside the box
    group.add(glowDisc);

    // Collect materials for bulk opacity control
    const solidMats = [bodyMat, innerMat, bodyRibMat, lidMat, lidRibMat];

    return {
      group, lidGroup,
      bodyMat, innerMat, bodyRibMat, lidMat, lidRibMat,
      glowMat,
      solidMats,   // non-selected boxes: fade these all
    };
  }

  // ── Scene state ───────────────────────────────────────────────────────
  let boxes           = [];
  let currentPositions = [];
  let currentShops    = [];
  let openedIdx       = -1;
  let phase           = 'idle';   // 'idle' | 'opening' | 'done'
  let openTimer       = 0;
  let lastT           = 0;
  let revealShown     = false;
  let peekPlayed      = false;
  let peekEl          = null;

  const raycaster = new THREE.Raycaster();
  const mouse     = new THREE.Vector2(-9999, -9999);
  let   hoveredIdx = -1;

  dieCanvas.addEventListener('mousemove', e => {
    mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  });
  dieCanvas.addEventListener('mouseleave', () => {
    mouse.set(-9999, -9999); hoveredIdx = -1;
    dieCanvas.style.cursor = gameStarted ? 'grab' : 'default';
  });

  // ── Camera orbit ──────────────────────────────────────────────────────
  // The camera orbits around FOCUS at a fixed radius.
  // Drag left/right → rotate azimuth; drag up/down → adjust elevation.
  const FOCUS   = new THREE.Vector3(0, 0.2, 0);
  const ORBIT_R = 8.877;   // matches initial camera distance to FOCUS
  const PHI_MIN = 0.12;    // ≈7°  — camera stays above the table
  const PHI_MAX = 1.05;    // ≈60° — max top-down angle
  let orbitTheta = 0;      // azimuth, rad  (0 = looking from +Z)
  let orbitPhi   = 0.394;  // elevation, rad (≈22.6°, matches initial camera)
  let orbitVelX  = 0;      // inertia: azimuth delta per frame
  let orbitVelY  = 0;      // inertia: elevation delta per frame

  function applyOrbit() {
    camera.position.set(
      FOCUS.x + ORBIT_R * Math.cos(orbitPhi) * Math.sin(orbitTheta),
      FOCUS.y + ORBIT_R * Math.sin(orbitPhi),
      FOCUS.z + ORBIT_R * Math.cos(orbitPhi) * Math.cos(orbitTheta)
    );
    camera.lookAt(FOCUS);
  }

  // ── Pointer drag — orbit on drag, tap on short press ─────────────────
  let ptrDragging = false, ptrMoved = false;
  let ptrSx = 0, ptrSy = 0, ptrLx = 0, ptrLy = 0;

  dieCanvas.addEventListener('pointerdown', e => {
    if (!e.isPrimary) return;
    ptrDragging = true; ptrMoved = false;
    ptrSx = ptrLx = e.clientX;
    ptrSy = ptrLy = e.clientY;
    orbitVelX = orbitVelY = 0;
    dieCanvas.setPointerCapture(e.pointerId);
    if (gameStarted) dieCanvas.style.cursor = 'grabbing';
    initAudio();
  });

  dieCanvas.addEventListener('pointermove', e => {
    if (!ptrDragging || !gameStarted || phase !== 'idle') return;
    const dx = e.clientX - ptrLx;
    const dy = e.clientY - ptrLy;
    ptrLx = e.clientX; ptrLy = e.clientY;
    if (!ptrMoved && Math.hypot(e.clientX - ptrSx, e.clientY - ptrSy) > 8) ptrMoved = true;
    if (!ptrMoved) return;
    orbitTheta -= dx * 0.005;
    orbitPhi    = Math.max(PHI_MIN, Math.min(PHI_MAX, orbitPhi - dy * 0.004));
    // Store for inertia on release
    orbitVelX   = -dx * 0.005;
    orbitVelY   = -dy * 0.004;
    applyOrbit();
  });

  dieCanvas.addEventListener('pointerup', e => {
    if (!ptrDragging || !e.isPrimary) return;
    ptrDragging = false;
    dieCanvas.style.cursor = hoveredIdx >= 0 ? 'pointer' : (gameStarted ? 'grab' : 'default');
    if (!ptrMoved) handleTap(e.clientX, e.clientY);
  });

  dieCanvas.addEventListener('pointercancel', () => {
    ptrDragging = false;
    dieCanvas.style.cursor = gameStarted ? 'grab' : 'default';
  });

  // ── pickN — pick N restaurants from a pool (wraps if pool < N) ─────────
  function pickN(pool, n) {
    if (!pool.length) return [];
    const sh = [...pool].sort(() => Math.random() - 0.5);
    return Array.from({ length: n }, (_, i) => sh[i % sh.length]);
  }

  // ── Build all gift boxes ──────────────────────────────────────────────
  function buildBoxes(shops) {
    const N = boxCount;
    currentShops = Array.from({ length: N }, (_, i) => shops[i % Math.max(1, shops.length)]);

    // Dispose old
    boxes.forEach(b => {
      b.solidMats.forEach(m => { m.map?.dispose(); m.dispose(); });
      b.glowMat.dispose();
      scene.remove(b.group);
    });
    boxes = [];

    currentPositions = getBoxPositions(N);
    const birthTime = performance.now();

    for (let i = 0; i < N; i++) {
      const ci  = i % PALETTE.length;
      const box = makeGiftBox(PALETTE[ci].c);
      box.group.position.copy(currentPositions[i]);
      box.group.rotation.y = (Math.random() - 0.5) * 0.18;
      box.group.rotation.z = (Math.random() - 0.5) * 0.06;
      box.group.scale.setScalar(0);  // start collapsed for entrance animation
      box.solidMats.forEach(m => { m.opacity = 1; });
      box.glowMat.opacity = 0;
      scene.add(box.group);

      boxes.push({ ...box, shop: currentShops[i], colorIdx: ci, birthTime });
    }

    phase        = 'idle';
    openedIdx    = -1;
    revealShown  = false;
    peekPlayed   = false;
    hoveredIdx   = -1;
  }

  // ── Open a box on pick ────────────────────────────────────────────────
  function openBox(idx) {
    if (phase !== 'idle' || !gameStarted || idx < 0) return;
    openedIdx    = idx;
    phase        = 'opening';
    openTimer    = 0;
    revealShown  = false;
    peekPlayed   = false;
    document.getElementById('roll-hint').classList.add('hidden');
    playPickSound();
    // Pre-create peek element so the logo loads in the background
    const b = boxes[idx];
    createPeekEl(b.shop, PALETTE[b.colorIdx].c);
  }

  // ── Animation loop ────────────────────────────────────────────────────
  const _sv = new THREE.Vector3();

  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;
    const t = now * 0.001;

    // Hover detection (idle only)
    if (gameStarted && phase === 'idle' && boxes.length) {
      raycaster.setFromCamera(mouse, camera);
      let newHov = -1;
      for (let i = 0; i < boxes.length; i++) {
        if (raycaster.intersectObject(boxes[i].group, true).length) { newHov = i; break; }
      }
      if (newHov !== hoveredIdx) {
        hoveredIdx = newHov;
        if (!ptrDragging)
          dieCanvas.style.cursor = hoveredIdx >= 0 ? 'pointer' : 'grab';
      }
    }

    for (let i = 0; i < boxes.length; i++) {
      const b = boxes[i];

      // Staggered entrance animation — easeOutBack gives a springy overshoot
      const elapsed  = (now - b.birthTime) * 0.001;
      const entDelay = i * 0.09;
      const entProg  = Math.min(1, Math.max(0, (elapsed - entDelay) / 0.45));
      const entScale = entProg < 1 ? easeOutBack(entProg) : 1;

      if (phase === 'idle') {
        // Gentle bob
        const pos = currentPositions[i];
        b.group.position.x = pos.x;
        b.group.position.z = pos.z;
        b.group.position.y = pos.y + Math.sin(t * 1.1 + BOB_OFFSETS[i]) * 0.055;
        // Hover scale × entrance scale
        const hoverScale = hoveredIdx === i ? 1.07 : 1.0;
        _sv.setScalar(entScale * hoverScale);
        b.group.scale.lerp(_sv, 0.12);
        // Full opacity, no glow
        b.solidMats.forEach(m => { m.opacity = 1; });
        b.glowMat.opacity = 0;
        b.lidGroup.position.y = LID_REST_Y;

      } else if (phase === 'opening' || phase === 'done') {
        const prog = Math.min(1, openTimer / OPEN_DUR);
        const pos  = currentPositions[i];
        b.group.position.set(pos.x, pos.y, pos.z);

        if (i === openedIdx) {
          // Lid rises — ease-out cubic
          const lidEase = 1 - Math.pow(1 - Math.min(1, prog * 1.4), 2.8);
          b.lidGroup.position.y = LID_REST_Y + lidEase * 2.4;

          // Lid fades in second half of animation
          const lidOp = Math.max(0, 1 - Math.max(0, (prog - 0.38) / 0.62));
          b.lidMat.opacity    = lidOp;
          b.lidRibMat.opacity = lidOp;
          b.bodyMat.opacity   = 1;
          b.innerMat.opacity  = 1;
          b.bodyRibMat.opacity = 1;
          b.group.scale.setScalar(1);

          // Inner glow — fades in as lid clears (~22% into animation)
          const peekProg = Math.max(0, Math.min(1, (prog - 0.22) / 0.30));
          b.glowMat.opacity = peekProg * 0.65;

          // Show HTML peek overlay + play sparkle at same moment
          if (peekProg >= 0.12 && !peekPlayed) {
            peekPlayed = true;
            showPeekEl();
            playSparkle();
          }

          // Keep HTML peek element centred on the box opening each frame
          updatePeekPos();

        } else {
          // Other boxes shrink and fade
          const sp = Math.min(1, prog * 2.8);
          b.solidMats.forEach(m => { m.opacity = Math.max(0.04, 1 - sp * 0.90); });
          b.glowMat.opacity = 0;
          b.group.scale.setScalar(Math.max(0.15, 1 - sp * 0.85));
        }
      }
    }

    // Trigger reveal card once lid animation finishes
    if (phase === 'opening') {
      openTimer += dt;
      if (openTimer >= OPEN_DUR && !revealShown) {
        revealShown = true;
        phase = 'done';
        playLand();
        setTimeout(() => {
          playChime();
          removePeekEl();   // hide logo glimpse before reveal card appears
          const b = boxes[openedIdx];
          showReveal(b.shop, b.colorIdx);
          document.getElementById('backdrop').classList.add('visible');
          document.getElementById('reroll-btn').style.display = 'block';
        }, 140);
      }
    }

    // Orbit inertia — camera coasts to a stop after drag release
    if (!ptrDragging && (Math.abs(orbitVelX) > 0.00005 || Math.abs(orbitVelY) > 0.00005)) {
      orbitTheta += orbitVelX;
      orbitPhi    = Math.max(PHI_MIN, Math.min(PHI_MAX, orbitPhi + orbitVelY));
      orbitVelX  *= 0.88;
      orbitVelY  *= 0.88;
      applyOrbit();
    }

    renderer.render(scene, camera);
  }

  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(animate); });

  // ── Touch / click ─────────────────────────────────────────────────────
  function handleTap(clientX, clientY) {
    if (!gameStarted || phase !== 'idle') return;
    const mx =  (clientX / innerWidth)  * 2 - 1;
    const my = -(clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
    for (let i = 0; i < boxes.length; i++) {
      if (raycaster.intersectObject(boxes[i].group, true).length) {
        openBox(i); return;
      }
    }
  }

  // (click / touchend replaced by pointer drag handlers above)

  // ── Reveal card ───────────────────────────────────────────────────────
  function triggerPopIn(el) {
    el.classList.remove('popping');
    void el.offsetWidth;
    el.classList.add('popping');
    setTimeout(() => el.classList.remove('popping'), 700);
  }

  function showReveal(shop, ci) {
    const card = document.getElementById('reveal-card');
    const logo = document.getElementById('rev-logo');
    const fb   = document.getElementById('rev-fb');
    card.style.setProperty('--rev-bg', PALETTE[ci].c);
    const src = shop.logo || '';
    if (src) {
      logo.src = src; logo.style.display = 'block'; fb.style.display = 'none';
      triggerPopIn(logo);
      logo.onerror = () => {
        logo.style.display = 'none';
        fb.style.display   = 'flex';
        fb.textContent     = (shop.title || '?')[0].toUpperCase();
        triggerPopIn(fb);
      };
    } else {
      logo.style.display = 'none';
      fb.style.display   = 'flex';
      fb.textContent     = (shop.title || '?')[0].toUpperCase();
      triggerPopIn(fb);
    }
    document.getElementById('rev-name').textContent  = shop.title || 'Unknown';
    document.getElementById('rev-venue').textContent = shop.venue  || '';
    document.getElementById('reveal-overlay').classList.add('visible');

    // Confetti bursts from the opened box's screen position
    let cx = innerWidth * 0.5, cy = innerHeight * 0.40;
    if (openedIdx >= 0 && boxes[openedIdx]) {
      const wp = boxes[openedIdx].group.position.clone().project(camera);
      cx = (wp.x + 1) / 2 * innerWidth;
      cy = (-wp.y + 1) / 2 * innerHeight;
    }
    spawnConfetti(PALETTE[ci].c, cx, cy);
  }

  function hideReveal() {
    document.getElementById('reveal-overlay').classList.remove('visible');
  }

  // ── Confetti ──────────────────────────────────────────────────────────
  function spawnConfetti(primaryColor, cx, cy) {
    const cv = document.createElement('canvas');
    cv.style.cssText = 'position:fixed;inset:0;z-index:1002;pointer-events:none;';
    cv.width = innerWidth; cv.height = innerHeight;
    document.body.appendChild(cv);
    const ctx = cv.getContext('2d');
    const colors = [primaryColor, '#FF6B35', '#FFD23F', '#06D6A0', '#EF476F', '#9D4EDD', '#fff'];
    const pts = Array.from({ length: 72 }, () => ({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 24, vy: (Math.random() - 0.94) * 20,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2, rV: (Math.random() - 0.5) * 0.30,
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
      r: 3.5 + Math.random() * 4, w: 7 + Math.random() * 6, h: 3 + Math.random() * 4,
    }));
    let life = 0;
    (function tick() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      life++;
      const alpha = life < 65 ? 1 : 1 - (life - 65) / 35;
      for (const p of pts) {
        p.vy += 0.44; p.vx *= 0.97; p.vy *= 0.97;
        p.x += p.vx; p.y += p.vy; p.rot += p.rV;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
        else ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (life < 100) requestAnimationFrame(tick);
      else cv.remove();
    })();
  }

  // ── Dismiss + rebuild ─────────────────────────────────────────────────
  function dismiss() {
    hideReveal();
    removePeekEl();
    document.getElementById('backdrop').classList.remove('visible');
    document.getElementById('reroll-btn').style.display = 'none';
    buildBoxes(pickN(getFilteredShops(), boxCount));
    document.getElementById('roll-hint').classList.remove('hidden');
  }

  document.getElementById('backdrop').addEventListener('click', dismiss);
  document.getElementById('rev-close').addEventListener('click', dismiss);
  document.getElementById('reroll-btn').addEventListener('click', dismiss);

  // ── Shuffle ───────────────────────────────────────────────────────────
  function shuffleBoxes() {
    if (!gameStarted || phase !== 'idle') return;
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 520);
    buildBoxes(pickN(getFilteredShops(), boxCount));
    document.getElementById('roll-hint').classList.remove('hidden');
  }

  document.getElementById('refresh-btn').addEventListener('click', () => {
    initAudio(); shuffleBoxes();
  });

  // ── Browse All ────────────────────────────────────────────────────────
  function openBrowse() {
    const shops = getFilteredShops().slice().sort((a, b) =>
      (a.title || '').localeCompare(b.title || '')
    );
    buildBrowseList(shops);
    document.getElementById('browse-backdrop').classList.add('visible');
    document.getElementById('browse-sheet').classList.add('visible');
  }

  function closeBrowse() {
    document.getElementById('browse-backdrop').classList.remove('visible');
    document.getElementById('browse-sheet').classList.remove('visible');
  }

  function buildBrowseList(shops) {
    const list = document.getElementById('browse-list');
    list.innerHTML = '';
    document.getElementById('browse-count').textContent = `(${shops.length})`;

    shops.forEach((s, i) => {
      const ci   = s.title.charCodeAt(0) % PALETTE.length;
      const item = document.createElement('div');
      item.className = 'browse-item browse-item--enter';
      item.style.setProperty('--i', Math.min(i, 20));

      if (s.logo) {
        const img = document.createElement('img');
        img.className = 'browse-item-logo'; img.src = s.logo; img.alt = '';
        img.onerror = () => img.replaceWith(makeFbEl(s, ci));
        item.appendChild(img);
      } else {
        item.appendChild(makeFbEl(s, ci));
      }

      const info  = document.createElement('div'); info.className = 'browse-item-info';
      const name  = document.createElement('div'); name.className = 'browse-item-name';
      name.textContent = s.title || '';
      info.appendChild(name);
      if (s.venue) {
        const venue = document.createElement('div'); venue.className = 'browse-item-venue';
        venue.textContent = s.venue; info.appendChild(venue);
      }
      item.appendChild(info);
      item.addEventListener('click', () => { initAudio(); showRevealDirect(s, ci); });
      list.appendChild(item);
    });
  }

  function makeFbEl(shop, ci) {
    const fb = document.createElement('div');
    fb.className = 'browse-item-logo-fb';
    fb.style.background = PALETTE[ci].c;
    fb.textContent = (shop.title || '?')[0].toUpperCase();
    return fb;
  }

  // Show a result directly from the browse list (no box animation)
  function showRevealDirect(shop, ci) {
    closeBrowse();
    openedIdx = -1;  // confetti bursts from screen centre
    showReveal(shop, ci);
    document.getElementById('backdrop').classList.add('visible');
    document.getElementById('reroll-btn').style.display = 'block';
  }

  document.getElementById('browse-btn').addEventListener('click', openBrowse);
  document.getElementById('browse-backdrop').addEventListener('click', closeBrowse);

  // ── Keyboard shortcuts ────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('browse-sheet').classList.contains('visible')) closeBrowse();
      else if (document.getElementById('reveal-overlay').classList.contains('visible')) dismiss();
    }
    if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey) shuffleBoxes();
  });

  // ── Init ──────────────────────────────────────────────────────────────
  async function init() {
    const overlay   = document.getElementById('loading-overlay');
    const loadState = document.getElementById('loading-state');
    const tapBtn    = document.getElementById('tap-prompt');

    try {
      allShops = await loadFBShops();
      loadState.style.display = 'none';
      tapBtn.style.display    = 'block';
      initFilters();

      tapBtn.addEventListener('click', () => {
        if (tapBtn.disabled) return;
        initAudio();
        buildBoxes(pickN(getFilteredShops(), boxCount));
        overlay.style.opacity       = '0';
        overlay.style.pointerEvents = 'none';
        setTimeout(() => {
          overlay.style.display = 'none';
          gameStarted = true;
          lastOrient  = innerWidth >= innerHeight;
          dieCanvas.style.cursor = 'grab';
          document.getElementById('bg-particles').style.display = 'block';
          document.getElementById('game-badge').style.display   = 'block';
          document.getElementById('refresh-btn').style.display  = 'block';
          document.getElementById('browse-btn').style.display   = 'block';
          document.getElementById('roll-hint').classList.remove('hidden');
        }, 420);
      }, { once: true });

    } catch (e) {
      console.error('MakanBox:', e);
      loadState.innerHTML = `<p style="color:var(--makan-coral);font-weight:700;font-size:14px">
        Could not load restaurant data.<br>Please check data.js is available.</p>`;
    }
  }

  init();
  </script>
</body>
