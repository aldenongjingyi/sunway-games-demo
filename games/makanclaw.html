<script>
// ============================================
// CUISINE CATEGORIES (shared with other games)
// ============================================
const CUISINE_CATS = [
  { id: 730, name: 'LOCAL',    emoji: '🍜' },
  { id: 720, name: 'CHINESE',  emoji: '🥢' },
  { id: 727, name: 'JAPANESE', emoji: '🍱' },
  { id: 729, name: 'KOREAN',   emoji: '🌶️' },
  { id: 737, name: 'WESTERN',  emoji: '🍔' },
  { id: 725, name: 'INDIAN',   emoji: '🍛' },
  { id: 734, name: 'THAI',     emoji: '🌿' },
  { id: 721, name: 'DESSERT',  emoji: '🍰' },
  { id: 722, name: 'DRINKS',   emoji: '🥤' },
];

const CAT_LABEL_PRIORITY = [
  [721,'🍰'],[722,'🥤'],[718,'🥐'],[719,'☕'],
  [727,'🍱'],[729,'🌶️'],[725,'🍛'],[720,'🥢'],
  [730,'🍜'],[734,'🌿'],[737,'🍔'],[723,'⚡'],
  [733,'🍿'],[724,'🌙'],[732,'✅'],[728,'👦'],[735,'🥗'],
];

const CAPSULE_COLORS = [
  '#EF476F', '#FF6B35', '#FFD23F', '#06D6A0',
  '#A855F7', '#38BDF8', '#F472B6', '#34D399',
  '#FB923C', '#E879F9', '#22D3EE', '#FACC15'
];

// ============================================
// FILTER SYSTEM (shared with other games)
// ============================================
const FILTER_GROUPS = {
  dietary: [724, 732, 735, 728],
  cuisine: [730, 720, 727, 729, 737, 725, 734],
  type:    [721, 722, 719, 718, 723, 733],
};
const MIN_SHOPS = 6;

let activeFilters = new Set();

function getFilteredShops(allShops) {
  if (activeFilters.size === 0) return allShops;
  const byGroup = {};
  for (const id of activeFilters) {
    for (const [grp, ids] of Object.entries(FILTER_GROUPS)) {
      if (ids.includes(id)) { (byGroup[grp] = byGroup[grp] || []).push(id); break; }
    }
  }
  return allShops.filter(s =>
    Object.entries(byGroup).every(([grp, ids]) => {
      if (grp === 'dietary') {
        // AND: must satisfy ALL selected dietary filters (Halal + Veg = both required)
        return ids.every(id => s.categories.includes(id));
      }
      // OR: match any selected option in cuisine/type group
      return ids.some(id => s.categories.includes(id));
    })
  );
}

function updateFilterCount(allShops) {
  const n   = getFilteredShops(allShops).length;
  const el  = document.getElementById('filter-count');
  const btn = document.getElementById('play-btn');
  const tooFew = n < MIN_SHOPS;
  el.textContent = n === 0
    ? 'No restaurants match — try fewer filters'
    : tooFew
      ? `Only ${n} — need at least ${MIN_SHOPS} restaurants`
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
  el.classList.toggle('empty', n === 0 || tooFew);
  btn.disabled = tooFew;
}

function initFilters(allShops) {
  const wrap = document.getElementById('filter-wrap');
  wrap.style.display = 'flex';
  updateFilterCount(allShops);
  wrap.querySelectorAll('.fpill[data-catid]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.catid);
      if (activeFilters.has(id)) { activeFilters.delete(id); btn.classList.remove('active'); }
      else                        { activeFilters.add(id);    btn.classList.add('active'); }
      updateFilterCount(allShops);
    });
  });
}

function shopEmoji(shop) {
  if (!shop.categories) return '🍽️';
  for (const [catId, em] of CAT_LABEL_PRIORITY) {
    if (shop.categories.includes(catId)) return em;
  }
  return '🍽️';
}

function shopCuisineLabel(shop) {
  if (!shop.categories) return 'RESTAURANT';
  // Check main cuisines first, then secondary types
  const ALL_LABELS = [
    ...CUISINE_CATS,
    { id: 719, name: 'CAFÉ' },
    { id: 718, name: 'BAKERY' },
    { id: 723, name: 'FAST FOOD' },
    { id: 733, name: 'SNACK' },
  ];
  for (const c of ALL_LABELS) {
    if (shop.categories.includes(c.id)) return c.name;
  }
  return 'RESTAURANT';
}

// ============================================
// AUDIO ENGINE
// ============================================
class AudioEngine {
  constructor() { this.ctx = null; this.enabled = true; }

  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this.enabled = false; }
  }

  play(type) {
    if (!this.enabled || !this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    try { this['_' + type](); } catch(e) {}
  }

  _tick() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'square'; o.frequency.value = 300;
    g.gain.value = 0.03; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.03);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.03);
  }

  _coin() {
    const now = this.ctx.currentTime;
    [800, 1000, 1200].forEach((f, i) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.value = 0.1; g.gain.exponentialRampToValueAtTime(0.001, now + 0.15 + i * 0.05);
      o.connect(g).connect(this.ctx.destination); o.start(now + i * 0.08); o.stop(now + 0.2 + i * 0.05);
    });
  }

  _spin() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'square'; o.frequency.value = 600;
    g.gain.value = 0.04; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.05);
  }

  _drop() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 400;
    o.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.5);
    g.gain.value = 0.08; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.5);
  }

  _grab() {
    const bufferSize = this.ctx.sampleRate * 0.1;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const source = this.ctx.createBufferSource(); source.buffer = buffer;
    const g = this.ctx.createGain(); g.gain.value = 0.15;
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
    source.connect(g).connect(this.ctx.destination); source.start();
  }

  _lift() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 150;
    o.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 1.5);
    g.gain.value = 0.04; g.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 1.5);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 1.5);
  }

  _slip() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.value = 300;
    o.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.4);
    g.gain.value = 0.1; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.4);
  }

  _reveal() {
    const now = this.ctx.currentTime;
    [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.value = 0.08; g.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + i * 0.1);
      o.connect(g).connect(this.ctx.destination); o.start(now + i * 0.08); o.stop(now + 0.8 + i * 0.1);
    });
  }

  _fanfare() {
    const now = this.ctx.currentTime;
    [392, 523.25, 659.25, 783.99].forEach((freq, i) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.value = 0.1; g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      o.connect(g).connect(this.ctx.destination); o.start(now + i * 0.12); o.stop(now + 1.2);
      const o2 = this.ctx.createOscillator(), g2 = this.ctx.createGain();
      o2.type = 'sine'; o2.frequency.value = freq * 2;
      g2.gain.value = 0.03; g2.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
      o2.connect(g2).connect(this.ctx.destination); o2.start(now + i * 0.12); o2.stop(now + 1.0);
    });
  }

  _rouletteTick() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 500;
    g.gain.value = 0.06; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.02);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.02);
  }

  _select() {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 440;
    g.gain.value = 0.05; g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.05);
  }

  _motorWhir(duration = 2) {
    if (this._motorNode) return;
    const bufferSize = this.ctx.sampleRate * duration;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const source = this.ctx.createBufferSource(); source.buffer = buffer; source.loop = true;
    const bandpass = this.ctx.createBiquadFilter();
    bandpass.type = 'bandpass'; bandpass.frequency.value = 150; bandpass.Q.value = 2;
    const g = this.ctx.createGain(); g.gain.value = 0.03;
    source.connect(bandpass).connect(g).connect(this.ctx.destination);
    source.start();
    this._motorNode = source; this._motorGain = g;
  }

  _stopMotor() {
    if (this._motorNode) {
      try { this._motorGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1); } catch(e) {}
      setTimeout(() => { try { this._motorNode.stop(); } catch(e) {} this._motorNode = null; this._motorGain = null; }, 150);
    }
  }

  _clack(intensity) {
    const t = this.ctx.currentTime;
    const vol = Math.min((intensity || 0.5) * 0.08, 0.12);
    const pitch = 250 + Math.random() * 100;
    // Hollow plastic thud — sine with quick decay + soft noise
    const o = this.ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = pitch;
    o.frequency.exponentialRampToValueAtTime(pitch * 0.5, t + 0.06);
    const og = this.ctx.createGain(); og.gain.value = vol;
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    o.connect(og).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.08);
    // Soft noise layer for contact texture
    const bufLen = this.ctx.sampleRate * 0.025;
    const buf = this.ctx.createBuffer(1, bufLen, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 2;
    const ng = this.ctx.createGain(); ng.gain.value = vol * 0.4;
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
    src.connect(bp).connect(ng).connect(this.ctx.destination); src.start(t);
  }

  _tensionRise(duration = 2) {
    if (this._tensionNode) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 200;
    o.frequency.linearRampToValueAtTime(800, this.ctx.currentTime + duration);
    g.gain.value = 0.03;
    o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + duration);
    this._tensionNode = o; this._tensionGain = g;
    setTimeout(() => { this._tensionNode = null; this._tensionGain = null; }, duration * 1000);
  }

  _stopTension() {
    if (this._tensionNode) {
      try { this._tensionGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); } catch(e) {}
      try { this._tensionNode.stop(); } catch(e) {}
      this._tensionNode = null; this._tensionGain = null;
    }
  }

  _crack() {
    const now = this.ctx.currentTime;
    const bufferSize = this.ctx.sampleRate * 0.15;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      const env = Math.exp(-i / (this.ctx.sampleRate * 0.02));
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const source = this.ctx.createBufferSource(); source.buffer = buffer;
    const g = this.ctx.createGain(); g.gain.value = 0.2;
    source.connect(g).connect(this.ctx.destination); source.start();
    [600, 900, 1200].forEach((freq, i) => {
      const o = this.ctx.createOscillator(), gn = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      gn.gain.value = 0.06; gn.gain.exponentialRampToValueAtTime(0.001, now + 0.4 + i * 0.05);
      o.connect(gn).connect(this.ctx.destination); o.start(now + 0.05 + i * 0.06); o.stop(now + 0.4 + i * 0.05);
    });
  }

  _ambientHum() {
    if (this._ambientNode) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = 60;
    g.gain.value = 0.02;
    o.connect(g).connect(this.ctx.destination); o.start();
    this._ambientNode = o; this._ambientGain = g;
  }

  _stopAmbient() {
    if (this._ambientNode) {
      try { this._ambientGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2); } catch(e) {}
      setTimeout(() => { try { this._ambientNode.stop(); } catch(e) {} this._ambientNode = null; this._ambientGain = null; }, 250);
    }
  }
}

// ============================================
// CONFETTI SYSTEM
// ============================================
class ConfettiSystem {
  constructor(canvas) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.particles = []; this.running = false;
  }
  resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
  start() {
    this.resize(); this.particles = [];
    const colors = ['#EF476F','#FFD23F','#FF6B35','#06D6A0','#A855F7','#F472B6'];
    for (let i = 0; i < 150; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width, y: -20 - Math.random() * 300,
        vx: (Math.random() - 0.5) * 8, vy: Math.random() * 3 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4, rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'circle', opacity: 1
      });
    }
    this.running = true; this._loop();
  }
  stop() { this.running = false; this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  _loop() {
    if (!this.running) return;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    let alive = false;
    for (const p of this.particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.99; p.rotation += p.rotSpeed;
      if (p.y > this.canvas.height + 20) p.opacity -= 0.02;
      if (p.opacity <= 0) continue;
      alive = true;
      this.ctx.save();
      this.ctx.translate(p.x, p.y); this.ctx.rotate(p.rotation);
      this.ctx.globalAlpha = p.opacity; this.ctx.fillStyle = p.color;
      if (p.shape === 'rect') this.ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      else { this.ctx.beginPath(); this.ctx.arc(0, 0, p.size/2, 0, Math.PI*2); this.ctx.fill(); }
      this.ctx.restore();
    }
    if (alive) requestAnimationFrame(() => this._loop());
    else { this.running = false; this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  }
  burst(x, y, color = '#FFD600', count = 25) {
    this.resize();
    const colors = [color, '#FF6B35', '#FFD23F', '#EF476F', '#06D6A0'];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = 4 + Math.random() * 8;
      this.particles.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 6 + 3, rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3,
        shape: Math.random() > 0.3 ? 'circle' : 'rect', opacity: 1
      });
    }
    if (!this.running) { this.running = true; this._loop(); }
  }
  startSmall(count = 40) {
    this.resize();
    const colors = ['#FFD23F', '#FF6B35', '#EF476F', '#06D6A0', '#A855F7'];
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width, y: -10 - Math.random() * 150,
        vx: (Math.random() - 0.5) * 5, vy: Math.random() * 2 + 1.5,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 5 + 2, rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        shape: Math.random() > 0.5 ? 'rect' : 'circle', opacity: 1
      });
    }
    if (!this.running) { this.running = true; this._loop(); }
  }
}

// ============================================
// AMBIENT BACKGROUND — warm particles
// ============================================
class AmbientBackground {
  constructor(canvas) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.particles = []; this.resize();
    window.addEventListener('resize', () => this.resize());
    this._init(); this._loop();
  }
  resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
  _init() {
    const colors = ['#FF6B35','#FFD23F','#EF476F','#FFD600','#A855F7'];
    for (let i = 0; i < 40; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
        r: Math.random() * 1.8 + 0.4, vx: (Math.random() - 0.5) * 0.3, vy: -Math.random() * 0.25 - 0.08,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: Math.random() * 0.4 + 0.1, pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.015 + 0.005
      });
    }
  }
  _loop() {
    const ctx = this.ctx, w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0, 0, w, h);
    for (const p of this.particles) {
      p.x += p.vx; p.y += p.vy; p.pulse += p.pulseSpeed;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      if (p.x < -10) p.x = w + 10; if (p.x > w + 10) p.x = -10;
      const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = p.r * 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(() => this._loop());
  }
}

// ============================================
// MAIN GAME
// ============================================
class MakanClawGame {
  constructor() {
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.audio = new AudioEngine();
    this.confetti = new ConfettiSystem(document.getElementById('confetti-canvas'));

    this.state = 'loading';
    this.allShops = [];
    this.filteredShops = [];
    this.capsules = [];
    this.clawX = 0; this.clawTargetX = 0; this.clawY = 0; this.clawOpen = 1; this.grabOffsetX = 0;
    this.grabbedCapsule = null; this.selectedShop = null;
    this._loopRunning = false;
    this.attempt = 0;
    this.shuffleTimer = 0; this.shuffleIntensity = 0;
    this.machineLeft = 0; this.machineRight = 0; this.floorY = 0;
    this.railY = 0; this.capsuleRadius = 0; this.W = 0; this.H = 0;
    this.isDragging = false; this.lastMoveSound = 0;
    this.chainSway = 0; this.lastClackTime = 0;

    this._bindEvents();
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._loadData();
  }

  async _loadData() {
    try {
      this.allShops = await loadFBShops();
    } catch(e) {
      console.error('Failed to load restaurant data:', e);
      this.allShops = [];
    }
    initFilters(this.allShops);
    this.state = 'title';
    this._animateTitle();
    // Dismiss loading screen
    const dismissLoading = () => {
      document.getElementById('loading-screen').classList.add('hidden');
    };
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => setTimeout(dismissLoading, 300));
    } else {
      setTimeout(dismissLoading, 800);
    }
  }

  _animateTitle() {
    const els = [
      '#title-screen .brand-tag', '#title-screen .title-main',
      '#title-screen .title-sub', '#title-screen .claw-icon',
      '#filter-wrap', '#title-screen .neon-btn', '#title-screen .title-capsules'
    ];
    els.forEach((sel, i) => {
      gsap.to(sel, { opacity: 1, y: 0, duration: 0.5, delay: 0.15 + i * 0.1, ease: 'power2.out' });
    });
  }

  _bindEvents() {
    const juiceBtn = (btn) => {
      btn.addEventListener('pointerdown', () => {
        gsap.fromTo(btn, {scale:1}, {scale:0.85, duration:0.08, yoyo:true, repeat:1});
      });
    };
    const playBtn = document.getElementById('play-btn');
    const dropBtn = document.getElementById('drop-btn');
    const replayBtn = document.getElementById('replay-btn');

    playBtn.addEventListener('click', () => { this.audio.play('select'); this.audio.init(); this._startGamePhase(); });
    dropBtn.addEventListener('click', () => this.dropClaw());
    replayBtn.addEventListener('click', () => { this.audio.play('select'); this._fullReset(); });

    [playBtn, dropBtn, replayBtn].forEach(juiceBtn);

    // Sound toggle
    const soundToggle = document.getElementById('sound-toggle');
    soundToggle.addEventListener('click', () => {
      this.audio.enabled = !this.audio.enabled;
      soundToggle.innerHTML = this.audio.enabled ? '&#x1f50a;' : '&#x1f507;';
      soundToggle.classList.toggle('muted', !this.audio.enabled);
      if (!this.audio.enabled) {
        this.audio._stopMotor(); this.audio._stopAmbient(); this.audio._stopTension();
      }
    });

    // Touch/mouse controls
    const machineBody = document.querySelector('.machine-body');
    const getGameX = (e) => {
      const touch = e.touches ? e.touches[0] : e;
      const rect = this.canvas.getBoundingClientRect();
      return ((touch.clientX - rect.left) / rect.width) * this.W;
    };

    machineBody.addEventListener('touchstart', (e) => {
      if (this.state !== 'playing') return;
      e.preventDefault(); this.isDragging = true; this.audio.init();
      this.clawTargetX = getGameX(e); this.audio.play('motorWhir');
    }, { passive: false });

    machineBody.addEventListener('touchmove', (e) => {
      if (!this.isDragging || this.state !== 'playing') return;
      e.preventDefault(); this.clawTargetX = getGameX(e);
      const now = Date.now();
      if (now - this.lastMoveSound > 80) { this.audio.play('tick'); this.lastMoveSound = now; }
    }, { passive: false });

    machineBody.addEventListener('touchend', () => { this.isDragging = false; this.audio._stopMotor(); });

    machineBody.addEventListener('mousedown', (e) => {
      if (this.state !== 'playing') return;
      this.isDragging = true; this.audio.init();
      this.clawTargetX = getGameX(e); this.audio.play('motorWhir');
    });
    window.addEventListener('mousemove', (e) => {
      if (!this.isDragging || this.state !== 'playing') return;
      this.clawTargetX = getGameX(e);
    });
    window.addEventListener('mouseup', () => { this.isDragging = false; this.audio._stopMotor(); });
  }

  _resize() {
    const container = document.querySelector('.machine-body');
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.W = rect.width; this.H = rect.height;
    const padding = this.W * 0.06;
    this.machineLeft = padding; this.machineRight = this.W - padding;
    this.floorY = this.H - 20; this.railY = 25;
    this.capsuleRadius = Math.min(this.W * 0.085, 36);
    this.clawX = this.W / 2; this.clawTargetX = this.W / 2;
    this.clawY = this.railY + 10;
    this.confetti.resize();
  }

  // ===== PHASE: GAME START =====
  _startGamePhase() {
    // Apply pill filters (button is disabled if < MIN_SHOPS, but guard just in case)
    this.filteredShops = getFilteredShops(this.allShops);
    if (this.filteredShops.length < MIN_SHOPS) this.filteredShops = [...this.allShops];

    // Derive cuisine badge from active filters
    const badge = document.getElementById('cuisine-badge');
    let badgeLabel = 'ALL';
    for (const c of CUISINE_CATS) {
      if (activeFilters.has(c.id)) { badgeLabel = c.name; break; }
    }
    badge.textContent = badgeLabel;

    const title = document.getElementById('title-screen');
    gsap.to(title, { opacity: 0, y: -20, duration: 0.35, ease: 'power2.in', onComplete: () => {
      title.style.display = 'none'; gsap.set(title, { clearProps: 'y' });
      const gameScreen = document.getElementById('game-screen');
      gameScreen.classList.add('active', 'screen-enter');
      setTimeout(() => gameScreen.classList.remove('screen-enter'), 500);
      this._resize();

      this._initCapsulesAbove();
      this.attempt = 0;
      this.clawX = this.W / 2; this.clawTargetX = this.W / 2;
      this.clawY = this.railY + 10; this.clawOpen = 1; this.grabbedCapsule = null;
      this.state = 'capsule-drop'; this._loopRunning = false; this._gameLoop();
      this._rainCapsules();
    }});
  }

  _initCapsulesAbove() {
    this.capsules = [];
    const r = this.capsuleRadius;
    // Pick random shops, duplicate for a fuller machine
    const picked = pickRandom(this.filteredShops, Math.min(12, this.filteredShops.length));
    const pool = [...picked, ...picked];
    const shuffled = pool.sort(() => Math.random() - 0.5);
    for (let i = 0; i < shuffled.length; i++) {
      const spread = this.machineRight - this.machineLeft - r * 2;
      const x = this.machineLeft + r + Math.random() * spread;
      this.capsules.push({
        x, y: -r * 2 - Math.random() * 80,
        vx: (Math.random() - 0.5) * 10, vy: 0, r,
        color: CAPSULE_COLORS[i % CAPSULE_COLORS.length],
        shop: shuffled[i], grabbed: false, frozen: true,
        dropDelay: i * 0.06 + Math.random() * 0.04,
        scaleX: 1, scaleY: 1, idlePhase: Math.random() * Math.PI * 2
      });
    }
  }

  _rainCapsules() {
    this._rainStart = performance.now();
    this._settleStarted = false;
    this._settleCheckTimer = setInterval(() => {
      const allDropped = this.capsules.every(c => !c.frozen);
      if (!allDropped) return;
      if (!this._settleStarted) { this._settleStarted = true; this._settleTime = performance.now(); }
      const elapsed = performance.now() - this._settleTime;
      const allSettled = this.capsules.every(c => Math.abs(c.vy) < 15 && Math.abs(c.vx) < 15);
      if (allSettled || elapsed > 2000) {
        clearInterval(this._settleCheckTimer);
        this.capsules.forEach(c => { c.vx = 0; c.vy = 0; });
        this._nextAttempt();
      }
    }, 100);
  }

  _nextAttempt() {
    this.attempt++;
    this.clawOpen = 1; this.grabbedCapsule = null;
    this.clawY = this.railY + 10;
    this.clawX = this.W / 2; this.clawTargetX = this.W / 2;
    this.shuffleIntensity = Math.min(this.attempt * 0.2, 1.5);
    this.state = 'playing';
    document.getElementById('drop-btn').disabled = false;
    document.getElementById('instruction-text').innerHTML =
      this.attempt === 1 ? '&#9664; DRAG TO AIM &#9654;' : '&#9664; TRY AGAIN! &#9654;';
    // Update attempt dots
    const dots = document.querySelectorAll('.adot');
    dots.forEach((d, i) => {
      d.classList.remove('active', 'used');
      if (i < this.attempt - 1) d.classList.add('used');
      else if (i === this.attempt - 1) d.classList.add('active');
    });
  }

  _showStatusMessage(text, color, callback) {
    const msg = document.getElementById('status-msg');
    msg.textContent = text; msg.style.color = color;
    msg.style.textShadow = `0 0 20px ${color}80, 0 0 40px ${color}40`;
    gsap.fromTo(msg,
      { opacity: 0, scale: 0.5, y: '-50%' },
      { opacity: 1, scale: 1, y: '-50%', duration: 0.4, ease: 'back.out(2)',
        onComplete: () => { gsap.to(msg, { opacity: 0, scale: 1.2, duration: 0.4, delay: 0.6, onComplete: callback }); }
      }
    );
  }

  // ===== CAPSULE PHYSICS =====
  _physicsTick(dt) {
    const gravity = 980, bounce = 0.2, friction = 0.995, floorFriction = 0.85;
    const r = this.capsuleRadius;
    for (const c of this.capsules) {
      if (c.grabbed || c.frozen) continue;
      c.vy += gravity * dt; c.vx *= friction;
      c.x += c.vx * dt; c.y += c.vy * dt;
      if (c.y + r > this.floorY) {
        const preVy = Math.abs(c.vy);
        c.y = this.floorY - r; c.vy = -c.vy * bounce; c.vx *= floorFriction;
        const impact = Math.min(preVy / 300, 1);
        c.scaleY = 1 - impact * 0.3; c.scaleX = 1 + impact * 0.3;
        if (Math.abs(c.vy) < 12) c.vy = 0;
        if (Math.abs(c.vx) < 5) c.vx = 0;
        const now = Date.now();
        if (preVy > 200 && now - this.lastClackTime > 120 && this.audio.enabled && this.audio.ctx) {
          this.lastClackTime = now;
          this.audio._clack(Math.min(preVy / 500, 1));
        }
      }
      if (c.x - r < this.machineLeft) { c.x = this.machineLeft + r; c.vx = Math.abs(c.vx) * bounce; }
      if (c.x + r > this.machineRight) { c.x = this.machineRight - r; c.vx = -Math.abs(c.vx) * bounce; }
      for (const other of this.capsules) {
        if (other === c || other.grabbed || other.frozen) continue;
        const dx = other.x - c.x, dy = other.y - c.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = r * 2;
        if (dist < minDist && dist > 0.1) {
          const overlap = (minDist - dist) / 2;
          const nx = dx / dist, ny = dy / dist;
          c.x -= nx * overlap; c.y -= ny * overlap;
          other.x += nx * overlap; other.y += ny * overlap;
          const relVx = c.vx - other.vx, relVy = c.vy - other.vy;
          const relDot = relVx * nx + relVy * ny;
          if (relDot > 0) {
            c.vx -= relDot * nx * 0.5; c.vy -= relDot * ny * 0.5;
            other.vx += relDot * nx * 0.5; other.vy += relDot * ny * 0.5;
            const impulse = Math.abs(relDot);
            const now = Date.now();
            const throttle = this.state === 'capsule-drop' ? 200 : 150;
            if (impulse > 150 && now - this.lastClackTime > throttle && this.audio.enabled && this.audio.ctx) {
              this.lastClackTime = now;
              const intensity = Math.min(impulse / 400, 1);
              this.audio._clack(intensity);
            }
          }
        }
      }
    }
  }

  // ===== DROP + GRAB + LIFT =====
  dropClaw() {
    if (this.state !== 'playing') return;
    this.audio.init(); this.state = 'dropping';
    document.getElementById('drop-btn').disabled = true;
    this.audio.play('drop');

    // Pre-identify the target capsule before dropping — pick the one
    // closest horizontally to the claw, preferring topmost if stacked
    const reach = this.capsuleRadius * 3;
    let target = null, bestScore = Infinity;
    for (const c of this.capsules) {
      if (c.grabbed) continue;
      const hdist = Math.abs(c.x - this.clawX);
      if (hdist < reach) {
        // Weight: horizontal closeness + slight preference for topmost ball
        const score = hdist * 2 + c.y * 0.05;
        if (score < bestScore) { bestScore = score; target = c; }
      }
    }

    let targetY;
    if (target) {
      // Arm tips are at clawY + 124 (pivot 36 + armLen 88).
      // Drop so tips reach the capsule's equator — natural cupping position.
      targetY = target.y - 124;
    } else {
      // No reachable capsule — drop to default floor depth
      targetY = this.floorY - 130 - this.capsuleRadius;
    }
    targetY = Math.max(this.railY + 40, Math.min(targetY, this.floorY - 130 - this.capsuleRadius));

    this.audio.play('tensionRise');
    gsap.to(this, {
      clawY: targetY, duration: 1.2, ease: 'power1.inOut',
      onComplete: () => { this.audio._stopTension(); this._grabNearest(); }
    });
  }

  _grabNearest() {
    const clawTipY = this.clawY + 126; // rubber tip pad center
    let nearest = null, nearestDist = Infinity;
    for (const c of this.capsules) {
      if (c.grabbed) continue;
      const dx = c.x - this.clawX, dy = c.y - clawTipY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < nearestDist) { nearestDist = dist; nearest = c; }
    }
    const grabReach = this.capsuleRadius * 3;
    if (!nearest || nearestDist > grabReach) {
      gsap.timeline()
        .to(this, { clawOpen: 1.3, duration: 0.15, ease: 'power1.out' })
        .to(this, { clawOpen: 0, duration: 0.3, ease: 'power2.inOut', delay: 0.1 });
      this.audio.play('slip');
      this._showStatusMessage('MISSED!', '#EF476F', () => {
        gsap.to(this, { clawOpen: 1, duration: 0.2 });
        gsap.to(this, { clawY: this.railY + 10, duration: 0.6, ease: 'power2.out',
          onComplete: () => this._nextAttempt() });
      });
      return;
    }
    this.grabbedCapsule = nearest;
    this.grabDistance = nearestDist;
    this.grabOffsetX = nearest.x - this.clawX; // preserve horizontal offset
    nearest.grabbed = true;
    this.selectedShop = nearest.shop;
    gsap.timeline()
      .to(this, { clawOpen: 1.3, duration: 0.15, ease: 'power1.out' })
      .to(this, { clawOpen: 0, duration: 0.3, ease: 'power2.inOut', delay: 0.1 });
    // Pull ball to rubber tip pad level (arm tip 124 + tipR offset ~2 = 126)
    const pullTargetY = this.clawY + 126;
    // Only pull Y — don't snap X (prevents glitchy horizontal jerk)
    gsap.to(nearest, { y: pullTargetY, duration: 0.4, ease: 'power2.out' });
    const app = document.getElementById('app');
    app.classList.add('shake'); setTimeout(() => app.classList.remove('shake'), 450);
    this.audio.play('grab');
    navigator.vibrate?.([100]);
    const centeredness = Math.max(0, 1 - nearestDist / (this.capsuleRadius * 2.5));
    let feedbackColor, feedbackMsg;
    if (centeredness > 0.7) { feedbackColor = '#06D6A0'; feedbackMsg = 'GREAT!'; }
    else if (centeredness > 0.35) { feedbackColor = '#FFD600'; feedbackMsg = 'OK'; }
    else { feedbackColor = '#EF476F'; feedbackMsg = 'WEAK'; }
    this._flashGrabQuality(feedbackColor, feedbackMsg);
    const canvasRect = this.canvas.getBoundingClientRect();
    const screenX = canvasRect.left + (nearest.x / this.W) * canvasRect.width;
    const screenY = canvasRect.top + (nearest.y / this.H) * canvasRect.height;
    this.confetti.burst(screenX, screenY, feedbackColor, 25);
    for (const c of this.capsules) {
      if (c === nearest || c.grabbed) continue;
      const dx = c.x - nearest.x, dy = c.y - nearest.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < this.capsuleRadius * 5) {
        const falloff = 1 - dist / (this.capsuleRadius * 5);
        c.vy = (-20 - Math.random() * 30) * falloff;
        c.vx = (Math.random() - 0.5) * 20 * falloff;
      }
    }
    setTimeout(() => this._liftClaw(), 400);
  }

  _flashGrabQuality(color, text) {
    const msg = document.getElementById('status-msg');
    msg.textContent = text; msg.style.color = color;
    msg.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}80, 0 0 80px ${color}40`;
    gsap.fromTo(msg, { opacity: 1, scale: 1.5, y: '-50%' },
      { opacity: 0, scale: 2, y: '-50%', duration: 0.8, ease: 'power2.out' });
    const flash = document.getElementById('flash-overlay');
    flash.style.background = `radial-gradient(ellipse at center, transparent 40%, ${color}30 100%)`;
    gsap.fromTo(flash, { opacity: 0.7 }, { opacity: 0, duration: 0.4, ease: 'power2.out',
      onComplete: () => { flash.style.background = 'white'; } });
  }

  _liftClaw() {
    this.state = 'lifting'; this.audio.play('lift');
    const c = this.grabbedCapsule;
    const r = this.capsuleRadius;
    const centeredness = Math.max(0, 1 - this.grabDistance / (r * 2.5));
    let successChance = 0.20 + centeredness * 0.70;
    successChance += Math.min(this.attempt * 0.15, 0.60);
    if (this.attempt >= 3) successChance = 1; // guarantee success by attempt 3
    successChance = Math.min(successChance, 0.98);
    const success = Math.random() < successChance;
    let liftTarget;
    if (success) { liftTarget = this.railY + 10; }
    else {
      const liftFraction = 0.25 + centeredness * 0.45;
      liftTarget = this.clawY - (this.clawY - this.railY) * liftFraction;
    }
    gsap.to(this, {
      clawY: liftTarget, duration: success ? 1.8 : 1.2, ease: 'power1.inOut',
      onUpdate: () => {
        if (c) {
          // Smoothly ease capsule toward claw center (reduces offset over time)
          c.x += (this.clawX - c.x) * 0.1;
          c.y = this.clawY + 126;
        }
      },
      onComplete: () => {
        if (success) {
          gsap.to(this, { clawX: this.W / 2, clawTargetX: this.W / 2, duration: 0.5, ease: 'power2.inOut',
            onUpdate: () => {
              if (c) {
                c.x += (this.clawX - c.x) * 0.2;
                c.y = this.clawY + 126;
              }
            },
            onComplete: () => this._revealSequence()
          });
        } else { this._slipCapsule(); }
      }
    });
  }

  _slipCapsule() {
    this.audio.play('slip');
    const c = this.grabbedCapsule;
    if (this.attempt >= 2) {
      gsap.to(this, { clawX: this.clawX - 5, duration: 0.05, yoyo: true, repeat: 5 });
    }
    setTimeout(() => {
      if (c) {
        const origX = c.x;
        gsap.to(c, { x: origX + 4, duration: 0.04, yoyo: true, repeat: 7, ease: 'none',
          onComplete: () => { c.x = origX; } });
      }
      gsap.to(this, { clawOpen: 1, duration: 0.15, delay: 0.15 });
      setTimeout(() => {
        if (c) { c.grabbed = false; c.vy = 2; c.vx = (Math.random() - 0.5) * 15; }
        this.grabbedCapsule = null;
      }, 200);
      const msgs = ["ALMOST!", "SO CLOSE!", "SLIPPED!", "TRY AGAIN!", "NEARLY!"];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      this._showStatusMessage(msg, '#FFD23F', () => {
        gsap.to(this, { clawY: this.railY + 10, duration: 0.6, ease: 'power2.out',
          onComplete: () => this._nextAttempt() });
      });
    }, this.attempt >= 2 ? 400 : 100);
  }

  // ===== REVEAL =====
  _revealSequence() {
    this.state = 'revealing';
    this.audio._stopAmbient(); this.audio._stopMotor();
    const shop = this.selectedShop;
    const emoji = shopEmoji(shop);
    setTimeout(() => {
      document.getElementById('game-screen').classList.remove('active');
      this._playCapsuleOpen('#FF6B35', emoji, () => this._showResult());
    }, 300);
  }

  _playCapsuleOpen(color, emoji, onComplete) {
    const overlay = document.getElementById('capsule-open-overlay');
    const leftInner = document.getElementById('capsule-left-inner');
    const rightInner = document.getElementById('capsule-right-inner');
    const leftHalf = document.getElementById('capsule-left');
    const rightHalf = document.getElementById('capsule-right');
    const emojiEl = document.getElementById('capsule-emoji');
    const glowRing = document.getElementById('capsule-glow');
    const label = document.getElementById('capsule-label');
    const raysContainer = document.getElementById('capsule-rays');

    const bg = `radial-gradient(circle at 35% 35%, ${this._lighten(color, 40)}, ${color} 60%, ${this._darken(color, 30)})`;
    leftInner.style.background = bg; rightInner.style.background = bg;
    emojiEl.textContent = emoji;

    raysContainer.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const ray = document.createElement('div');
      ray.className = 'capsule-light-ray';
      ray.style.transform = `translate(-50%, 0) rotate(${(360 / 10) * i}deg)`;
      ray.style.background = `linear-gradient(180deg, ${color}, transparent)`;
      raysContainer.appendChild(ray);
    }

    gsap.set(leftHalf, { x: 0, rotation: 0, opacity: 1 });
    gsap.set(rightHalf, { x: 0, rotation: 0, opacity: 1 });
    gsap.set(emojiEl, { fontSize: '0px', opacity: 0, y: 0, rotation: 0 });
    gsap.set(glowRing, { opacity: 0, scale: 1, borderColor: color });
    gsap.set(label, { opacity: 0, y: 10 });
    gsap.set(raysContainer, { opacity: 0, scale: 0.5, rotation: 0 });
    overlay.classList.add('active');

    const tl = gsap.timeline();
    tl.from([leftHalf, rightHalf], { y: -60, opacity: 0, duration: 0.4, ease: 'back.out(2)' });
    tl.to([leftHalf, rightHalf], { x: 3, duration: 0.04, yoyo: true, repeat: 11, ease: 'none' }, '+=0.2');
    tl.to(glowRing, { opacity: 0.8, scale: 1.2, duration: 0.3,
      boxShadow: `0 0 30px ${color}, 0 0 60px ${color}80`, borderColor: color, ease: 'power2.in' }, '-=0.3');
    tl.add(() => { this.audio.play('crack'); navigator.vibrate?.([50, 30, 100]); });
    tl.to(leftHalf, { x: -60, rotation: -25, opacity: 0, duration: 0.5, ease: 'power3.out' });
    tl.to(rightHalf, { x: 60, rotation: 25, opacity: 0, duration: 0.5, ease: 'power3.out' }, '<');
    tl.to(emojiEl, { fontSize: '72px', opacity: 1, y: -10, duration: 0.5, ease: 'back.out(3)' }, '-=0.35');
    tl.to(raysContainer, { opacity: 1, scale: 2.5, rotation: 30, duration: 0.7, ease: 'power2.out' }, '-=0.45');
    tl.to(raysContainer, { opacity: 0, duration: 0.3 }, '-=0.15');
    tl.to(glowRing, { scale: 3, opacity: 0, duration: 0.6, ease: 'power2.out' }, '-=0.7');
    tl.add(() => {
      const rect = overlay.getBoundingClientRect();
      this.confetti.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, color, 40);
    }, '-=0.3');
    tl.to(label, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out',
      onComplete: () => { label.textContent = 'REVEALED!'; } }, '-=0.1');
    tl.to(emojiEl, { y: -20, duration: 0.2, yoyo: true, repeat: 1, ease: 'power2.out' }, '+=0.1');
    tl.add(() => { this.audio.play('fanfare'); }, '+=0.3');
    tl.add(() => {
      const flash = document.getElementById('flash-overlay');
      gsap.timeline().to(flash, { opacity: 0.8, duration: 0.15 }).to(flash, { opacity: 0, duration: 0.4 });
      gsap.to('#app', { scale: 1.12, duration: 0.15, yoyo: true, repeat: 1, ease: 'power2.out' });
    }, '+=0.2');
    tl.to(overlay, { opacity: 0, duration: 0.4,
      onComplete: () => {
        overlay.classList.remove('active'); overlay.style.opacity = '';
        label.textContent = 'OPENING...'; onComplete();
      }
    }, '+=0.3');
  }

  _showResult() {
    this.state = 'result';
    const shop = this.selectedShop;
    const emoji = shopEmoji(shop);
    const cuisine = shopCuisineLabel(shop);

    // Show logo if available
    const logoEl = document.getElementById('result-logo');
    const emojiEl = document.getElementById('result-emoji');
    if (shop.logo) {
      logoEl.src = shop.logo; logoEl.alt = shop.title;
      logoEl.style.display = 'block'; emojiEl.style.display = 'none';
    } else {
      logoEl.style.display = 'none'; emojiEl.style.display = 'block';
      emojiEl.textContent = emoji;
    }

    // ScrambleText effect
    const nameEl = document.getElementById('result-name');
    nameEl.textContent = '';
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%&*';
    const target = shop.title;
    let revealed = 0;
    const scrambleInterval = setInterval(() => {
      let display = '';
      for (let i = 0; i < target.length; i++) {
        if (i < revealed) display += target[i];
        else display += chars[Math.floor(Math.random() * chars.length)];
      }
      nameEl.textContent = display;
      revealed++;
      if (revealed > target.length) { clearInterval(scrambleInterval); nameEl.textContent = target; }
    }, 30);

    document.getElementById('result-cuisine').textContent = cuisine;
    document.getElementById('result-location').innerHTML =
      `&#128205; ${shop.venue || 'Sunway Pyramid'}`;

    document.getElementById('game-screen').classList.remove('active');
    const resultScreen = document.getElementById('result-screen');
    resultScreen.classList.add('active', 'screen-enter');
    setTimeout(() => resultScreen.classList.remove('screen-enter'), 500);

    gsap.set(['.result-card', '.result-header', '.result-buttons'], { clearProps: 'all' });
    gsap.from('.result-card', { y: 80, opacity: 0, duration: 0.6, ease: 'back.out(1.5)', delay: 0.1 });

    const header = document.querySelector('.result-header');
    const headerText = header.textContent;
    header.innerHTML = headerText.split('').map(ch =>
      ch === ' ' ? ' ' : `<span style="display:inline-block;opacity:0">${ch}</span>`
    ).join('');
    gsap.to(header.querySelectorAll('span'), {
      opacity: 1, y: 0, duration: 0.3, stagger: 0.04, ease: 'back.out(2)', delay: 0.1
    });
    gsap.from(header.querySelectorAll('span'), {
      y: -15, duration: 0.3, stagger: 0.04, ease: 'back.out(2)', delay: 0.1
    });

    gsap.from('.result-buttons', { y: 30, opacity: 0, duration: 0.5, delay: 0.4 });
    this.confetti.start();
  }

  // ===== FULL RESET =====
  _fullReset() {
    this.confetti.stop();
    this.audio._stopAmbient(); this.audio._stopMotor(); this.audio._stopTension();
    this.state = 'title'; this._lastFrameTime = 0; this._rainStart = 0;
    if (this._settleCheckTimer) clearInterval(this._settleCheckTimer);

    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');

    const title = document.getElementById('title-screen');
    title.style.display = ''; title.style.opacity = '';
    gsap.set(title, { opacity: 1 });
    // Restore filter + play button visibility (they were animated in)
    gsap.set('#filter-wrap', { opacity: 1, y: 0 });
    gsap.set('#title-screen .neon-btn', { opacity: 1, y: 0 });
    gsap.set('#title-screen .title-capsules', { opacity: 0.4, y: 0 });
    updateFilterCount(this.allShops);
  }

  // ===== GAME LOOP =====
  _gameLoop(timestamp) {
    if (this.state === 'title' || this.state === 'result' || this.state === 'loading') {
      this._loopRunning = false; this._lastFrameTime = 0; return;
    }
    this._loopRunning = true;
    if (!this._lastFrameTime) this._lastFrameTime = timestamp || performance.now();
    const now = timestamp || performance.now();
    let dt = (now - this._lastFrameTime) / 1000;
    this._lastFrameTime = now;
    dt = Math.min(dt, 0.05);

    if (this._rainStart) {
      const elapsed = (now - this._rainStart) / 1000;
      for (const c of this.capsules) {
        if (c.frozen && elapsed >= c.dropDelay) c.frozen = false;
      }
    }

    this._physicsTick(dt);
    for (const c of this.capsules) {
      if (c.frozen) continue;
      c.scaleX += (1 - c.scaleX) * 0.15;
      c.scaleY += (1 - c.scaleY) * 0.15;
    }
    const clawVelX = this.clawTargetX - this.clawX;
    this.chainSway += clawVelX * 0.3; this.chainSway *= 0.92;

    if (this.state === 'playing') {
      for (const c of this.capsules) {
        if (c.grabbed || c.frozen) continue;
        if (Math.abs(c.vx) < 2 && Math.abs(c.vy) < 2) {
          c.idlePhase = (c.idlePhase || 0) + dt * 3;
          c.idleOffX = Math.sin(c.idlePhase) * 0.3;
          c.idleOffY = Math.cos(c.idlePhase * 1.3) * 0.2;
        } else { c.idleOffX = 0; c.idleOffY = 0; }
      }
    }

    if (this.state === 'playing' && this.shuffleIntensity > 0) {
      this.shuffleTimer += dt;
      if (this.shuffleTimer > 1.5) {
        this.shuffleTimer = 0;
        const idx = Math.floor(Math.random() * this.capsules.length);
        const c = this.capsules[idx];
        if (!c.grabbed) {
          c.vy = -30 * this.shuffleIntensity;
          c.vx = (Math.random() - 0.5) * 20 * this.shuffleIntensity;
        }
      }
    }

    if (this.state === 'playing') {
      const clawMargin = 85; // keep housing + wider curved arms inside machine
      const clampedTarget = Math.max(this.machineLeft + clawMargin, Math.min(this.machineRight - clawMargin, this.clawTargetX));
      this.clawX += (clampedTarget - this.clawX) * 0.12;
      if (this.audio.ctx) this.audio._ambientHum();
    }

    this._draw();
    requestAnimationFrame((t) => this._gameLoop(t));
  }

  // ===== RENDER =====
  _draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.W, this.H);

    // Warm dark background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, this.H);
    bgGrad.addColorStop(0, '#1a0a10'); bgGrad.addColorStop(1, '#120810');
    ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, this.W, this.H);

    // Warm interior lighting
    const light1 = ctx.createRadialGradient(this.W * 0.35, 0, 0, this.W * 0.35, 0, this.H * 0.7);
    light1.addColorStop(0, 'rgba(255,200,150,0.03)'); light1.addColorStop(1, 'rgba(255,200,150,0)');
    ctx.fillStyle = light1; ctx.fillRect(0, 0, this.W, this.H);

    // Dynamic spotlight following claw
    const spotLight = ctx.createRadialGradient(this.clawX, 0, 0, this.clawX, 0, this.H * 0.9);
    spotLight.addColorStop(0, 'rgba(255,107,53,0.04)');
    spotLight.addColorStop(0.5, 'rgba(255,107,53,0.015)');
    spotLight.addColorStop(1, 'rgba(255,107,53,0)');
    ctx.fillStyle = spotLight; ctx.fillRect(0, 0, this.W, this.H);

    // Floor
    const floorGrad = ctx.createLinearGradient(0, this.floorY, 0, this.H);
    floorGrad.addColorStop(0, '#1e1018'); floorGrad.addColorStop(1, '#150a10');
    ctx.fillStyle = floorGrad; ctx.fillRect(0, this.floorY, this.W, this.H - this.floorY);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,107,53,0.3)'; ctx.lineWidth = 1;
    ctx.shadowColor = 'rgba(255,107,53,0.4)'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(this.machineLeft, this.floorY);
    ctx.lineTo(this.machineRight, this.floorY); ctx.stroke(); ctx.restore();

    // Rail
    ctx.strokeStyle = 'rgba(255,107,53,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(this.machineLeft, this.railY);
    ctx.lineTo(this.machineRight, this.railY); ctx.stroke();
    for (let x = this.machineLeft; x <= this.machineRight; x += 15) {
      ctx.fillStyle = 'rgba(255,107,53,0.15)';
      ctx.beginPath(); ctx.arc(x, this.railY, 1.5, 0, Math.PI * 2); ctx.fill();
    }

    // Drag guide line
    if (this.state === 'playing' || this.state === 'dropping' || this.state === 'lifting') {
      ctx.save();
      ctx.strokeStyle = `rgba(255,210,63,${this.state === 'playing' ? 0.06 : 0.10})`;
      ctx.lineWidth = 1; ctx.setLineDash([6, 8]);
      ctx.beginPath(); ctx.moveTo(this.clawX, this.railY);
      ctx.lineTo(this.clawX, this.floorY); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    for (const c of this.capsules) {
      if (c.frozen) continue;
      this._drawCapsule(ctx, c);
    }

    // Claw shadow
    const clawShadowAlpha = Math.max(0, 0.3 * (1 - this.clawY / this.floorY));
    if (clawShadowAlpha > 0.01) {
      ctx.save(); ctx.fillStyle = `rgba(0,0,0,${clawShadowAlpha})`;
      ctx.beginPath();
      ctx.ellipse(this.clawX, this.floorY - 3, 55 + (1 - this.clawY / this.floorY) * 30, 8, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.restore();
    }

    this._drawChain(ctx);
    this._drawClaw(ctx);
  }

  _drawCapsule(ctx, c) {
    const r = c.r;
    ctx.save();
    const drawX = c.x + (c.idleOffX || 0);
    const drawY = c.y + (c.idleOffY || 0);
    ctx.translate(drawX, drawY);
    ctx.scale(c.scaleX || 1, c.scaleY || 1);

    // Shadow
    const distToFloor = this.floorY - c.y;
    if (distToFloor > 0 && distToFloor < this.H) {
      const shadowAlpha = Math.max(0, 0.25 * (1 - distToFloor / (this.H * 0.8)));
      ctx.save();
      ctx.scale(1 / (c.scaleX || 1), 1 / (c.scaleY || 1));
      ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
      ctx.beginPath(); ctx.ellipse(0, distToFloor - 2, r * 0.8, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Proximity glow
    const clawTipY = this.clawY + 126;
    const dxClaw = c.x - this.clawX, dyClaw = c.y - clawTipY;
    const clawDist = Math.sqrt(dxClaw * dxClaw + dyClaw * dyClaw);
    let shadowBlur = 12;
    if (clawDist < r * 4) shadowBlur = 12 + (1 - clawDist / (r * 4)) * 25;

    ctx.shadowColor = c.color; ctx.shadowBlur = shadowBlur;
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
    grad.addColorStop(0, this._lighten(c.color, 40));
    grad.addColorStop(0.6, c.color);
    grad.addColorStop(1, this._darken(c.color, 30));
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // Band + seam
    ctx.save(); ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(-r, -r * 0.18, r * 2, r * 0.36);
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
    ctx.restore();

    // Highlights
    const shine = ctx.createRadialGradient(-r * 0.25, -r * 0.3, 0, -r * 0.1, -r * 0.1, r * 0.6);
    shine.addColorStop(0, 'rgba(255,255,255,0.5)'); shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shine; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

    const rim = ctx.createRadialGradient(r * 0.3, r * 0.3, 0, r * 0.2, r * 0.2, r * 0.7);
    rim.addColorStop(0, 'rgba(255,255,255,0.15)'); rim.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rim; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(-r * 0.15, -r * 0.25, r * 0.12, 0, Math.PI * 2); ctx.fill();

    // Fork & knife icon
    const s = r * 0.32;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineCap = 'round'; ctx.lineWidth = s * 0.22;
    ctx.beginPath(); ctx.moveTo(-s * 0.5, -s * 0.9); ctx.lineTo(-s * 0.5, s * 0.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.75, -s * 0.9); ctx.lineTo(-s * 0.75, -s * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.25, -s * 0.9); ctx.lineTo(-s * 0.25, -s * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.8, -s * 0.2); ctx.lineTo(-s * 0.2, -s * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * 0.5, -s * 0.9);
    ctx.quadraticCurveTo(s * 0.9, 0, s * 0.5, s * 0.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * 0.5, -s * 0.9); ctx.lineTo(s * 0.5, s * 0.9); ctx.stroke();

    ctx.restore();
  }

  _drawChain(ctx) {
    const segments = 8;
    const startX = this.clawX, startY = this.railY, endY = this.clawY - 24;
    const segLen = (endY - startY) / segments;
    const sway = this.chainSway * 0.15;
    ctx.lineCap = 'round';
    for (let i = 0; i < segments; i++) {
      const t0 = i / segments, t1 = (i + 1) / segments;
      const x0 = startX + Math.sin(t0 * Math.PI) * sway, y0 = startY + segLen * i;
      const x1 = startX + Math.sin(t1 * Math.PI) * sway, y1 = startY + segLen * (i + 1);
      ctx.strokeStyle = i % 2 === 0 ? 'rgba(200,170,140,0.7)' : 'rgba(160,130,100,0.6)';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x0 - 0.5, y0); ctx.lineTo(x1 - 0.5, y1); ctx.stroke();
    }
    ctx.fillStyle = '#4a3838';
    ctx.strokeStyle = 'rgba(255,107,53,0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(startX, startY, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#FF6B35'; ctx.shadowColor = '#FF6B35'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(startX, startY, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  _drawClaw(ctx) {
    const cx = this.clawX, cy = this.clawY;
    const openAmt = this.clawOpen;
    ctx.save(); ctx.translate(cx, cy);

    // Palette — heavy industrial metal
    const M = {
      face:  '#8a7e72',  // main panel face (warm concrete)
      light: '#a89e90',  // lit edge / bevel top
      mid:   '#7a6e62',  // mid tone
      dark:  '#4e4440',  // shadow edge / bevel bottom
      deep:  '#352e2a',  // recessed cavities
      rivet: '#6a605a',  // bolt heads
      accent:'#FF6B35',  // warm orange accent
      led:   '#FFD23F',  // LED gold
    };

    // Helper: draw a bevelled rounded rect (raised panel look)
    const bevelRect = (x, y, w, h, r, depthPx) => {
      const d = depthPx || 2;
      // Bottom/right shadow edge
      ctx.fillStyle = M.dark;
      ctx.beginPath();
      ctx.moveTo(x + r, y + d); ctx.lineTo(x + w - r, y + d);
      ctx.quadraticCurveTo(x + w + d, y + d, x + w + d, y + r + d);
      ctx.lineTo(x + w + d, y + h - r + d); ctx.quadraticCurveTo(x + w + d, y + h + d, x + w - r + d, y + h + d);
      ctx.lineTo(x + r, y + h + d); ctx.quadraticCurveTo(x, y + h + d, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
      // Main face
      const faceGrad = ctx.createLinearGradient(x, y, x, y + h);
      faceGrad.addColorStop(0, M.light); faceGrad.addColorStop(0.15, M.face);
      faceGrad.addColorStop(0.85, M.mid); faceGrad.addColorStop(1, M.dark);
      ctx.fillStyle = faceGrad;
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
      // Top-left highlight bevel
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + r, y + 0.5); ctx.lineTo(x + w - r, y + 0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 0.5, y + r); ctx.lineTo(x + 0.5, y + h * 0.5);
      ctx.stroke();
    };

    // Helper: draw a rivet/bolt
    const drawRivet = (rx, ry, sz) => {
      sz = sz || 3;
      ctx.fillStyle = M.dark;
      ctx.beginPath(); ctx.arc(rx, ry + 0.8, sz, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = M.rivet;
      ctx.beginPath(); ctx.arc(rx, ry, sz, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(rx - sz * 0.3, ry - sz * 0.3, sz * 0.4, 0, Math.PI * 2); ctx.fill();
    };

    // === HOUSING — chunky raised panel with bevels ===
    const hw = 110, hh = 54, hx = -hw / 2, hy = -30;
    bevelRect(hx, hy, hw, hh, 10, 4);

    // Recessed inner panel on housing
    ctx.fillStyle = M.deep;
    const ix = hx + 14, iy = hy + 10, iw = hw - 28, ih = hh - 22;
    ctx.beginPath();
    ctx.moveTo(ix + 5, iy); ctx.lineTo(ix + iw - 5, iy);
    ctx.quadraticCurveTo(ix + iw, iy, ix + iw, iy + 5);
    ctx.lineTo(ix + iw, iy + ih - 5); ctx.quadraticCurveTo(ix + iw, iy + ih, ix + iw - 5, iy + ih);
    ctx.lineTo(ix + 5, iy + ih); ctx.quadraticCurveTo(ix, iy + ih, ix, iy + ih - 5);
    ctx.lineTo(ix, iy + 5); ctx.quadraticCurveTo(ix, iy, ix + 5, iy);
    ctx.closePath(); ctx.fill();
    // Inner panel inset shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ix + 5, iy + 0.5); ctx.lineTo(ix + iw - 5, iy + 0.5); ctx.stroke();

    // Corner rivets
    drawRivet(hx + 10, hy + 10, 4);
    drawRivet(hx + hw - 10, hy + 10, 4);
    drawRivet(hx + 10, hy + hh - 10, 4);
    drawRivet(hx + hw - 10, hy + hh - 10, 4);

    // LED strip — warm gold pulsing
    const ledPulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.004);
    ctx.fillStyle = `rgba(255,210,63,${0.25 + ledPulse * 0.6})`;
    ctx.shadowColor = M.led; ctx.shadowBlur = 10 + ledPulse * 14;
    ctx.beginPath(); ctx.arc(0, hy + 13, 5, 0, Math.PI * 2); ctx.fill();
    // Side LEDs
    ctx.globalAlpha = 0.5 + ledPulse * 0.3;
    ctx.beginPath(); ctx.arc(-18, hy + 13, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(18, hy + 13, 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    // Orange accent line on housing bottom edge
    ctx.strokeStyle = M.accent; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(hx + 16, hy + hh); ctx.lineTo(hx + hw - 16, hy + hh); ctx.stroke();
    ctx.globalAlpha = 1;

    // === CENTRAL SHAFT (connects housing to arm pivot) ===
    const shaftTop = hy + hh; // bottom of housing
    const shaftW = 18, shaftH = 12;
    ctx.fillStyle = M.dark;
    ctx.fillRect(-shaftW / 2 + 1.5, shaftTop + 1.5, shaftW, shaftH);
    const shGrad = ctx.createLinearGradient(-shaftW / 2, 0, shaftW / 2, 0);
    shGrad.addColorStop(0, M.dark); shGrad.addColorStop(0.2, M.light);
    shGrad.addColorStop(0.5, M.face); shGrad.addColorStop(0.8, M.mid); shGrad.addColorStop(1, M.dark);
    ctx.fillStyle = shGrad;
    ctx.fillRect(-shaftW / 2, shaftTop, shaftW, shaftH);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(-shaftW / 2 + 1, shaftTop, shaftW - 2, 2);

    // === ARM PIVOT JOINT ===
    const pivotY = shaftTop + shaftH;
    const pivotR = 14;
    ctx.fillStyle = M.dark;
    ctx.beginPath(); ctx.arc(0, pivotY + 1.5, pivotR, 0, Math.PI * 2); ctx.fill();
    const pGrad = ctx.createRadialGradient(-2, pivotY - 2, 0, 0, pivotY, pivotR);
    pGrad.addColorStop(0, M.light); pGrad.addColorStop(0.6, M.face); pGrad.addColorStop(1, M.dark);
    ctx.fillStyle = pGrad;
    ctx.beginPath(); ctx.arc(0, pivotY, pivotR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
    for (let a = 0; a < 6; a++) {
      const ang = a * Math.PI / 3;
      ctx.beginPath(); ctx.moveTo(0, pivotY);
      ctx.lineTo(Math.cos(ang) * (pivotR - 3), pivotY + Math.sin(ang) * (pivotR - 3));
      ctx.stroke();
    }
    ctx.fillStyle = M.deep;
    ctx.beginPath(); ctx.arc(0, pivotY, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(-1.5, pivotY - 1.5, 2, 0, Math.PI * 2); ctx.fill();

    // === TWO CURVED ARMS — bow outward, rubber tips ===
    const armLen = 88;
    const armW = 14;
    const tipR = 12;
    // Closed: tips cup around capsule (radius 36); Open: arms spread wide
    const startSpread = 12 + openAmt * 6;
    const bowPeak = 50 + openAmt * 28;
    const tipSpread = 34 + openAmt * 16;

    const _drawArm = (side) => {
      const s = side;
      // Quadratic bezier: start near pivot, bow outward, end at tip
      const ax = s * startSpread, ay = pivotY + 4;
      const cpx = s * bowPeak, cpy = pivotY + armLen * 0.45;
      const ex = s * tipSpread, ey = pivotY + armLen;

      // 1. Outer shadow
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = armW + 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.quadraticCurveTo(cpx, cpy, ex, ey); ctx.stroke();
      // 2. Dark edge
      ctx.strokeStyle = M.dark; ctx.lineWidth = armW + 2;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.quadraticCurveTo(cpx, cpy, ex, ey); ctx.stroke();
      // 3. Main body
      ctx.strokeStyle = M.face; ctx.lineWidth = armW;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.quadraticCurveTo(cpx, cpy, ex, ey); ctx.stroke();
      // 4. Broad highlight
      ctx.strokeStyle = M.light; ctx.lineWidth = armW * 0.4;
      ctx.beginPath(); ctx.moveTo(ax - s * 1.5, ay); ctx.quadraticCurveTo(cpx - s * 2, cpy, ex - s * 1.5, ey); ctx.stroke();
      // 5. Specular line
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(ax - s * 3, ay); ctx.quadraticCurveTo(cpx - s * 3.5, cpy, ex - s * 3, ey); ctx.stroke();

      // Elbow band (decorative ring at mid-arm)
      const mt = 0.45;
      const mx = ax * (1 - mt) * (1 - mt) + 2 * cpx * (1 - mt) * mt + ex * mt * mt;
      const my = ay * (1 - mt) * (1 - mt) + 2 * cpy * (1 - mt) * mt + ey * mt * mt;
      ctx.fillStyle = M.dark;
      ctx.beginPath(); ctx.arc(mx, my, armW * 0.55 + 1, 0, Math.PI * 2); ctx.fill();
      const eGrad = ctx.createRadialGradient(mx - 1, my - 1, 0, mx, my, armW * 0.55);
      eGrad.addColorStop(0, M.light); eGrad.addColorStop(0.5, M.mid); eGrad.addColorStop(1, M.dark);
      ctx.fillStyle = eGrad;
      ctx.beginPath(); ctx.arc(mx, my, armW * 0.55, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = M.deep;
      ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI * 2); ctx.fill();

      // Joint ring at arm base
      ctx.fillStyle = M.dark;
      ctx.beginPath(); ctx.arc(ax, ay, armW * 0.5 + 1, 0, Math.PI * 2); ctx.fill();
      const jGrad = ctx.createRadialGradient(ax - 1, ay - 1, 0, ax, ay, armW * 0.5);
      jGrad.addColorStop(0, M.light); jGrad.addColorStop(0.6, M.face); jGrad.addColorStop(1, M.dark);
      ctx.fillStyle = jGrad;
      ctx.beginPath(); ctx.arc(ax, ay, armW * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = M.deep;
      ctx.beginPath(); ctx.arc(ax, ay, 2.5, 0, Math.PI * 2); ctx.fill();

      // === RUBBER TIP PAD ===
      const tcx = ex, tcy = ey + tipR * 0.2;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.ellipse(tcx + 1, tcy + 2, tipR + 2, tipR * 1.4 + 2, 0, 0, Math.PI * 2); ctx.fill();
      // Body
      const tGrad = ctx.createRadialGradient(tcx - s * 2, tcy - 3, 0, tcx, tcy, tipR * 1.6);
      tGrad.addColorStop(0, '#ffaa70'); tGrad.addColorStop(0.35, '#FF6B35');
      tGrad.addColorStop(0.7, '#e05a28'); tGrad.addColorStop(1, '#a03a10');
      ctx.fillStyle = tGrad; ctx.shadowColor = M.accent; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.ellipse(tcx, tcy, tipR, tipR * 1.4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath(); ctx.ellipse(tcx - s * 2, tcy - tipR * 0.5, tipR * 0.45, tipR * 0.35, -s * 0.3, 0, Math.PI * 2); ctx.fill();
      // Grip ridges
      ctx.strokeStyle = 'rgba(200,120,60,0.25)'; ctx.lineWidth = 1;
      for (let ri = 0; ri < 3; ri++) {
        const ry = tcy - tipR * 0.5 + ri * tipR * 0.5;
        const rw = tipR * (0.7 - Math.abs(ri - 1) * 0.12);
        ctx.beginPath(); ctx.moveTo(tcx - rw, ry); ctx.lineTo(tcx + rw, ry); ctx.stroke();
      }
    };

    _drawArm(-1);
    _drawArm(1);
    ctx.restore(); // main claw translation
  }

  _lighten(hex, amt) {
    return `rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+amt)},${Math.min(255,parseInt(hex.slice(3,5),16)+amt)},${Math.min(255,parseInt(hex.slice(5,7),16)+amt)})`;
  }
  _darken(hex, amt) {
    return `rgb(${Math.max(0,parseInt(hex.slice(1,3),16)-amt)},${Math.max(0,parseInt(hex.slice(3,5),16)-amt)},${Math.max(0,parseInt(hex.slice(5,7),16)-amt)})`;
  }
}

// ============================================
// BOOT
// ============================================
const ambientBg = new AmbientBackground(document.getElementById('ambient-bg'));
const game = new MakanClawGame();
</script>
