<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MakanClaw</title>
<link rel="stylesheet" href="../makan-theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== WARM ARCADE THEME ===== */
:root {
  --bg: #1a0a10;
  --bg-alt: #120810;
  --neon-orange: #FF6B35;
  --neon-gold: #FFD23F;
  --neon-pink: #EF476F;
  --neon-yellow: #FFD600;
  --glass: rgba(255,200,150,0.06);
  --text: #FFF5EB;
  --text-dim: #B89878;
  --machine-frame: #1e1018;
  --machine-edge: #302020;
}

/* ===== LOADING SCREEN ===== */
#loading-screen {
  position: fixed; inset: 0;
  z-index: 10000;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  transition: opacity 0.4s, visibility 0.4s;
}

#loading-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loading-logo {
  font-size: 28px;
  font-weight: 900;
  color: var(--neon-orange);
  font-family: 'Orbitron', system-ui, sans-serif;
  text-shadow: 0 0 15px rgba(255,107,53,0.6), 0 0 40px rgba(255,107,53,0.3);
  animation: loadingPulse 1.2s ease-in-out infinite;
}

@keyframes loadingPulse {
  0%, 100% { opacity: 0.6; transform: scale(0.98); }
  50% { opacity: 1; transform: scale(1); }
}

.loading-bar {
  width: 120px;
  height: 3px;
  background: rgba(255,200,150,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.loading-bar-inner {
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, var(--neon-orange), var(--neon-gold));
  border-radius: 2px;
  animation: loadingSlide 1s ease-in-out infinite;
}

@keyframes loadingSlide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Orbitron', system-ui, sans-serif;
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#ambient-bg {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
}

#app {
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
  max-width: 500px;
  margin: 0 auto;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 1;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  background: var(--bg);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 24px 16px;
}

#title-screen .brand-tag,
#title-screen .title-main,
#title-screen .title-sub,
#title-screen .claw-icon,
#title-screen #filter-wrap,
#title-screen .neon-btn,
#title-screen .title-capsules {
  opacity: 0;
  transform: translateY(18px);
}

.brand-tag {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.title-main {
  font-size: clamp(36px, 10vw, 56px);
  font-weight: 900;
  text-align: center;
  line-height: 1.1;
  color: var(--neon-orange);
  text-shadow:
    0 0 10px rgba(255,107,53,0.8),
    0 0 30px rgba(255,107,53,0.5),
    0 0 60px rgba(255,107,53,0.3);
  animation: titlePulse 2s ease-in-out infinite alternate;
}

.title-sub {
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 400;
  color: var(--neon-gold);
  margin-top: 8px;
  letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(255,210,63,0.6);
}

@keyframes titlePulse {
  0% { text-shadow: 0 0 10px rgba(255,107,53,0.8), 0 0 30px rgba(255,107,53,0.5), 0 0 60px rgba(255,107,53,0.3); }
  100% { text-shadow: 0 0 20px rgba(255,107,53,1), 0 0 50px rgba(255,107,53,0.7), 0 0 90px rgba(255,107,53,0.4); }
}

.claw-icon {
  margin: 30px 0;
  width: 80px; height: 80px;
}

.claw-icon svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 12px rgba(255,107,53,0.6));
  animation: clawIdle 2.5s ease-in-out infinite;
}

@keyframes clawIdle {
  0%, 100% { transform: scaleX(1); }
  50% { transform: scaleX(1.08); }
}

.neon-btn {
  margin-top: 40px;
  padding: 16px 48px;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  background: transparent;
  color: var(--neon-gold);
  border: 2px solid var(--neon-gold);
  border-radius: 50px;
  cursor: pointer;
  animation: btnPulse 1.5s ease-in-out infinite;
  transition: all 0.2s;
}

.neon-btn:hover {
  background: rgba(255,210,63,0.08);
  box-shadow: 0 0 30px rgba(255,210,63,0.5), inset 0 0 20px rgba(255,210,63,0.15);
  text-shadow: 0 0 12px rgba(255,210,63,0.8);
}

.neon-btn:active {
  transform: scale(0.95);
  background: rgba(255,210,63,0.15);
}

.neon-btn:focus-visible {
  outline: 2px solid var(--neon-gold);
  outline-offset: 3px;
}

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 10px rgba(255,210,63,0.3), inset 0 0 10px rgba(255,210,63,0.1); }
  50% { box-shadow: 0 0 25px rgba(255,210,63,0.6), inset 0 0 20px rgba(255,210,63,0.2); }
}

.title-capsules {
  position: absolute;
  bottom: 60px;
  display: flex;
  gap: 12px;
  opacity: 0.4;
}

.mini-capsule {
  width: 20px; height: 20px;
  border-radius: 50%;
  animation: float 3s ease-in-out infinite;
}

.mini-capsule:nth-child(1) { background: var(--neon-pink); animation-delay: 0s; }
.mini-capsule:nth-child(2) { background: var(--neon-gold); animation-delay: 0.5s; }
.mini-capsule:nth-child(3) { background: var(--neon-orange); animation-delay: 1s; }
.mini-capsule:nth-child(4) { background: #06D6A0; animation-delay: 1.5s; }
.mini-capsule:nth-child(5) { background: var(--neon-pink); animation-delay: 2s; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ===== FILTERS ===== */
#filter-wrap {
  display: none; flex-direction: column; gap: 9px;
  width: 90%; max-width: 380px; margin-top: 12px;
}
.filter-row { display: flex; align-items: flex-start; gap: 7px; }
.flabel {
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text-dim);
  min-width: 46px; padding-top: 5px; flex-shrink: 0; text-align: right;
  font-family: 'Orbitron', sans-serif;
}
.fpills { display: flex; flex-wrap: wrap; gap: 5px; }
.fpill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border: none; border-radius: 99px;
  font-family: var(--font), system-ui, sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer;
  background: rgba(255,200,150,0.06); color: var(--text-dim);
  border: 1px solid rgba(255,200,150,0.08);
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
              background 0.15s ease, box-shadow 0.15s ease;
  user-select: none; -webkit-user-select: none;
}
.fpill:hover  { background: rgba(255,107,53,0.14); transform: scale(1.07); }
.fpill.active { background: var(--neon-orange); color: #fff;
                box-shadow: 0 2px 10px rgba(255,107,53,0.38); transform: scale(1.05);
                border-color: transparent; }
.filter-divider { width: 100%; height: 1px; background: rgba(255,200,150,0.08); margin: 2px 0; }
#filter-count {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-align: center; transition: color 0.2s ease;
  font-family: 'Orbitron', sans-serif;
}
#filter-count.empty { color: var(--neon-pink); }

.neon-btn:disabled {
  opacity: 0.45; cursor: default; pointer-events: none;
  animation: none; box-shadow: none;
}

/* ===== SOUND TOGGLE ===== */
#sound-toggle {
  position: fixed;
  top: env(safe-area-inset-top, 12px);
  right: 14px;
  z-index: 400;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,200,150,0.12);
  background: rgba(26,10,16,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  padding-top: env(safe-area-inset-top, 0);
}

#sound-toggle:hover {
  border-color: var(--neon-gold);
  color: var(--neon-gold);
}

#sound-toggle.muted {
  color: rgba(255,255,255,0.2);
}

/* ===== SCREEN TRANSITIONS ===== */
.screen-enter {
  animation: screenSlideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes screenSlideIn {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== GAME SCREEN ===== */
#game-screen {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
}

#game-screen.active { display: flex; }

.machine-wrapper {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
}

.machine-top-bar {
  width: 100%;
  height: 28px;
  background: linear-gradient(180deg, #302020, #1e1018);
  border-radius: 12px 12px 0 0;
  border: 1px solid rgba(255,107,53,0.3);
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 5;
}

.machine-top-bar::after {
  content: 'MAKAN CLAW';
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--neon-orange);
  text-shadow: 0 0 8px rgba(255,107,53,0.5);
}

.neon-strip {
  position: absolute;
  top: 0; left: 10px; right: 10px;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    var(--neon-orange) 0px, var(--neon-orange) 4px,
    transparent 4px, transparent 8px
  );
  background-size: 200% 100%;
  box-shadow: 0 0 8px var(--neon-orange), 0 0 20px var(--neon-orange);
  border-radius: 2px;
  animation: neonFlicker 3s ease-in-out infinite, ledChase 1.5s linear infinite;
}

@keyframes ledChase {
  0% { background-position: 0% 0; }
  100% { background-position: -200% 0; }
}

@keyframes neonFlicker {
  0%, 100% { opacity: 1; }
  15% { opacity: 0.85; }
  47% { opacity: 0.6; }
  48% { opacity: 1; }
  73% { opacity: 0.7; }
  74% { opacity: 1; }
  91% { opacity: 0.5; }
  93% { opacity: 1; }
}

.machine-body {
  width: 100%;
  flex: 1;
  position: relative;
  background: var(--machine-frame);
  border-left: 3px solid var(--machine-edge);
  border-right: 3px solid var(--machine-edge);
  overflow: hidden;
}

.machine-body::before,
.machine-body::after {
  content: '';
  position: absolute;
  top: 8px; bottom: 8px;
  width: 6px;
  z-index: 4;
  pointer-events: none;
  border-radius: 2px;
}

.machine-body::before {
  left: 0;
  background: linear-gradient(180deg, rgba(255,107,53,0.12), transparent 30%, transparent 70%, rgba(255,107,53,0.12));
  border-right: 1px solid rgba(255,107,53,0.08);
}

.machine-body::after {
  right: 0;
  background: linear-gradient(180deg, rgba(255,107,53,0.12), transparent 30%, transparent 70%, rgba(255,107,53,0.12));
  border-left: 1px solid rgba(255,107,53,0.08);
}

.machine-bolt {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #4a3838, #2a1818);
  border: 1px solid rgba(255,200,150,0.06);
  z-index: 5;
  pointer-events: none;
}

.glass-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,200,150,0.04) 0%, transparent 40%, transparent 60%, rgba(255,200,150,0.02) 100%);
  backdrop-filter: blur(0.5px);
  -webkit-backdrop-filter: blur(0.5px);
  pointer-events: none;
  z-index: 3;
}

.glass-reflection {
  position: absolute;
  top: 0; left: -30%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,220,180,0.05), transparent);
  transform: skewX(-15deg);
  pointer-events: none;
  z-index: 3;
  animation: reflectionSlide 6s ease-in-out infinite;
}

.glass-reflection-2 {
  position: absolute;
  top: 0; right: -40%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,220,180,0.02), transparent);
  transform: skewX(20deg);
  pointer-events: none;
  z-index: 3;
  animation: reflectionSlide2 8s ease-in-out infinite;
}

@keyframes reflectionSlide2 {
  0%, 100% { right: -40%; }
  50% { right: 110%; }
}

@keyframes reflectionSlide {
  0%, 100% { left: -30%; }
  50% { left: 100%; }
}

#game-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

.crt-scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.15) 3px,
    rgba(0,0,0,0.15) 4px
  );
  opacity: 0.06;
  pointer-events: none;
  z-index: 4;
}

.machine-bottom {
  width: 100%;
  height: 32px;
  background: linear-gradient(0deg, #1e1018, #302020);
  border-radius: 0 0 12px 12px;
  border: 1px solid rgba(255,107,53,0.3);
  border-top: none;
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
}

.machine-bottom-label {
  font-size: 7px;
  letter-spacing: 3px;
  color: var(--text-dim);
  opacity: 0.4;
}

.machine-bottom::before {
  content: '';
  position: absolute;
  top: 0; left: 10px; right: 10px;
  height: 2px;
  background: repeating-linear-gradient(
    90deg,
    var(--neon-gold) 0px, var(--neon-gold) 3px,
    transparent 3px, transparent 7px
  );
  background-size: 200% 100%;
  opacity: 0.4;
  box-shadow: 0 0 6px rgba(255,210,63,0.3);
  animation: ledChase 2s linear infinite reverse;
}

/* Game HUD */
.game-hud {
  position: absolute;
  top: 46px; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  pointer-events: none;
}

.attempt-dots {
  display: flex; gap: 5px; align-items: center;
}
.adot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}
.adot.active {
  background: var(--neon-yellow);
  border-color: var(--neon-yellow);
  box-shadow: 0 0 6px var(--neon-yellow);
}
.adot.used {
  background: rgba(255,107,53,0.5);
  border-color: rgba(255,107,53,0.6);
}

.cuisine-badge {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--neon-yellow);
  background: rgba(255,214,0,0.1);
  border: 1px solid rgba(255,214,0,0.3);
  padding: 4px 10px;
  border-radius: 20px;
}

.status-message {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 8;
  font-size: clamp(20px, 6vw, 32px);
  font-weight: 900;
  letter-spacing: 3px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
}

/* Controls area */
.controls-area {
  height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 20px;
  gap: 6px;
}

.instruction-text {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-align: center;
}

#drop-btn {
  width: 80%;
  height: 56px;
  border-radius: 28px;
  border: 2px solid var(--neon-orange);
  background: linear-gradient(180deg, rgba(255,107,53,0.25), rgba(239,71,111,0.15));
  color: var(--neon-orange);
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 4px;
  cursor: pointer;
  box-shadow:
    0 0 20px rgba(255,107,53,0.3),
    0 0 40px rgba(255,107,53,0.1),
    inset 0 0 15px rgba(255,107,53,0.1),
    inset 0 1px 0 rgba(255,255,255,0.08);
  transition: all 0.15s;
  flex-shrink: 0;
  text-shadow: 0 0 10px rgba(255,107,53,0.6);
  animation: dropBtnPulse 2s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

#drop-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  transform: translateX(-100%);
  animation: dropBtnShine 3s ease-in-out infinite;
}

@keyframes dropBtnShine {
  0%, 70% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@keyframes dropBtnPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255,107,53,0.3), 0 0 40px rgba(255,107,53,0.1), inset 0 0 15px rgba(255,107,53,0.1); }
  50% { box-shadow: 0 0 30px rgba(255,107,53,0.5), 0 0 60px rgba(255,107,53,0.15), inset 0 0 20px rgba(255,107,53,0.15); }
}

#drop-btn:hover:not(:disabled) {
  background: linear-gradient(180deg, rgba(255,107,53,0.35), rgba(239,71,111,0.25));
  box-shadow: 0 0 35px rgba(255,107,53,0.5), 0 0 70px rgba(255,107,53,0.2), inset 0 0 25px rgba(255,107,53,0.15);
  text-shadow: 0 0 15px rgba(255,107,53,0.9);
  transform: translateY(-1px);
}

#drop-btn:active { transform: scale(0.96); }

#drop-btn:focus-visible {
  outline: 2px solid var(--neon-orange);
  outline-offset: 3px;
}

#drop-btn:disabled {
  opacity: 0.25; pointer-events: none;
  animation: none;
}

#drop-btn:disabled::before { animation: none; }

.arrow-icon {
  font-size: 18px;
  color: var(--neon-gold);
  animation: arrowBounce 1s ease-in-out infinite alternate;
}

@keyframes arrowBounce {
  0% { transform: translateX(-3px); }
  100% { transform: translateX(3px); }
}

/* ===== RESULT SCREEN ===== */
#result-screen {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: radial-gradient(ellipse at center, #251218 0%, var(--bg) 70%);
  padding: 24px;
}

#result-screen.active { display: flex; }

.result-header {
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--neon-gold);
  text-shadow: 0 0 10px rgba(255,210,63,0.5);
  margin-bottom: 8px;
}

.result-card {
  width: 100%;
  max-width: 340px;
  background: linear-gradient(145deg, rgba(40,22,28,0.95), rgba(26,10,16,0.95));
  border: 1px solid rgba(255,107,53,0.3);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 20px;
  padding: 1px;
  background: conic-gradient(from var(--border-angle, 0deg), var(--neon-orange), var(--neon-pink), var(--neon-gold), var(--neon-orange));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: borderSpin 3s linear infinite;
  opacity: 0.7;
}

@keyframes borderSpin {
  0% { --border-angle: 0deg; }
  100% { --border-angle: 360deg; }
}

@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.result-logo {
  width: 72px; height: 72px;
  border-radius: 16px;
  object-fit: contain;
  background: rgba(255,255,255,0.9);
  padding: 6px;
  margin: 0 auto 16px;
  display: block;
}

.result-emoji { font-size: 48px; margin-bottom: 16px; }

.restaurant-name {
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 900;

/* ===== CAPSULE OPEN OVERLAY ===== */
#capsule-open-overlay {
  position: absolute; inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 150;

}

.capsule-open-scene {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.capsule-half {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
}

.capsule-half-left {
  clip-path: inset(0 50% 0 0);
  transform-origin: center right;
}

.capsule-half-right {
  clip-path: inset(0 0 0 50%);
  transform-origin: center left;
}

.capsule-half-inner {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  position: relative;
}

.capsule-half-inner::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 60%);
}

.capsule-open-emoji {
  position: absolute;
  font-size: 0px;
  opacity: 0;
  filter: drop-shadow(0 0 20px rgba(255,214,0,0.8));
  z-index: 2;
}

.capsule-open-label {
  position: absolute;
  bottom: -10px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--neon-gold);
  text-shadow: 0 0 10px rgba(255,210,63,0.5);
  opacity: 0;
  white-space: nowrap;
}

.capsule-glow-ring {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid transparent;
  opacity: 0;
  z-index: 0;
}

.capsule-light-rays {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
}

.capsule-light-ray {
  position: absolute;
  top: 50%; left: 50%;
  width: 3px;
  height: 80px;
  transform-origin: center top;
  border-radius: 2px;
  opacity: 0.6;
}

/* ===== CONFETTI + FLASH + SHAKE ===== */
#confetti-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 300;
  pointer-events: none;
}

.flash-overlay {
  position: fixed; inset: 0;
  background: white;
  z-index: 250;
  opacity: 0;
  pointer-events: none;
}

.shake { animation: screenShake 0.45s ease-out; }

@keyframes screenShake {
  0%, 100% { transform: translate(0) rotate(0); }
  10% { transform: translate(-12px, 4px) rotate(-1.5deg); }
  20% { transform: translate(10px, -6px) rotate(1.5deg); }
  30% { transform: translate(-8px, 6px) rotate(-1deg); }
  40% { transform: translate(6px, -4px) rotate(1deg); }
  50% { transform: translate(-4px, 2px) rotate(-0.5deg); }
  60% { transform: translate(4px, -2px) rotate(0.5deg); }
  70% { transform: translate(-2px, 2px) rotate(-0.3deg); }
  80% { transform: translate(1px, -1px) rotate(0.2deg); }
}

/* ===== LANDSCAPE BLOCKER ===== */
