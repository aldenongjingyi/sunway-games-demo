<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover: respect safe-area insets on iPads with home bar / notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MakanGlobe</title>
  <link rel="stylesheet" href="../makan-theme.css">
  <!-- Three.js r169 — bundled locally (no CDN dependency) -->
  <script type="importmap">
    {"imports":{"three":"./three.module.min.js"}}
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      /* touch-action on html/body guards against scroll-hijack */
      touch-action: none;
      /* Radial glow centred on globe — feels like space with a backlit orb */
      background:
        radial-gradient(ellipse at 48% 46%, rgba(0, 60, 140, 0.22) 0%, transparent 58%),
        linear-gradient(160deg, #060e1e 0%, #0a1628 100%);
    }

    /* Three.js canvas fills the screen */
    #canvas-wrap {
      position: fixed; inset: 0; z-index: 0;
      user-select: none; -webkit-user-select: none;
      /* touch-action on the element itself is the spec-correct approach */
      touch-action: none;
      cursor: grab;
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
    }

    /* ── Loading overlay / start screen ── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    .fe {
      position: absolute; opacity: 0.28;
      animation: fe-float var(--d, 6s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    @keyframes fe-float {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      30%       { transform: translateY(-22px) rotate(9deg) scale(1.07); }
      65%       { transform: translateY(13px) rotate(-4deg) scale(0.95); }
    }
    .start-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 28px; padding: 44px 54px 40px;
      box-shadow:
        0 0 0 1px rgba(0,201,160,0.20),
        0 24px 80px rgba(0,0,0,0.60),
        0 2px 12px rgba(0,0,0,0.30);
      border: 1.5px solid rgba(255,255,255,0.65);
      text-align: center;
    }
    .start-icon {
      font-size: 68px; line-height: 1;
      animation: makan-bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .start-title {
      font-family: var(--font);
      font-size: 46px; font-weight: 900; color: #00C9A0;
      letter-spacing: -2px; line-height: 1; margin-top: 2px;
    }
    .start-rule {
      width: 44px; height: 4px;
      background: linear-gradient(90deg, #00C9A0, #4FACFE);
      border-radius: 2px; margin: 2px 0 4px;
    }
    .start-sub {
      font-family: var(--font);
      font-size: 15px; font-weight: 700; color: var(--makan-text-2);
      max-width: 230px; line-height: 1.45;
    }
    .spin-how {
      font-family: var(--font);
      font-size: 11px; font-weight: 700;
      color: rgba(10, 40, 80, 0.45);
      letter-spacing: 0.03em; text-align: center;
      margin-top: 0; margin-bottom: 2px;
    }
    #loading-state {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-top: 4px;
    }
    #loading-text {
      font-family: var(--font);
      font-size: 15px; font-weight: 700; color: var(--makan-text-2);
    }
    #tap-prompt {
      display: none; margin-top: 4px;
      font-family: var(--font);
      font-size: 18px; font-weight: 900; cursor: pointer;
      padding: 15px 46px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE); color: #fff;
      border: none; border-radius: var(--r-full);
      box-shadow: 0 4px 22px rgba(0,201,160,0.45);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease, opacity 0.2s ease;
      user-select: none; -webkit-user-select: none;
    }
    #tap-prompt:not(:disabled):hover { transform: scale(1.07); box-shadow: 0 6px 32px rgba(0,201,160,0.58); }
    #tap-prompt:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Filters ── */
    #filter-wrap { display: none; flex-direction: column; gap: 9px; width: 100%; margin-top: 4px; }
    .filter-row { display: flex; align-items: flex-start; gap: 7px; }
    .flabel {
      font-family: var(--font);
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--makan-text-muted);
      min-width: 46px; padding-top: 7px; flex-shrink: 0; text-align: right;
    }
    .fpills { display: flex; flex-wrap: wrap; gap: 5px; }
    .fpill {
      display: inline-flex; align-items: center; gap: 3px;
      /* Minimum 44px touch target height for kiosk use */
      padding: 10px 14px; border: none; border-radius: 99px;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer;
      background: rgba(10, 30, 60, 0.07);
      color: var(--makan-text-2);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.15s ease, box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    .fpill:hover  { background: rgba(0,201,160,0.14); transform: scale(1.06); }
    .fpill.active {
      background: linear-gradient(135deg, #00C9A0, #4FACFE); color: #fff;
      box-shadow: 0 2px 10px rgba(0,201,160,0.40); transform: scale(1.04);
    }
    .filter-divider { width: 100%; height: 1px; background: rgba(0,201,160,0.18); margin: 2px 0; }
    #filter-count {
      font-family: var(--font); font-size: 12px; font-weight: 700;
      color: var(--makan-text-muted); text-align: center; transition: color 0.2s ease;
    }
    #filter-count.empty { color: var(--makan-coral); }

    /* ── Drag Hint — opacity-based so it can transition in ── */
    #drag-hint {
      position: fixed; top: 22px; left: 50%;
      transform: translateX(-50%);
      z-index: 100; pointer-events: none;
      font-family: var(--font);
      font-size: 11px; font-weight: 800;
      color: rgba(255, 255, 255, 0.90);
      letter-spacing: 0.10em; text-transform: uppercase;
      background: rgba(0,0,0,0.32); backdrop-filter: blur(8px);
      padding: 7px 18px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #drag-hint.visible { opacity: 1; }

    /* ── In-game brand badge ── */
    #game-badge {
      position: fixed; top: 16px; left: 16px;
      z-index: 50; display: none;
      padding: 7px 14px;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 99px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.80); letter-spacing: -0.01em;
    }

    /* ── Spin-harder toast ── */
    #spin-toast {
      position: fixed; bottom: 96px; left: 50%;
      transform: translateX(-50%);
      z-index: 50; pointer-events: none;
      padding: 10px 22px; border-radius: 99px;
      background: rgba(15,20,40,0.88); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      color: #fff; font-family: var(--font); font-size: 14px; font-weight: 800;
      white-space: nowrap;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #spin-toast.show { opacity: 1; }

    /* ── Result Backdrop ── */
    #result-backdrop {
      position: fixed; inset: 0;
      background: rgba(10, 15, 30, 0.52);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(4px);
    }
    #result-backdrop.visible { opacity: 1; pointer-events: auto; }

    /* ── Result Dialog ── */
    #result-dialog {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.72);
      z-index: 1000;
      background: #fff; border-radius: 28px;
      padding: 48px 44px 40px;
      text-align: center; max-width: 420px; width: 92%;
      opacity: 0; pointer-events: none;
      transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }
    /* Gradient colour bar across the top of the result card */
    #result-dialog::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00C9A0 0%, #4FACFE 50%, #00C9A0 100%);
    }
    #result-dialog.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1; pointer-events: auto;
    }
    /* Close button — absolute inside fixed container, positions relative to dialog */
    #result-close {
      position: absolute; top: 14px; right: 14px;
      width: 34px; height: 34px;
      border: none; border-radius: 50%;
      background: #f3f4f6; color: #6b7280;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
    }
    #result-close:hover  { background: #e5e7eb; color: #374151; }
    #result-close:active { background: #d1d5db; }

    #result-label {
      font-family: var(--font);
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 3px;
      background: linear-gradient(90deg, #00C9A0, #4FACFE);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 22px;
    }
    /* Consistent circular shape for both logo and fallback */
    #result-logo {
      width: 110px; height: 110px;
      object-fit: contain; border-radius: 50%;
      margin: 0 auto 18px; display: block;
    }
    #result-logo-fallback {
      width: 110px; height: 110px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      border-radius: 50%; display: none;
      align-items: center; justify-content: center;
      font-family: var(--font);
      font-size: 48px; font-weight: 900; color: #fff;
      margin: 0 auto 18px;
    }
    /* Logo pop-in animation triggered when dialog becomes visible */
    @keyframes pop-logo {
      0%   { transform: scale(0.5) rotate(-12deg); opacity: 0; }
      70%  { transform: scale(1.18) rotate(3deg);  opacity: 1; }
      100% { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }
    #result-dialog.visible #result-logo,
    #result-dialog.visible #result-logo-fallback {
      animation: pop-logo 0.55s 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #result-name {
      font-family: var(--font);
      font-size: 30px; font-weight: 900; color: #111827;
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    #result-venue {
      font-family: var(--font);
      font-size: 13px; color: #6b7280;
      margin-bottom: 32px; font-weight: 700;
    }
    /* Show venue as a grey pill badge when non-empty */
    #result-venue:not(:empty) {
      display: inline-block;
      background: #f3f4f6;
      border-radius: 99px;
      padding: 5px 14px;
    }
    #spin-again-btn {
      padding: 16px 44px; border: none; border-radius: 50px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      color: #fff;
      font-family: var(--font);
      font-size: 18px; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 201, 160, 0.38);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    #spin-again-btn:hover  { transform: scale(1.04); box-shadow: 0 6px 22px rgba(0,201,160,0.52); }
    #spin-again-btn:active { transform: scale(0.96); }

    /* ── Confetti burst ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 2000;
      font-size: 28px;
      line-height: 1;
      animation: confetti-fly 0.95s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }
    @keyframes confetti-fly {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.2); opacity: 0; }
    }

    /* ── Logo overlay layer ── */
    #logo-layer {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    /* Fixed 38×38 baseline; JS uses scale() to resize — avoids layout thrash */
    .mlogo {
      position: absolute; left: 0; top: 0;
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid;
      background: #fff;
      display: none;
      will-change: transform, opacity;
      /* White inner ring + drop shadow */
      box-shadow:
        0 0 0 2.5px rgba(255,255,255,0.92),
        0 3px 12px rgba(0,0,0,0.38);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.40));
    }
    /* Frontmost marker gets a pulsing teal ring */
    .mlogo--front {
      box-shadow:
        0 0 0 2.5px rgba(255,255,255,0.92),
        0 0 0 6px rgba(0,201,160,0.55),
        0 3px 14px rgba(0,0,0,0.42);
      z-index: 1;
      animation: front-pulse 1.8s ease-in-out infinite;
    }
    @keyframes front-pulse {
      0%, 100% { box-shadow: 0 0 0 2.5px rgba(255,255,255,0.92), 0 0 0 6px  rgba(0,201,160,0.55), 0 3px 14px rgba(0,0,0,0.42); }
      50%       { box-shadow: 0 0 0 2.5px rgba(255,255,255,0.92), 0 0 0 11px rgba(0,201,160,0.18), 0 3px 14px rgba(0,0,0,0.42); }
    }
    /* Logo pop-in — brightness flash on first load (filter doesn't conflict with JS transform) */
    @keyframes logo-pop-in {
      0%   { filter: brightness(2.2) drop-shadow(0 0 16px rgba(0,201,160,0.95)); }
      100% { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.40)); }
    }
    .mlogo--popin { animation: logo-pop-in 0.65s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── Swipe Guide ── */
    #swipe-guide {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 110px; height: 110px;
      pointer-events: none; z-index: 8;
      opacity: 0; transition: opacity 0.9s ease;
    }
    #swipe-guide.visible { opacity: 1; }
    .sg-ring {
      position: absolute; inset: 18px; border-radius: 50%;
      border: 1.5px solid rgba(0,201,160,0.65);
      animation: sg-expand 2.8s ease-out infinite;
    }
    .sg-r2 { animation-delay: 1.4s; }
    @keyframes sg-expand {
      0%   { transform: scale(1);   opacity: 0.85; }
      100% { transform: scale(3.2); opacity: 0;    }
    }
    .sg-arr {
      position: absolute;
      font-family: var(--font); font-size: 22px; font-weight: 900; color: #fff;
      text-shadow: 0 0 16px rgba(0,201,160,1), 0 0 32px rgba(0,201,160,0.5);
      /* All four arrows pulse simultaneously — no sequence implied */
      animation: sg-glow 2.0s ease-in-out infinite;
    }
    .sg-up { top: -28px;    left: 50%; transform: translateX(-50%); }
    .sg-dn { bottom: -28px; left: 50%; transform: translateX(-50%); }
    .sg-lt { left: -28px;   top: 50%;  transform: translateY(-50%); }
    .sg-rt { right: -28px;  top: 50%;  transform: translateY(-50%); }
    @keyframes sg-glow {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 1.00; }
    }

    /* ── Shuffle FAB — safe-area aware ── */
    #refresh-btn {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      left: calc(24px + env(safe-area-inset-left));
      z-index: 20; display: none;
      padding: 13px 20px;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.88); border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s ease;
    }
    #refresh-btn:hover  { background: rgba(0,0,0,0.52); transform: scale(1.08); }
    #refresh-btn:active { transform: scale(0.95); }
    @keyframes refresh-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #refresh-btn.spinning .rf-icon { display: inline-block; animation: refresh-spin 0.5s ease both; }

    /* ── Browse FAB — safe-area aware ── */
    #browse-btn {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom));
      right: calc(24px + env(safe-area-inset-right));
      z-index: 20; display: none;
      padding: 13px 20px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      color: #fff; border: none; border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(0,201,160,0.45);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    }
    #browse-btn:hover  { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,201,160,0.60); }
    #browse-btn:active { transform: scale(0.95); }

    /* ── Browse Sheet — safe-area aware ── */
    #browse-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      z-index: 30; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #browse-backdrop.visible { opacity: 1; pointer-events: auto; }

    #browse-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 31;
      min-height: 240px;
      max-height: min(72vh, 640px);
      background: #fff; border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      /* Bottom padding accounts for home bar on iPad */
      padding-bottom: env(safe-area-inset-bottom);
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    }
    #browse-sheet.visible { transform: translateY(0); }

    #browse-sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: #d1d5db; margin: 12px auto 8px; flex-shrink: 0;
    }
    #browse-sheet-title {
      font-family: var(--font); font-size: 18px; font-weight: 800;
      color: #111827; padding: 0 20px 12px; text-align: center;
      border-bottom: 1px solid #f3f4f6; flex-shrink: 0;
    }
    #browse-sheet-title span {
      font-size: 13px; font-weight: 700; color: #6b7280;
    }
    #browse-list {
      overflow-y: auto; flex: 1; padding: 6px 0;
      -webkit-overflow-scrolling: touch;
    }
    .browse-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; cursor: pointer;
      transition: background 0.12s ease;
      border-bottom: 1px solid #f9fafb;
    }
    .browse-item:hover  { background: #f0fdf9; }
    .browse-item:active { background: #e0faf3; }
    .browse-item:last-child { border-bottom: none; }
    .browse-item-logo {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: contain; flex-shrink: 0; background: #f3f4f6;
    }
    .browse-item-logo-fallback {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font); font-size: 20px; font-weight: 900; color: #fff;
    }
    .browse-item-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .browse-item-name {
      font-family: var(--font); font-size: 15px; font-weight: 700; color: #111827;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .browse-item-venue {
      font-family: var(--font); font-size: 12px; color: #6b7280; font-weight: 600;
    }

    /* ── Snap targeting crosshair ── */
    #snap-ring {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px; border-radius: 50%;
      border: 1.5px solid rgba(0,201,160,0.70);
      pointer-events: none; z-index: 9;
      opacity: 0; transition: opacity 0.2s ease;
    }
    /* Outer halo ring */
    #snap-ring::before {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      border: 1px solid rgba(0,201,160,0.25);
    }
    /* Centre dot */
    #snap-ring::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(0,201,160,0.90);
      box-shadow: 0 0 10px rgba(0,201,160,0.70), 0 0 3px rgba(255,255,255,0.45);
    }
    #snap-ring.visible { opacity: 1; }
    @keyframes snap-breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1);    border-color: rgba(0,201,160,0.70); }
      50%       { transform: translate(-50%, -50%) scale(1.12); border-color: rgba(0,201,160,0.35); }
    }
    #snap-ring.visible { animation: snap-breathe 1.1s ease-in-out infinite; }

    /* ── Front-marker name label ── */
    #front-label {
      position: fixed; left: 0; top: 0;
      pointer-events: none; z-index: 7;
      font-family: var(--font); font-size: 12px; font-weight: 800;
      color: rgba(255,255,255,0.92); letter-spacing: 0.01em;
      background: rgba(0,0,0,0.52); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 4px 11px; border-radius: 99px;
      white-space: nowrap; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis;
      will-change: transform, opacity;

    }

    /* ── Browse-item entrance stagger ── */
    @keyframes browse-item-enter {

    }

    @media (max-width: 600px) {
      .start-card  { padding: 28px 20px 24px; }
      .start-title { font-size: 38px; }
      .start-icon  { font-size: 56px; }

      #game-badge    { top: calc(12px + env(safe-area-inset-top)); left: calc(12px + env(safe-area-inset-left)); }
    }
  </style>
</head>

  <!-- Restaurant data (defines loadFBShops, pickRandom as globals) -->
  <script src="data.js"></script>
  <!-- TopoJSON client for country border decoding — also load world-atlas early -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- Game logic — module script deferred after DOM; data.js globals are available -->
  <script type="module">
  import * as THREE from 'three';

  // Surface uncaught errors instead of hanging silently
  window.addEventListener('error', e => {
    const t = document.getElementById('loading-text');
    if (t) t.textContent = 'JS error: ' + (e.message || e);
  });
  window.addEventListener('unhandledrejection', e => {
    const t = document.getElementById('loading-text');
    if (t) t.textContent = 'Error: ' + (e.reason?.message || e.reason || 'unknown');
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     MakanGlobe — Three.js rewrite
     A 3D globe of restaurant markers you can drag/swipe to spin.
     Directional drag → inertial coast → snap to nearest → result dialog.
  ═══════════════════════════════════════════════════════════════════════════ */

  /* ── CONFIG ──────────────────────────────────────────────────────────────── */
  const CFG = {
    GLOBE_R:       2.0,      // sphere radius (world units)
    MARKER_R:      2.16,     // marker sprite radius (just outside sphere)
    MARKER_N:      48,       // restaurant markers to show
    CAM_Z:         5.2,      // camera Z position
    FRICTION:      0.970,    // per-frame velocity decay at low speed
    FRICTION_FAST: 0.993,    // per-frame decay at high speed (long satisfying coast)
    SNAP_LERP:     0.09,     // slerp factor per frame during snap
    SNAP_DONE:     0.0008,   // angle threshold (rad) to finish snap
    IDLE_SPEED:    0.0014,   // idle auto-rotate speed (rad/frame, yaw)
    DRAG_SENSE:    0.005,    // radians-per-pixel for drag
    MIN_COAST_V:   0.003,    // min release speed to enter coast phase
    // MIN_SPIN_DIST is computed dynamically in onUp (20% of shorter viewport dim)
    IMPULSE:       0.11,     // base impulse magnitude for spin button
    VEL_AVG:       3,        // velocity history frames to average on release
    TICK_THRESH:   0.65,     // accumulated angle (rad) between tick sounds
    PALETTE: ['#FF6B35', '#EF476F', '#06D6A0', '#C45AFF', '#FFD23F', '#5BA8FF'],
  };

  /* ── STATE ───────────────────────────────────────────────────────────────── */
  const S = {
    phase:     'idle',  // idle | dragging | coasting | snapping | stopped
    velX:      0,       // pitch velocity (rad/frame)
    velY:      0,       // yaw velocity (rad/frame)
    drag:      false,
    dragPX:    0, dragPY: 0,
    vHistX:    [], vHistY: [],
    peakV:     0,
    snapQuat:  new THREE.Quaternion(),
    snapMark:  null,
    markers:   [],
    allShops:  [],
    tickAcc:   0,       // accumulated angle for tick sounds
    totalDist: 0,       // accumulated drag distance (px) for current gesture
    gameStarted: false, // true once user has pressed "Spin the Globe"
  };

  /* ── FILTERS ─────────────────────────────────────────────────────────────── */
  const FILTER_GROUPS = {
    dietary: [724, 732, 735, 728],
    cuisine: [730, 720, 727, 729, 737, 725, 734],
    type:    [721, 722, 719, 718, 723, 733],
  };
  const activeFilters = new Set();

  function getFilteredShops() {
    if (activeFilters.size === 0) return S.allShops;
    const activeByGroup = {};
    for (const id of activeFilters) {
      for (const [group, ids] of Object.entries(FILTER_GROUPS)) {
        if (ids.includes(id)) {
          if (!activeByGroup[group]) activeByGroup[group] = [];
          activeByGroup[group].push(id);
          break;
        }
      }
    }
    return S.allShops.filter(shop =>
      Object.values(activeByGroup).every(groupIds =>
        groupIds.some(id => shop.categories.includes(id))
      )
    );
  }

  function updateFilterCount() {
    const n   = getFilteredShops().length;
    const el  = document.getElementById('filter-count');
    const btn = document.getElementById('tap-prompt');
    el.textContent = n === 0
      ? 'No restaurants match — try fewer filters'
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
    el.classList.toggle('empty', n === 0);
    btn.disabled      = n === 0;
    btn.style.opacity = n === 0 ? '0.45' : '';
  }

  function initFilters() {
    const wrap = document.getElementById('filter-wrap');
    wrap.style.display = 'flex';
    updateFilterCount();
    wrap.querySelectorAll('.fpill').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.catid);
        if (activeFilters.has(id)) {
          activeFilters.delete(id);
          btn.classList.remove('active');
        } else {
          activeFilters.add(id);
          btn.classList.add('active');
        }
        updateFilterCount();
      });
    });
  }

  /* ── AUDIO ───────────────────────────────────────────────────────────────── */
  let audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTick(vol) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime, dur = 0.025, sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 2500; flt.Q.value = 1.2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(Math.min(0.14, vol), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(now); src.stop(now + dur);
  }

  let wNode = null, wGain = null, wFlt = null;
  let wOsc1 = null, wOsc2 = null, wOscGain = null;
  function startWhoosh() {
    if (!audioCtx || wNode) return;
    // Smooth wind — lowpass filtered noise (not bandpass → no grainy/sand sound)
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    wNode = audioCtx.createBufferSource(); wNode.buffer = buf; wNode.loop = true;
    wFlt  = audioCtx.createBiquadFilter(); wFlt.type = 'lowpass'; wFlt.frequency.value = 250; wFlt.Q.value = 0.5;
    wGain = audioCtx.createGain(); wGain.gain.value = 0;
    wNode.connect(wFlt); wFlt.connect(wGain); wGain.connect(audioCtx.destination);
    wNode.start();
    // Tonal hum — two slightly detuned sines create a spinning/rotating quality
    wOsc1 = audioCtx.createOscillator(); wOsc1.type = 'sine'; wOsc1.frequency.value = 85;
    wOsc2 = audioCtx.createOscillator(); wOsc2.type = 'sine'; wOsc2.frequency.value = 88;
    wOscGain = audioCtx.createGain(); wOscGain.gain.value = 0;
    wOsc1.connect(wOscGain); wOsc2.connect(wOscGain); wOscGain.connect(audioCtx.destination);
    wOsc1.start(); wOsc2.start();
  }
  function updateWhoosh(speed) {
    if (!wFlt || !wGain) return;
    const t = audioCtx.currentTime + 0.05, n = Math.min(speed / CFG.IMPULSE, 1);
    // Wind: gentle sweep — stays smooth, not harsh
    wFlt.frequency.linearRampToValueAtTime(250 + n * 1000, t);
    wGain.gain.linearRampToValueAtTime(n * 0.08, t);
    // Hum: pitch rises with speed for a Doppler-like spin feel
    if (wOsc1 && wOscGain) {
      wOsc1.frequency.linearRampToValueAtTime(85 + n * 180, t);
      wOsc2.frequency.linearRampToValueAtTime(88 + n * 185, t);
      wOscGain.gain.linearRampToValueAtTime(n * 0.05, t);
    }
  }
  function stopWhoosh() {
    if (!wNode) return;
    const fade = audioCtx.currentTime + 0.15;
    wGain.gain.linearRampToValueAtTime(0, fade);
    if (wOscGain) wOscGain.gain.linearRampToValueAtTime(0, fade);
    setTimeout(() => {
      try { wNode.stop(); } catch (e) {}
      try { if (wOsc1) wOsc1.stop(); } catch (e) {}
      try { if (wOsc2) wOsc2.stop(); } catch (e) {}
      wNode = wGain = wFlt = null;
      wOsc1 = wOsc2 = wOscGain = null;
    }, 250);
  }
  function playStop() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime, dur = 0.035, sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 4000; flt.Q.value = 2;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination); src.start(now); src.stop(now + dur);
  }
  function playReveal() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [523.25, 659.25].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const g = audioCtx.createGain(); const t = i * 0.12;
      g.gain.setValueAtTime(0, now + t); g.gain.linearRampToValueAtTime(0.15, now + t + 0.01); g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.4);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now + t); osc.stop(now + t + 0.4);
    });
  }
  function playDialog() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 392;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.1, now + 0.02); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.3);
  }

  /* ── RENDERER, SCENE, CAMERA ─────────────────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, CFG.CAM_Z);

  /* ── LIGHTING ────────────────────────────────────────────────────────────── */
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));

  const sunLight = new THREE.DirectionalLight(0xffffff, 2.4);
  sunLight.position.set(4, 5, 3);
  scene.add(sunLight);

  const fillLight = new THREE.DirectionalLight(0xaabbff, 0.4);
  fillLight.position.set(-3, -2, 2);
  scene.add(fillLight);

  // Rim light — teal edge glow on dark side of globe
  const rimLight = new THREE.DirectionalLight(0x00bbcc, 1.6);
  rimLight.position.set(-2, 0.5, -6);
  scene.add(rimLight);

  // Atmosphere — inner tight blue halo
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(CFG.GLOBE_R * 1.07, 32, 24),
    new THREE.MeshPhongMaterial({
      color: 0x0077cc, transparent: true, opacity: 0.14,
      side: THREE.BackSide, depthWrite: false,
    })
  ));
  // Atmosphere — outer broad teal haze
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(CFG.GLOBE_R * 1.22, 32, 24),
    new THREE.MeshPhongMaterial({
      color: 0x00aaee, transparent: true, opacity: 0.045,
      side: THREE.BackSide, depthWrite: false,
    })
  ));

  // Starfield — 750 points on a large shell
  (function() {
    const N = 750, pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const theta = 2 * Math.PI * Math.random();
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 28 + Math.random() * 14;
      pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i*3+2] = r * Math.cos(phi);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.09, sizeAttenuation: true,
      transparent: true, opacity: 0.82,
    })));
  })();

  // Globe corona — smooth bell-curve halo at the silhouette
  (function() {
    const SZ  = 512;
    const c   = document.createElement('canvas');
    c.width   = c.height = SZ;
    const ctx = c.getContext('2d');
    const gr  = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    gr.addColorStop(0,    'rgba(0,0,0,0)');
    gr.addColorStop(0.52, 'rgba(0,0,0,0)');
    gr.addColorStop(0.62, 'rgba(20,90,240,0.06)');
    gr.addColorStop(0.68, 'rgba(35,140,255,0.22)');
    gr.addColorStop(0.73, 'rgba(40,200,220,0.46)');
    gr.addColorStop(0.76, 'rgba(55,180,255,0.58)');
    gr.addColorStop(0.80, 'rgba(40,155,240,0.38)');
    gr.addColorStop(0.86, 'rgba(20,100,230,0.18)');
    gr.addColorStop(0.93, 'rgba(5,50,200,0.05)');
    gr.addColorStop(1.0,  'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, SZ, SZ);
    const mat = new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(c),
      transparent: true, depthWrite: false, depthTest: true,
    });
    const s = new THREE.Sprite(mat);
    s.scale.set(5.8, 5.8, 1);
    scene.add(s);
  })();

  /* ── GLOBE GROUP ─────────────────────────────────────────────────────────── */
  const globeGroup = new THREE.Group();
  globeGroup.rotation.z = -0.25; // natural axial tilt
  scene.add(globeGroup);

  // Sphere — deep navy with specular highlight for a polished globe look
  globeGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(CFG.GLOBE_R, 64, 48),
    new THREE.MeshPhongMaterial({
      color:     0x0d2550,
      specular:  0x1a4488,
      shininess: 42,
      emissive:  new THREE.Color(0x071520),
      emissiveIntensity: 0.45,
    })
  ));

  // Lat/lon grid — merged into two LineSegments for performance
  (function buildGrid() {
    const GR  = CFG.GLOBE_R + 0.012;
    const DEG = Math.PI / 180;
    const gridPos = [], eqPos = [];

    // Latitude rings (every 30°)
    for (let lat = -60; lat <= 60; lat += 30) {
      const phi = (90 - lat) * DEG;
      for (let lon = 0; lon < 360; lon += 3) {
        const a = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, phi, lon * DEG));
        const b = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, phi, (lon + 3) * DEG));
        gridPos.push(a.x, a.y, a.z, b.x, b.y, b.z);
      }
    }
    // Longitude arcs (every 30°)
    for (let lon = 0; lon < 360; lon += 30) {
      const theta = lon * DEG;
      for (let lat = -90; lat < 90; lat += 3) {
        const a = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, (90 - lat) * DEG, theta));
        const b = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, (90 - (lat + 3)) * DEG, theta));
        gridPos.push(a.x, a.y, a.z, b.x, b.y, b.z);
      }
    }
    // Equator — separate, brighter
    for (let lon = 0; lon < 360; lon += 2) {
      const a = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, Math.PI / 2, lon * DEG));
      const b = new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, Math.PI / 2, (lon + 2) * DEG));
      eqPos.push(a.x, a.y, a.z, b.x, b.y, b.z);
    }

    const gridGeo = new THREE.BufferGeometry();
    gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPos, 3));
    globeGroup.add(new THREE.LineSegments(gridGeo,
      new THREE.LineBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.13, depthWrite: false })
    ));

    const eqGeo = new THREE.BufferGeometry();
    eqGeo.setAttribute('position', new THREE.Float32BufferAttribute(eqPos, 3));
    globeGroup.add(new THREE.LineSegments(eqGeo,
      new THREE.LineBasicMaterial({ color: 0x44bbdd, transparent: true, opacity: 0.30, depthWrite: false })
    ));
  })();

  /* ── WORLD COUNTRY BORDERS — single LineSegments draw call ───────────────── */
  async function loadWorldBorders() {
    try {
      const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      const topo = await resp.json();
      const geo  = window.topojson.feature(topo, topo.objects.countries);
      const DEG  = Math.PI / 180;
      // Slightly above grid (0.012) and lat/lon grid to avoid z-fighting
      const R    = CFG.GLOBE_R + 0.022;
      const positions = [];

      function addRing(ring) {
        if (!ring || ring.length < 2) return;
        for (let i = 0; i < ring.length - 1; i++) {
          const [lon0, lat0] = ring[i];
          const [lon1, lat1] = ring[i + 1];
          const a = new THREE.Vector3().setFromSpherical(new THREE.Spherical(R, (90 - lat0) * DEG, lon0 * DEG));
          const b = new THREE.Vector3().setFromSpherical(new THREE.Spherical(R, (90 - lat1) * DEG, lon1 * DEG));
          positions.push(a.x, a.y, a.z, b.x, b.y, b.z);
        }
      }

      for (const feature of geo.features) {
        const { type, coordinates } = feature.geometry;
        if (type === 'Polygon') {
          addRing(coordinates[0]);
        } else if (type === 'MultiPolygon') {
          for (const polygon of coordinates) addRing(polygon[0]);
        }
      }

      const borderGeo = new THREE.BufferGeometry();
      borderGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      globeGroup.add(new THREE.LineSegments(
        borderGeo,
        new THREE.LineBasicMaterial({ color: 0x44ddcc, transparent: true, opacity: 0.35, depthWrite: false })
      ));
    } catch (e) {
      // Borders are decorative — fail silently
      console.warn('MakanGlobe: could not load world borders', e);
    }
  }

  /* ── MARKER SPRITES ──────────────────────────────────────────────────────── */
  function makeMarkerCanvas(initial, hexColor) {
    const SZ  = 128;
    const c   = document.createElement('canvas');
    c.width   = c.height = SZ;
    const ctx = c.getContext('2d');
    const cx  = SZ / 2, cy = SZ / 2, r = SZ / 2 - 6;

    // Outer white ring — mirrors the box-shadow white ring on .mlogo imgs
    ctx.beginPath(); ctx.arc(cx, cy, r + 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.78)'; ctx.fill();

    // Drop shadow + white base
    ctx.shadowColor = 'rgba(0,0,0,0.40)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 3;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Palette color fill
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = hexColor; ctx.fill();

    // Radial depth gradient
    const grad = ctx.createRadialGradient(cx * 0.65, cy * 0.60, 2, cx, cy, r);
    grad.addColorStop(0, 'rgba(255,255,255,0.30)');
    grad.addColorStop(1, 'rgba(0,0,0,0.22)');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    // Initial letter
    ctx.fillStyle = '#fff';
    ctx.font      = `900 ${Math.floor(SZ * 0.40)}px Nunito, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.32)'; ctx.shadowBlur = 5;
    ctx.fillText(initial, cx, cy + SZ * 0.03);
    ctx.shadowBlur = 0;

    // Colored outer border
    ctx.strokeStyle = hexColor; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(cx, cy, r - 1, 0, Math.PI * 2); ctx.stroke();

    // White inner accent ring
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, r - 7, 0, Math.PI * 2); ctx.stroke();

    return c;
  }

  function buildMarkers(shops) {
    const logoLayer = document.getElementById('logo-layer');
    S.markers.forEach(m => {
      m.sprite.material.map?.dispose();
      m.sprite.material.dispose();
      globeGroup.remove(m.sprite);
      if (m.logoEl) m.logoEl.remove();
    });
    S.markers = [];
    logoLayer.innerHTML = '';

    const N   = Math.min(shops.length, CFG.MARKER_N);
    const PHI = (1 + Math.sqrt(5)) / 2;

    for (let i = 0; i < N; i++) {
      const shop    = shops[i];
      const color   = CFG.PALETTE[i % CFG.PALETTE.length];
      const initial = (shop.title || '?').charAt(0).toUpperCase();

      const polarPhi  = Math.acos(1 - 2 * (i + 0.5) / N);
      const azimTheta = 2 * Math.PI * i / PHI;
      const localPos  = new THREE.Vector3().setFromSpherical(
        new THREE.Spherical(CFG.MARKER_R, polarPhi, azimTheta)
      );

      const tex    = new THREE.CanvasTexture(makeMarkerCanvas(initial, color));
      const mat    = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.33, 0.33, 1);
      sprite.position.copy(localPos);
      globeGroup.add(sprite);

      const markerEntry = { sprite, shop, localPos, logoEl: null, hasLogo: false };
      S.markers.push(markerEntry);

      if (shop.logo) {
        const img = document.createElement('img');
        img.className   = 'mlogo';
        img.style.borderColor = color;
        img.decoding    = 'async';
        img.onload = () => {
          img.style.display = 'block';
          markerEntry.hasLogo = true;
          img.classList.add('mlogo--popin');
          setTimeout(() => img.classList.remove('mlogo--popin'), 700);
        };
        img.src = shop.logo;
        logoLayer.appendChild(img);
        markerEntry.logoEl = img;
      }
    }
  }

  /* ── VISIBILITY + LOGO OVERLAY POSITIONING ───────────────────────────────── */
  const _tmpV       = new THREE.Vector3();
  const _camPos     = new THREE.Vector3(0, 0, CFG.CAM_Z);
  const _halfFovTan = Math.tan(camera.fov * 0.5 * Math.PI / 180);
  let   _prevFront  = null;

  function updateVisibility() {
    const W = window.innerWidth, H = window.innerHeight;
    let frontMarker = null, frontZ = -Infinity;

    for (const m of S.markers) {
      m.sprite.getWorldPosition(_tmpV);
      const wz = _tmpV.z;

      const t       = (wz / CFG.MARKER_R + 0.18) / 0.34;
      const opacity = Math.max(0, Math.min(1, t));

      m.sprite.material.opacity = m.hasLogo ? 0 : opacity;

      // Track frontmost for the glow ring
      if (wz > frontZ) { frontZ = wz; frontMarker = m; }

      if (m.logoEl) {
        // Compute scale so 38px base matches the 0.33-unit sprite
        const dist  = Math.max(0.5, _camPos.distanceTo(_tmpV));
        const pxSz  = (0.33 * H) / (2 * dist * _halfFovTan);
        const scale = pxSz / 38; // 38px is the CSS baseline of .mlogo

        // Project to screen coords
        _tmpV.project(camera);
        const sx = (_tmpV.x + 1) * 0.5 * W;
        const sy = (-_tmpV.y + 1) * 0.5 * H;

        // Single cssText write — avoids multiple style mutations / layout thrash
        m.logoEl.style.cssText =
          `display:${m.logoEl.style.display};` +
          `transform:translate(calc(${sx}px - 50%), calc(${sy}px - 50%)) scale(${scale.toFixed(3)});` +
          `opacity:${opacity.toFixed(3)};` +
          `border-color:${m.logoEl.style.borderColor};`;
      }
    }

    // Update front-marker highlight — only on change (cheap guard)
    if (frontMarker !== _prevFront) {
      if (_prevFront?.logoEl) _prevFront.logoEl.classList.remove('mlogo--front');
      if (frontMarker?.logoEl) frontMarker.logoEl.classList.add('mlogo--front');
      _prevFront = frontMarker;
      // Only update text when marker changes (avoid layout thrash every frame)
      if (frontLabelEl && frontMarker) frontLabelEl.textContent = frontMarker.shop.title || '';
    }

    // Reposition the name label every frame so it tracks the rotating globe
    if (S.gameStarted && S.phase !== 'stopped' && frontMarker) {
      frontMarker.sprite.getWorldPosition(_tmpV);
      const dist   = Math.max(0.5, _camPos.distanceTo(_tmpV));
      const pxSz   = (0.33 * H) / (2 * dist * _halfFovTan);
      _tmpV.project(camera);
      const sx     = (_tmpV.x + 1) * 0.5 * W;
      const sy     = (-_tmpV.y + 1) * 0.5 * H;
      const offset = pxSz * 0.5 + 12;
      frontLabelEl.style.cssText =
        `display:block;transform:translate(calc(${sx}px - 50%),${(sy + offset).toFixed(1)}px);opacity:1;`;
    } else {
      frontLabelEl.style.cssText = 'display:none;opacity:0;';
    }
  }

  /* ── SNAP ────────────────────────────────────────────────────────────────── */
  const _qSnap = new THREE.Quaternion();
  const _zAxis = new THREE.Vector3(0, 0, 1);

  function findFront() {
    let best = null, bestZ = -Infinity;
    for (const m of S.markers) {
      m.sprite.getWorldPosition(_tmpV);
      if (_tmpV.z > bestZ) { bestZ = _tmpV.z; best = m; }
    }
    return best;
  }

  function beginSnap(targetMarker) {
    const front = targetMarker || findFront();
    if (!front) { onStopped(null); return; }
    S.snapMark = front;
    _qSnap.setFromUnitVectors(front.localPos.clone().normalize(), _zAxis);
    if (globeGroup.quaternion.dot(_qSnap) < 0) _qSnap.negate();
    S.snapQuat.copy(_qSnap);
    S.phase = 'snapping';
  }

  /* ── WORLD-SPACE ROTATION HELPERS ────────────────────────────────────────── */
  const _qTmp  = new THREE.Quaternion();
  const _xAxis = new THREE.Vector3(1, 0, 0);
  const _yAxis = new THREE.Vector3(0, 1, 0);

  function rotateWorld(ax, ay) {
    if (ax !== 0) {
      _qTmp.setFromAxisAngle(_xAxis, ax);
      globeGroup.quaternion.premultiply(_qTmp);
    }
    if (ay !== 0) {
      _qTmp.setFromAxisAngle(_yAxis, ay);
      globeGroup.quaternion.premultiply(_qTmp);
    }
  }

  /* ── PHYSICS TICK ────────────────────────────────────────────────────────── */
  function tick() {
    if (S.phase === 'coasting') {
      const speed = Math.hypot(S.velX, S.velY);
      rotateWorld(S.velX, S.velY);
      // Speed-dependent friction: fast spins coast longer, slow spins wind down
      const t = Math.min(speed / CFG.IMPULSE, 1);
      const friction = CFG.FRICTION + (CFG.FRICTION_FAST - CFG.FRICTION) * t;
      S.velX *= friction;
      S.velY *= friction;
      updateWhoosh(speed);

      S.tickAcc += speed;
      if (S.tickAcc >= CFG.TICK_THRESH) {
        playTick(Math.min(0.14, speed / CFG.IMPULSE * 0.14));
        S.tickAcc -= CFG.TICK_THRESH;
      }

      if (speed < 0.0018) { stopWhoosh(); beginSnap(null); }

    } else if (S.phase === 'snapping') {
      globeGroup.quaternion.slerp(S.snapQuat, CFG.SNAP_LERP);
      if (globeGroup.quaternion.angleTo(S.snapQuat) < CFG.SNAP_DONE) {
        globeGroup.quaternion.copy(S.snapQuat);
        onStopped(S.snapMark);
      }

    } else if (S.phase === 'idle') {
      rotateWorld(0, CFG.IDLE_SPEED);
      // Only play ambient tick sounds once game has started
      if (S.gameStarted) {
        S.tickAcc += CFG.IDLE_SPEED;
        if (S.tickAcc >= CFG.TICK_THRESH * 4) { playTick(0.012); S.tickAcc -= CFG.TICK_THRESH * 4; }
      }
    }
  }

  /* ── POINTER EVENTS ──────────────────────────────────────────────────────── */
  function getXY(e) {
    if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
    if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    if (S.phase === 'stopped') return;
    hideSwipeGuide();
    initAudio();
    const { x, y } = getXY(e);
    S.drag = true;
    S.dragPX = x; S.dragPY = y;
    S.velX = 0; S.velY = 0;
    S.vHistX = []; S.vHistY = [];
    S.totalDist = 0;
    S.peakV = 0;
    if (S.phase === 'coasting' || S.phase === 'snapping') stopWhoosh();
    S.phase = 'dragging';
  }

  function onMove(e) {
    if (!S.drag) return;
    const { x, y } = getXY(e);
    const dx = x - S.dragPX, dy = y - S.dragPY;
    S.dragPX = x; S.dragPY = y;
    S.totalDist += Math.hypot(dx, dy);

    const vx = dy * CFG.DRAG_SENSE;
    const vy = dx * CFG.DRAG_SENSE;
    S.vHistX.push(vx); if (S.vHistX.length > CFG.VEL_AVG) S.vHistX.shift();
    S.vHistY.push(vy); if (S.vHistY.length > CFG.VEL_AVG) S.vHistY.shift();
    S.peakV = Math.max(S.peakV, Math.hypot(vx, vy));

    rotateWorld(vx, vy);
  }

  function onUp() {
    if (!S.drag) return;
    S.drag = false;

    // Weighted average — recent samples count more so quick flicks register
    const wavg = arr => {
      if (!arr.length) return 0;
      let sum = 0, wt = 0;
      for (let i = 0; i < arr.length; i++) { const w = 1 + i; sum += arr[i] * w; wt += w; }
      return sum / wt;
    };
    S.velX = wavg(S.vHistX);
    S.velY = wavg(S.vHistY);
    S.vHistX = []; S.vHistY = [];

    let speed = Math.hypot(S.velX, S.velY);

    // If peak frame velocity was higher than the average (finger decelerated
    // before lift-off), scale the velocity vector UP to 60 % of peak so the
    // globe actually keeps spinning once we enter coasting.
    const peakFloor = S.peakV * 0.6;
    if (peakFloor > speed) {
      if (speed > 0.0001) {
        const scale = peakFloor / speed;
        S.velX *= scale;
        S.velY *= scale;
      } else {
        S.velY = peakFloor; S.velX = 0;
      }
      speed = Math.hypot(S.velX, S.velY);
    }

    // If the finger swiped a real distance but velocity is still low (common
    // on mobile where touchmove events lag), guarantee a minimum spin.
    if (speed < CFG.MIN_COAST_V && S.totalDist >= 30) {
      const boost = CFG.MIN_COAST_V * 3;
      if (speed > 0.0001) {
        const scale = boost / speed;
        S.velX *= scale;
        S.velY *= scale;
      } else {
        S.velY = boost; S.velX = 0;
      }
      speed = Math.hypot(S.velX, S.velY);
    }

    // Reject accidental taps (tiny finger drift)
    if (S.totalDist < 15) {
      S.phase = 'idle';
      return;
    }

    // Any meaningful velocity → coast (eventually snaps after slowing down)
    if (speed >= CFG.MIN_COAST_V) {
      S.phase = 'coasting';
      startWhoosh();
      return;
    }

    // Gentle drag — always snap to the geometrically closest restaurant
    beginSnap(null);
  }

  /* ── EVENT WIRING ────────────────────────────────────────────────────────── */
  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart',  e => { e.preventDefault(); onDown(e); }, { passive: false });
  canvas.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e); }, { passive: false });
  window.addEventListener('touchend',    onUp);
  window.addEventListener('touchcancel', onUp);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  /* ── STOPPED / RESULT ────────────────────────────────────────────────────── */
  function onStopped(marker) {
    S.phase = 'stopped';
    playStop();

    // Haptic feedback on snap completion
    if (navigator.vibrate) navigator.vibrate(40);

    const m = marker || findFront();
    if (!m) return;

    setTimeout(() => {
      playReveal();
      setTimeout(() => {
        playDialog();
        showResult(m.shop);
      }, 300);
    }, 350);
  }

  function showResult(shop) {
    const logo = document.getElementById('result-logo');
    const fb   = document.getElementById('result-logo-fallback');
    document.getElementById('result-name').textContent  = shop.title || 'Unknown';
    document.getElementById('result-venue').textContent = shop.venue
      ? `${shop.venue}${shop.level_label ? ' • ' + shop.level_label : ''}`
      : '';

    if (shop.logo) {
      logo.src = shop.logo; logo.style.display = 'block'; fb.style.display = 'none';
      logo.onerror = () => {
        logo.style.display = 'none';
        fb.style.display = 'flex';
        fb.textContent = (shop.title || '?')[0].toUpperCase();
      };
    } else {
      logo.style.display = 'none'; fb.style.display = 'flex';
      fb.textContent = (shop.title || '?')[0].toUpperCase();
    }

    document.getElementById('result-backdrop').classList.add('visible');
    document.getElementById('result-dialog').classList.add('visible');
    document.getElementById('drag-hint').classList.remove('visible');

    // Confetti burst from the logo position
    setTimeout(() => launchConfetti(logo.style.display !== 'none' ? logo : fb), 380);
  }

  function hideResult() {
    document.getElementById('result-backdrop').classList.remove('visible');
    document.getElementById('result-dialog').classList.remove('visible');
  }

  // Close dialog and return to idle — keeps current marker set for re-spinning
  function closeAndIdle() {
    hideResult();
    S.phase = 'idle';
    document.getElementById('drag-hint').classList.add('visible');
    showSwipeGuide(800);
  }

  // Spin Again — reshuffles restaurants and returns to idle
  function doSpinAgain() {
    hideResult();
    buildMarkers(pickRandom(getFilteredShops(), CFG.MARKER_N));
    S.tickAcc = 0;
    S.phase   = 'idle';
    document.getElementById('drag-hint').classList.add('visible');
    showSwipeGuide(1600);
  }

  document.getElementById('spin-again-btn').addEventListener('click', doSpinAgain);
  // Backdrop click = close only (not reshuffle — prevents accidental resets)
  document.getElementById('result-backdrop').addEventListener('click', closeAndIdle);
  document.getElementById('result-close').addEventListener('click', closeAndIdle);

  /* ── CONFETTI ─────────────────────────────────────────────────────────────── */
  function launchConfetti(originEl) {
    const EMOJIS = ['🍜', '🎉', '✨', '🎊', '🍣', '🌮', '⭐'];
    const rect = originEl.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    for (let i = 0; i < 8; i++) {
      const el  = document.createElement('span');
      el.className   = 'confetti-piece';
      el.textContent = EMOJIS[i % EMOJIS.length];
      const angle = (i / 8) * Math.PI * 2;
      const dist  = 80 + Math.random() * 100;
      el.style.left = cx + 'px';
      el.style.top  = cy + 'px';
      el.style.setProperty('--tx', Math.round(Math.cos(angle) * dist) + 'px');
      el.style.setProperty('--ty', Math.round(Math.sin(angle) * dist - 60) + 'px');
      el.style.fontSize    = (20 + Math.random() * 14) + 'px';
      el.style.animationDelay = (i * 0.04) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }
  }

  /* ── SPIN-HARDER TOAST ────────────────────────────────────────────────────── */
  const spinToastEl  = document.getElementById('spin-toast');
  const snapRingEl   = document.getElementById('snap-ring');
  const frontLabelEl = document.getElementById('front-label');
  let _toastTimer = null;
  function showSpinToast() {
    clearTimeout(_toastTimer);
    spinToastEl.classList.add('show');
    _toastTimer = setTimeout(() => spinToastEl.classList.remove('show'), 1500);
  }

  /* ── BROWSE SHEET ────────────────────────────────────────────────────────── */
  const browseBtn      = document.getElementById('browse-btn');
  const browseBackdrop = document.getElementById('browse-backdrop');
  const browseSheet    = document.getElementById('browse-sheet');
  const browseList     = document.getElementById('browse-list');
  const browseCount    = document.getElementById('browse-count');

  function makeBrowseFallback(shop) {
    const fb = document.createElement('div');
    fb.className   = 'browse-item-logo-fallback';
    fb.textContent = (shop.title || '?')[0].toUpperCase();
    return fb;
  }

  function openBrowse() {
    const shops = getFilteredShops().slice().sort((a, b) =>
      (a.title || '').localeCompare(b.title || '')
    );
    browseCount.textContent = `— ${shops.length} available`;
    browseList.innerHTML = '';

    for (let bi = 0; bi < shops.length; bi++) {
      const shop = shops[bi];
      const item = document.createElement('div');
      item.className = 'browse-item';
      // Stagger entrance for the first 20 items
      if (bi < 20) {
        item.style.setProperty('--i', bi);
        item.classList.add('browse-item--enter');
      }

      if (shop.logo) {
        const img = document.createElement('img');
        img.className = 'browse-item-logo';
        img.src       = shop.logo;
        img.onerror   = () => img.replaceWith(makeBrowseFallback(shop));
        item.appendChild(img);
      } else {
        item.appendChild(makeBrowseFallback(shop));
      }

      const info = document.createElement('div');
      info.className = 'browse-item-info';
      const name = document.createElement('div');
      name.className   = 'browse-item-name';
      name.textContent = shop.title || 'Unknown';
      info.appendChild(name);
      if (shop.venue) {
        const venue = document.createElement('div');
        venue.className   = 'browse-item-venue';
        venue.textContent = shop.venue + (shop.level_label ? ' · ' + shop.level_label : '');
        info.appendChild(venue);
      }
      item.appendChild(info);

      item.addEventListener('click', () => {
        closeBrowse();
        initAudio();
        playReveal();
        setTimeout(() => { playDialog(); showResult(shop); }, 300);
      });
      browseList.appendChild(item);
    }

    browseBackdrop.classList.add('visible');
    browseSheet.classList.add('visible');
  }

  function closeBrowse() {
    browseBackdrop.classList.remove('visible');
    browseSheet.classList.remove('visible');
  }

  const refreshBtn = document.getElementById('refresh-btn');
  refreshBtn.addEventListener('click', () => {
    buildMarkers(pickRandom(getFilteredShops(), CFG.MARKER_N));
    S.tickAcc = 0;
    // Spin the icon once as tactile confirmation
    refreshBtn.classList.add('spinning');
    setTimeout(() => refreshBtn.classList.remove('spinning'), 520);
  });

  browseBtn.addEventListener('click', openBrowse);
  browseBackdrop.addEventListener('click', closeBrowse);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBrowse(); });

  /* ── SWIPE GUIDE ─────────────────────────────────────────────────────────── */
  const swipeGuide = document.getElementById('swipe-guide');
  let _sgTimer = null;
  function showSwipeGuide(delay) {
    clearTimeout(_sgTimer);
    _sgTimer = setTimeout(() => swipeGuide.classList.add('visible'), delay ?? 900);
  }
  function hideSwipeGuide() {
    clearTimeout(_sgTimer);
    swipeGuide.classList.remove('visible');
  }

  /* ── RENDER LOOP ─────────────────────────────────────────────────────────── */
  function animate() {
    requestAnimationFrame(animate);
    if (!S.drag) tick();
    updateVisibility();
    // Show snap crosshair only while snapping
    snapRingEl.classList.toggle('visible', S.phase === 'snapping');
    renderer.render(scene, camera);
  }

  /* ── RESIZE ──────────────────────────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── VISIBILITY PAUSE — saves CPU/battery on kiosk ──────────────────────── */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && (S.phase === 'coasting' || S.phase === 'snapping')) {
      stopWhoosh();
      S.velX = 0; S.velY = 0;
      S.phase = 'idle';
    }
  });

  /* ── INIT ────────────────────────────────────────────────────────────────── */
  async function init() {
    const overlay   = document.getElementById('loading-overlay');
    const loadState = document.getElementById('loading-state');
    const tapEl     = document.getElementById('tap-prompt');
    const hintEl    = document.getElementById('drag-hint');
    const badge     = document.getElementById('game-badge');

    try {
      S.allShops = await loadFBShops();

      loadState.style.display = 'none';
      tapEl.style.display     = 'block';
      initFilters();

      tapEl.addEventListener('click', () => {
        if (tapEl.disabled) return;
        initAudio();
        overlay.style.opacity       = '0';
        overlay.style.pointerEvents = 'none';

        setTimeout(() => {
          overlay.style.display   = 'none';
          buildMarkers(pickRandom(getFilteredShops(), CFG.MARKER_N));
          hintEl.classList.add('visible');
          browseBtn.style.display  = 'block';
          refreshBtn.style.display = 'block';
          badge.style.display      = 'block';
          S.phase      = 'idle';
          S.tickAcc    = 0;
          S.gameStarted = true;
          showSwipeGuide(1400);
        }, 430);
      }, { once: true });

    } catch (err) {
      console.error('MakanGlobe init error:', err);
      // Hide spinner so error state is unambiguous
      const spinner = loadState.querySelector('.makan-spinner');
      if (spinner) spinner.style.display = 'none';
      document.getElementById('loading-text').textContent =
        'Could not load restaurants. Please check your connection.';
    }
  }

  // Start render loop immediately so globe spins behind start card
  animate();
  // Load country borders in parallel (decorative — fails silently)
  loadWorldBorders();
  // Load restaurant data and wire up start screen
  init();
  </script>
</body>
</html>
