<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MakanSpace</title>
  <link rel="stylesheet" href="../makan-theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); }
    body { background: #050210; }

    /* ── Frame ─────────────────────────────────────────────────
       Dark navy border with purple-blue glow — space viewport  */
    #frame {
      position: fixed;
      inset: 22px;
      z-index: 50;
      border-radius: 18px;
      border: 6px solid #0d0826;
      box-shadow:
        inset 0 0 0 1.5px rgba(139,92,246,0.35),
        inset 0 0 0 3.5px #5c1fcf,
        inset 0 0 0 5px #0d0826,
        0 0 0 2px #0d0826,
        0 0 0 22px #050210;
      pointer-events: none;
      filter: url(#bl-ink);
    }

    /* ── Stage ─────────────────────────────────────────────── */
    #stage {
      position: fixed;
      inset: 22px;
      z-index: 1;
      border-radius: 18px;
      overflow: hidden;
      clip-path: inset(0 round 18px);
      background: radial-gradient(ellipse at 25% 35%, #1e0a40 0%, #0a0522 50%, #050210 100%);
    }
    #stage::before {
      content: ''; position: absolute; inset: 0; z-index: 100;
      pointer-events: none;
      box-shadow: inset 0 0 130px rgba(5,2,16,0.60);
    }

    /* ── Starfield canvas ──────────────────────────────────── */
    #starfield {
      position: absolute; inset: 0;
      z-index: 0;
      display: block;
    }

    /* ── Nebula gradient overlays ──────────────────────────── */
    #nebula {
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 62% 44% at 16% 60%, rgba(140,55,255,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 52% at 84% 26%, rgba(70,155,255,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 72% 32% at 48% 92%, rgba(55,210,185,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 40% 38% at 72% 68%, rgba(255,75,140,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 35% 42% at 28% 18%, rgba(255,180,60,0.10) 0%, transparent 50%);
    }

    /* ── Asteroid ─────────────────────────────────────────────
       Borderlands art style: hard black outlines, flat cel-shading,
       no ambient glow or diffuse gradients.
       --body-rot is updated every frame by JS for the tumble.
       --body-scl is set by CSS state classes for hover/select scale. */
    .asteroid {
      position: absolute;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 10;
      --c:        #C45AFF;
      --cd:       #8f22d4;
      --glow:     rgba(196,90,255,0.65);
      --sz:       100px;
      --body-rot: 0deg;
      --body-scl: 1;
    }

    .asteroid.xs { --sz: 72px;  }
    .asteroid.sm { --sz: 96px;  }
    .asteroid.md { --sz: 128px; }
    .asteroid.lg { --sz: 158px; }
    .asteroid.xl { --sz: 194px; }

    /* Scene wrapper — handles spawn pop-in animation */
    .a-scene {
      position: relative;
      width: var(--sz);
      height: var(--sz);
      animation: a-spawn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes a-spawn {
      from { transform: scale(0.08) rotate(-25deg); opacity: 0; }
      to   { transform: scale(1)    rotate(0deg);   opacity: 1; }
    }

    /* ── Asteroid body — Borderlands cel-shaded blob ─────────
       rotate/scale are individual CSS transform properties so JS
       can update --body-rot every frame without disrupting the
       CSS-driven --body-scl transition.                        */
    .a-body {
      width: var(--sz);
      height: var(--sz);
      background: var(--c);
      border-radius: 50%; /* fallback; overridden per-element by JS */
      position: relative;
      overflow: hidden;

      /* Borderlands: thick hard black outline */
      box-shadow: 0 0 0 4px #000;

      /* Individual transform props — no conflict between JS rotation & CSS scale */
      rotate:     var(--body-rot, 0deg);
      scale:      var(--body-scl, 1);
      transition: scale 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.15s ease;
    }

    /* Borderlands flat cel-shade: top-left highlight lobe (no gradient) */
    .a-body::before {
      content: '';
      position: absolute;
      top: 9%; left: 11%;
      width: 44%; height: 38%;
      background: rgba(255,255,255,0.22);
      border-radius: 50%;
      pointer-events: none;
    }
    /* Borderlands flat cel-shade: bottom-right shadow lobe (no gradient) */
    .a-body::after {
      content: '';
      position: absolute;
      bottom: 9%; right: 9%;
      width: 44%; height: 40%;
      background: rgba(0,0,0,0.22);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Craters — flat dark with hard Borderlands outline (size/position set by JS) */
    .a-crater {
      position: absolute;
      border-radius: 50%;
      background: var(--cd);
      box-shadow: 0 0 0 2px #000;
      pointer-events: none;
    }

    /* Jagged asteroid — clip-path replaces border-radius, drop-shadow replaces box-shadow */
    .a-body.jagged {
      box-shadow: none;
      border-radius: 0 !important;
    }
    .a-scene.jagged {
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.98))
              drop-shadow(0 0 7px rgba(0,0,0,0.72));
    }

    /* Ice / crystal variant — override highlight and shadow lobes */
    .asteroid.ice .a-body::before { background: rgba(255,255,255,0.52); }
    .asteroid.ice .a-body::after  { background: rgba(100,190,255,0.22); }

    /* Crack lines — bold black on open (Borderlands graphic) */
    .a-crack {
      position: absolute; inset: 0;
      background:
        linear-gradient(42deg,  transparent 44%, rgba(0,0,0,0.50) 46%, rgba(0,0,0,0.50) 50%, transparent 52%),
        linear-gradient(132deg, transparent 38%, rgba(0,0,0,0.32) 40%, rgba(0,0,0,0.32) 44%, transparent 46%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
    }


    /* ── Asteroid state variants ────────────────────────────── */

    /* GLOWING: colored outer ring that pulses — keeps hard black inner */
    .asteroid.glowing .a-body {
      box-shadow: 0 0 0 4px #000, 0 0 14px var(--glow);
      animation: a-pulse 2s ease-in-out infinite;
    }
    @keyframes a-pulse {
      0%,100% { box-shadow: 0 0 0 4px #000, 0 0 10px var(--glow); }
      50%      { box-shadow: 0 0 0 4px #000, 0 0 26px var(--glow); }
    }

    /* DIM: muted colour, thinner outline */
    .asteroid.dim .a-body {
      background: color-mix(in srgb, var(--c) 28%, #080420);
      box-shadow: 0 0 0 3px #000;
    }

    /* HOVERED: scale up + slightly thicker outline */
    .asteroid.hovered { --body-scl: 1.07; }
    .asteroid.hovered .a-body {
      box-shadow: 0 0 0 5px #000;
    }

    /* DIMMED: other asteroids when one is selected */
    .asteroid.dimmed {
      filter: brightness(0.18) saturate(0.05);
      pointer-events: none;
      transition: filter 0.30s ease;
    }

    /* SELECTED: zoom + white highlight ring + crack reveals */
    .asteroid.selected { --body-scl: 1.24; }
    .asteroid.selected .a-body {
      box-shadow: 0 0 0 4px #fff, 0 0 0 7px #000;
    }
    .asteroid.selected .a-crack { opacity: 1; }

    /* ── Empty flash text ───────────────────────────────────── */
    @keyframes empty-flash {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1);    }
      40%  { opacity: 0.8; transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(0.7);  }
    }
    .empty-text {
      position: absolute;   /* inside #stage so clip-path contains them */
      pointer-events: none;
      font-size: 20px;
      font-weight: 900;
      color: #ff4040;
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      letter-spacing: 3px;
      z-index: 200;
      animation: empty-flash 1s ease-out forwards;
    }

    /* ── Sparkle particles ──────────────────────────────────── */
    .sparkle {
      position: absolute;   /* inside #stage so clip-path contains them */
      pointer-events: none;
      border-radius: 50%;
      z-index: 600;
      animation: sparkle-out var(--dur, 0.6s) ease-out forwards;
    }
    @keyframes sparkle-out {
      0%   { transform: translate(0,0) scale(1);    opacity: 1; }
      100% { transform: translate(var(--tx,0px), var(--ty,0px)) scale(0); opacity: 0; }
    }

    /* ── Filters ─────────────────────────────────────────────── */
    #filter-wrap {
      display: none;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      margin-top: 4px;
    }
    .filter-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .flabel {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: rgba(190,190,255,0.50);
      min-width: 46px;
      padding-top: 5px;
      flex-shrink: 0;
      text-align: right;
    }
    .fpills { display: flex; flex-wrap: wrap; gap: 5px; }
    .fpill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px 10px;
      border: none;
      border-radius: 99px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(196,90,255,0.10);
      color: rgba(200,190,255,0.80);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.15s ease, box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    .fpill:hover  { background: rgba(196,90,255,0.22); transform: scale(1.07); }
    .fpill.active { background: #C45AFF; color: #fff;
                    box-shadow: 0 2px 10px rgba(196,90,255,0.42); transform: scale(1.05); }
    .filter-divider {
      width: 100%; height: 1px;
      background: rgba(196,90,255,0.14);
      margin: 2px 0;
    }
    #filter-count {
      font-size: 12px; font-weight: 700;
      color: rgba(190,190,255,0.50);
      text-align: center;
      transition: color 0.2s ease;
    }
    #filter-count.empty { color: #ff4040; }

    /* ── Start / Loading screen ─────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 25% 35%, #1e0a40 0%, #0a0522 55%, #050210 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    .fe {
      position: absolute; opacity: 0.20;
      animation: fe-float var(--d, 6s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    @keyframes fe-float {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      30%       { transform: translateY(-22px) rotate(9deg) scale(1.07); }
      65%       { transform: translateY(13px) rotate(-4deg) scale(0.95); }
    }
    .start-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(13,8,38,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 28px; padding: 44px 54px 40px;
      box-shadow: 0 8px 48px rgba(139,92,246,0.22), 0 2px 8px rgba(0,0,0,0.50);
      border: 2px solid rgba(139,92,246,0.28); text-align: center;
    }
    .start-icon  { font-size: 68px; line-height: 1; animation: makan-bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
    .start-title { font-size: 46px; font-weight: 900; color: #C45AFF; letter-spacing: -2px; line-height: 1; margin-top: 2px; }
    .start-rule  { width: 44px; height: 4px; background: linear-gradient(90deg, #C45AFF, #5BA8FF); border-radius: 2px; margin: 2px 0 4px; }
    .start-sub   { font-size: 15px; font-weight: 700; color: rgba(190,190,255,0.72); max-width: 240px; line-height: 1.45; }
    #loading-state { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 4px; }
    #loading-text  { font-size: 15px; font-weight: 700; color: rgba(190,190,255,0.72); }
    #tap-prompt {
      display: none; margin-top: 4px;
      font-size: 18px; font-weight: 900; cursor: pointer;
      padding: 15px 46px;
      background: linear-gradient(135deg, #C45AFF, #5BA8FF); color: #fff;
      border: none; border-radius: var(--r-full);
      box-shadow: 0 4px 22px rgba(196,90,255,0.44);
      font-family: var(--font);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    #tap-prompt:not(:disabled):hover { transform: scale(1.07); box-shadow: 0 6px 32px rgba(196,90,255,0.58); }
    #tap-prompt:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Backdrop ───────────────────────────────────────────── */
    #backdrop {
      position: fixed; inset: 0;
      background: rgba(5,2,16,0.76);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #backdrop.visible { opacity: 1; pointer-events: auto; cursor: pointer; }

    /* ── Reveal overlay ─────────────────────────────────────── */
    #reveal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s ease;
    }
    #reveal-overlay.visible { opacity: 1; }
    .reveal-card {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 44px 56px 38px; border-radius: 32px;
      background: var(--rev-bg, #6b1ab3);
      box-shadow: 0 10px 52px rgba(0,0,0,0.50), 0 3px 14px rgba(0,0,0,0.30);
      text-align: center; min-width: 280px; max-width: 400px;
      animation: rev-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes rev-pop {
      from { transform: scale(0.55) translateY(16px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    .reveal-logo    { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.92); object-fit: contain; flex-shrink: 0; }
    .reveal-logo-fb { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.92); display: none; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; color: var(--rev-bg, #6b1ab3); flex-shrink: 0; }
    .reveal-name    { font-size: 24px; font-weight: 900; color: #fff; line-height: 1.28; text-shadow: 0 1px 4px rgba(0,0,0,0.22); max-width: 320px; }
    .reveal-venue   { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.78); margin-top: -4px; }
    .reveal-hint    { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: rgba(255,255,255,0.50); margin-top: 2px; }

    /* ── Try Again button ──────────────────────────────────── */
    #repick-btn {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 1001; display: none;
      padding: 13px 34px; border: none; border-radius: var(--r-full);
      background: linear-gradient(135deg, #C45AFF, #5BA8FF); color: #fff;
      font-size: 16px; font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 22px rgba(196,90,255,0.46);
      font-family: var(--font);
      transition: box-shadow 0.15s ease, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    #repick-btn:hover { box-shadow: 0 6px 30px rgba(196,90,255,0.62); transform: translateX(-50%) scale(1.07); }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .start-card  { padding: 28px 20px 24px; }
      .start-title { font-size: 36px; }
      .start-icon  { font-size: 52px; }
      .start-sub   { font-size: 14px; max-width: 200px; }
      .reveal-card { padding: 32px 28px 28px; min-width: 0; max-width: 88vw; }
      .reveal-logo, .reveal-logo-fb { width: 88px; height: 88px; }
      .reveal-logo-fb { font-size: 36px; }
      .reveal-name  { font-size: 20px; }
      .reveal-venue { font-size: 13px; }
      .flabel       { min-width: 38px; font-size: 9px; }
      .fpill        { font-size: 11px; padding: 3px 8px; }
    }
  </style>
</head>
<body>

  <!-- SVG ink filter for frame -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="bl-ink" x="-5%" y="-5%" width="110%" height="110%"
              color-interpolation-filters="linearRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.014"
                      numOctaves="2" seed="9" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise"
                           scale="5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Frame border -->
  <div id="frame" aria-hidden="true"></div>

  <!-- Start / loading screen -->
  <div id="loading-overlay">
    <span class="fe" style="top:7%;left:5%;font-size:34px;--d:5.4s;--del:0s">🪨</span>
    <span class="fe" style="top:68%;left:3%;font-size:22px;--d:6.9s;--del:1.1s">⭐</span>
    <span class="fe" style="top:14%;right:7%;font-size:40px;--d:4.8s;--del:0.6s">🪐</span>
    <span class="fe" style="top:76%;right:5%;font-size:27px;--d:7.3s;--del:2.0s">🌙</span>
    <span class="fe" style="top:44%;left:2%;font-size:20px;--d:5.8s;--del:1.5s">☄️</span>
    <span class="fe" style="top:36%;right:3%;font-size:32px;--d:6.2s;--del:0.3s">💫</span>
    <span class="fe" style="bottom:16%;left:11%;font-size:26px;--d:5.1s;--del:2.5s">🌟</span>
    <span class="fe" style="bottom:10%;right:11%;font-size:36px;--d:7.7s;--del:1.8s">✨</span>
    <div class="start-card">
      <div class="start-icon">🪐</div>
      <h1 class="start-title">MakanSpace</h1>
      <div class="start-rule"></div>
      <p class="start-sub">Tap a drifting asteroid to reveal your next restaurant!</p>

      <!-- Filters (shown after data loads) -->
      <div id="filter-wrap">
        <div class="filter-divider"></div>
        <div class="filter-row">
          <span class="flabel">Dietary</span>
          <div class="fpills">
            <button class="fpill" data-catid="724">🌙 Halal</button>
            <button class="fpill" data-catid="732">🐷 Pork Free</button>
            <button class="fpill" data-catid="735">🥗 Veg</button>
            <button class="fpill" data-catid="728">👦 Kids</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Cuisine</span>
          <div class="fpills">
            <button class="fpill" data-catid="730">🍜 Local</button>
            <button class="fpill" data-catid="720">🥢 Chinese</button>
            <button class="fpill" data-catid="727">🍱 Japanese</button>
            <button class="fpill" data-catid="729">🌶️ Korean</button>
            <button class="fpill" data-catid="737">🍔 Western</button>
            <button class="fpill" data-catid="725">🍛 Indian</button>
            <button class="fpill" data-catid="734">🌿 Thai</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Type</span>
          <div class="fpills">
            <button class="fpill" data-catid="721">🍰 Desserts</button>
            <button class="fpill" data-catid="722">🥤 Drinks</button>
            <button class="fpill" data-catid="719">☕ Café</button>
            <button class="fpill" data-catid="718">🥐 Bakery</button>
            <button class="fpill" data-catid="723">⚡ Fast Food</button>
            <button class="fpill" data-catid="733">🍿 Snack</button>
          </div>
        </div>
        <p id="filter-count"></p>
        <div class="filter-divider"></div>
      </div>

      <div id="loading-state">
        <div class="makan-spinner"
             style="border-color:rgba(196,90,255,0.18);border-top-color:#C45AFF;"></div>
        <p id="loading-text">Scanning asteroid field…</p>
      </div>
      <button id="tap-prompt">Launch! 🚀</button>
    </div>
  </div>

  <!-- Stage -->
  <div id="stage">
    <canvas id="starfield"></canvas>
    <div id="nebula" aria-hidden="true"></div>
  </div>

  <!-- Backdrop -->
  <div id="backdrop"></div>

  <!-- Reveal card -->
  <div id="reveal-overlay">
    <div class="reveal-card" id="reveal-card">
      <img  class="reveal-logo"    id="rev-logo" src="" alt="" style="display:none">
      <div  class="reveal-logo-fb" id="rev-fb"></div>
      <h2   class="reveal-name"    id="rev-name"></h2>
      <p    class="reveal-venue"   id="rev-venue"></p>
      <span class="reveal-hint">Tap anywhere to close</span>
    </div>
  </div>

  <button id="repick-btn">Try Again! 🚀</button>

  <script src="data.js"></script>
  <script>
  'use strict';

  // ── Filter groups (same IDs as MakanBox) ──────────────────
  const FILTER_GROUPS = {
    dietary: [724, 732, 735, 728],
    cuisine: [730, 720, 727, 729, 737, 725, 734],
    type:    [721, 722, 719, 718, 723, 733],
  };

  // ── Asteroid colour palettes ───────────────────────────────
  const PALETTE = [
    { c: '#C45AFF', cd: '#8f22d4', glow: 'rgba(196,90,255,0.65)',  rev: '#6b1ab3' },
    { c: '#FF7B42', cd: '#cc4a15', glow: 'rgba(255,123,66,0.65)',  rev: '#9e3810' },
    { c: '#3DCFBA', cd: '#259d8c', glow: 'rgba(61,207,186,0.65)',  rev: '#1a7068' },
    { c: '#FF4D78', cd: '#c41f4a', glow: 'rgba(255,77,120,0.65)',  rev: '#9e1542' },
    { c: '#F5CB45', cd: '#c49a00', glow: 'rgba(245,203,69,0.65)',  rev: '#8c6d00' },
    { c: '#5BA8FF', cd: '#2a6acc', glow: 'rgba(91,168,255,0.65)',  rev: '#1a4d99' },
  ];

  // Organic blob shapes (border-radius 8-value) — set directly via JS,
  // NOT via CSS custom property (var() can't carry the "/" separator).
  const SHAPES = [
    '56% 44% 52% 48% / 50% 58% 42% 54%',
    '48% 52% 60% 40% / 55% 44% 58% 44%',
    '62% 38% 48% 52% / 44% 58% 44% 60%',
    '50% 50% 55% 45% / 60% 40% 55% 45%',
    '44% 56% 42% 58% / 52% 48% 60% 42%',
    '54% 46% 64% 36% / 48% 54% 44% 56%',
  ];

  // Jagged rock shapes — clip-path polygons for ~40% of asteroids
  const JAGGED_SHAPES = [
    'polygon(52% 0%, 84% 10%, 100% 38%, 92% 68%, 74% 90%, 44% 100%, 16% 88%, 0% 60%, 6% 28%, 30% 6%)',
    'polygon(60% 2%, 88% 18%, 98% 46%, 90% 74%, 68% 94%, 38% 100%, 12% 86%, 2% 56%, 8% 24%, 36% 4%)',
    'polygon(48% 0%, 78% 8%, 100% 34%, 96% 64%, 80% 88%, 52% 100%, 20% 96%, 2% 68%, 4% 32%, 22% 8%)',
    'polygon(42% 4%, 76% 0%, 100% 28%, 98% 58%, 76% 92%, 46% 100%, 14% 84%, 0% 50%, 8% 18%, 28% 2%)',
    'polygon(56% 0%, 90% 14%, 100% 50%, 82% 84%, 56% 100%, 24% 98%, 4% 74%, 0% 40%, 14% 12%, 40% 2%)',
    'polygon(50% 2%, 80% 0%, 100% 32%, 94% 66%, 70% 96%, 38% 100%, 8% 82%, 0% 46%, 10% 16%, 32% 4%)',
  ];

  // ── State ─────────────────────────────────────────────────
  let allShops      = [];
  let asteroids     = [];
  let trails        = []; // debris trail particles drawn on starCanvas
  const emptyFlashing = new Set(); // locks empty asteroids against double-tap
  let selectedAst   = null;
  let running       = false;
  let lastTime      = 0;
  let lastSpawn     = 0;
  let shopQueue     = [];
  let activeFilters = new Set();
  let cameraVx      = 0; // shared pan velocity — all asteroids ride this together

  const TARGET_ASTEROIDS = 22; // on-screen target — drives count-based fill
  const SPAWN_GAP        = 300; // min ms between consecutive spawns

  // ── Filter logic ──────────────────────────────────────────
  function getFilteredShops() {
    if (activeFilters.size === 0) return allShops;
    const activeByGroup = {};
    for (const id of activeFilters) {
      for (const [group, ids] of Object.entries(FILTER_GROUPS)) {
        if (ids.includes(id)) {
          if (!activeByGroup[group]) activeByGroup[group] = [];
          activeByGroup[group].push(id);
          break;
        }
      }
    }
    return allShops.filter(shop =>
      Object.values(activeByGroup).every(groupIds =>
        groupIds.some(id => shop.categories.includes(id))
      )
    );
  }

  function updateFilterCount() {
    const n   = getFilteredShops().length;
    const el  = document.getElementById('filter-count');
    const btn = document.getElementById('tap-prompt');
    el.textContent = n === 0
      ? 'No restaurants match — try fewer filters'
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
    el.classList.toggle('empty', n === 0);
    btn.disabled      = n === 0;
    btn.style.opacity = n === 0 ? '0.45' : '';
  }

  function initFilters() {
    const wrap = document.getElementById('filter-wrap');
    wrap.style.display = 'flex';
    updateFilterCount();
    wrap.querySelectorAll('.fpill').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.catid);
        if (activeFilters.has(id)) {
          activeFilters.delete(id); btn.classList.remove('active');
        } else {
          activeFilters.add(id);   btn.classList.add('active');
        }
        updateFilterCount();
      });
    });
  }

  // ── Audio ─────────────────────────────────────────────────
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playThud() {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime;
    const dur = 0.32;
    const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.4);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const lp  = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 320;
    const g   = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.055, t + 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur + 0.05);
  }

  function playCrack() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [660, 990].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const g   = audioCtx.createGain(); const s = i * 0.06;
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.060, t + s + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + 0.18);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + s); osc.stop(t + s + 0.22);
    });
  }

  function playChime() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const g   = audioCtx.createGain(); const s = i * 0.09;
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.09, t + s + 0.018);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + 0.52);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + s); osc.stop(t + s + 0.58);
    });
  }

  function playBuzz() {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 200;
    osc.frequency.exponentialRampToValueAtTime(70, t + 0.22);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.28);
  }

  // ── Starfield canvas ──────────────────────────────────────
  const starCanvas = document.getElementById('starfield');
  const starCtx    = starCanvas.getContext('2d');
  let   stars        = [];
  let   bgWisps      = [];
  let   bgShoots     = [];
  let   bgShootTimer = 0;
  let   bgSun        = null;

  function initStars() {
    const stage     = document.getElementById('stage');
    starCanvas.width  = stage.offsetWidth;
    starCanvas.height = stage.offsetHeight;
    stars = [];
    const W = starCanvas.width, H = starCanvas.height;
    [
      { count: 90, speed: 0.06, minSz: 0.4, maxSz: 0.9,  baseAlpha: 0.50 },
      { count: 55, speed: 0.14, minSz: 0.7, maxSz: 1.6,  baseAlpha: 0.68 },
      { count: 28, speed: 0.28, minSz: 1.1, maxSz: 2.6,  baseAlpha: 0.88 },
    ].forEach(layer => {
      for (let i = 0; i < layer.count; i++) {
        stars.push({
          x: Math.random() * W, y: Math.random() * H,
          size:       layer.minSz + Math.random() * (layer.maxSz - layer.minSz),
          speed:      layer.speed * (0.70 + Math.random() * 0.60),
          alpha:      layer.baseAlpha * (0.45 + Math.random() * 0.55),
          phase:      Math.random() * Math.PI * 2,
          phaseSpeed: 0.5 + Math.random() * 2.4,
        });
      }
    });

    // Sun — fixed, partially off top-right corner
    // cx/cy stored as fractions so drawStars can resolve to canvas px each frame
    bgSun = { fx: 0.88, fy: -0.18, fr: 0.38 }; // fraction of W/H

    // Galaxy clusters — 4 elliptical smears with colour tints
    const GCOLS = [
      [255, 255, 255],   // neutral white
      [180, 140, 255],   // purple
      [140, 190, 255],   // blue
      [255, 215, 140],   // gold
    ];
    GCOLS.forEach(col => {
      const gx  = W * (0.08 + Math.random() * 0.84);
      const gy  = H * (0.08 + Math.random() * 0.84);
      const gRx = 45 + Math.random() * 85, gRy = 16 + Math.random() * 42;
      const gA  = Math.random() * Math.PI;
      const cnt = 80 + Math.floor(Math.random() * 40);
      for (let i = 0; i < cnt; i++) {
        const ang  = Math.random() * Math.PI * 2;
        const dist = Math.random() * Math.random();
        const ex   = dist * Math.cos(ang) * gRx, ey = dist * Math.sin(ang) * gRy;
        stars.push({
          x:          gx + ex * Math.cos(gA) - ey * Math.sin(gA),
          y:          gy + ex * Math.sin(gA) + ey * Math.cos(gA),
          size:       0.4 + Math.random() * 1.1,
          speed:      0.03 + Math.random() * 0.04,
          alpha:      0.70 + Math.random() * 0.30,
          phase:      Math.random() * Math.PI * 2,
          phaseSpeed: 0.3 + Math.random() * 1.0,
          cr: col[0], cg: col[1], cb: col[2],
        });
      }
    });

    // Nebula wisps — slow drifting elongated colour blobs
    bgWisps = [];
    bgShoots = [];
    bgShootTimer = 2000 + Math.random() * 3000;
    const WCOLS = [
      [120, 55, 255],   // purple
      [50,  140, 255],  // blue
      [55,  210, 185],  // teal
      [255, 75,  140],  // pink
      [255, 165,  40],  // amber
      [140,  60, 220],  // violet
    ];
    for (let i = 0; i < 4; i++) {
      const col = WCOLS[i % WCOLS.length];
      bgWisps.push({
        cx:         W * (0.05 + Math.random() * 0.90),
        cy:         H * (0.05 + Math.random() * 0.90),
        rx:         W * (0.22 + Math.random() * 0.22),
        ry:         H * (0.07 + Math.random() * 0.10),
        angle:      Math.random() * Math.PI,
        vx:         0.4 + Math.random() * 0.9,
        alpha:      0.10 + Math.random() * 0.09,
        phase:      Math.random() * Math.PI * 2,
        phaseSpeed: 0.12 + Math.random() * 0.22,
        r: col[0], g: col[1], b: col[2],
      });
    }
  }

  function tickStars(dt) {
    const W = starCanvas.width, H = starCanvas.height;
    for (const s of stars) {
      s.x     -= s.speed * dt * 0.06;
      s.phase += s.phaseSpeed * dt * 0.001;
      if (s.x < -2) s.x = W + 2;
    }
    // Nebula wisps drift
    for (const w of bgWisps) {
      w.cx    -= w.vx * dt * 0.001;
      w.phase += w.phaseSpeed * dt * 0.001;
      if (w.cx < -w.rx) w.cx = W + w.rx;
    }
    // Shooting stars
    bgShootTimer -= dt;
    if (bgShootTimer < 0) {
      bgShootTimer = 3500 + Math.random() * 5000;
      const spd   = 650 + Math.random() * 450;
      const angle = Math.PI + (Math.random() - 0.5) * 0.55;
      bgShoots.push({
        x:    W * (0.35 + Math.random() * 0.65),
        y:    H * Math.random() * 0.65,
        vx:   Math.cos(angle) * spd,
        vy:   Math.sin(angle) * spd,
        len:  65 + Math.random() * 115,
        life: 1,
      });
    }
    for (let i = bgShoots.length - 1; i >= 0; i--) {
      const s = bgShoots[i];
      s.x    += s.vx * dt * 0.001;
      s.y    += s.vy * dt * 0.001;
      s.life -= dt * 0.0030;
      if (s.life <= 0) bgShoots.splice(i, 1);
    }
  }

  function drawStars() {
    const ctx = starCtx;
    ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);

    // Sun — drawn first, deepest layer
    if (bgSun) {
      const W = starCanvas.width, H = starCanvas.height;
      const sx = bgSun.fx * W, sy = bgSun.fy * H, sr = bgSun.fr * H;

      // Outer corona — huge, very faint amber wash
      const corona = ctx.createRadialGradient(sx, sy, sr * 0.4, sx, sy, sr * 2.6);
      corona.addColorStop(0,   'rgba(255,190,70,0.13)');
      corona.addColorStop(0.4, 'rgba(255,140,30,0.06)');
      corona.addColorStop(1,   'rgba(255,80,10,0)');
      ctx.beginPath();
      ctx.arc(sx, sy, sr * 2.6, 0, Math.PI * 2);
      ctx.fillStyle = corona;
      ctx.fill();

      // Mid glow — orange bloom
      const mid = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 1.1);
      mid.addColorStop(0,   'rgba(255,220,130,0.55)');
      mid.addColorStop(0.3, 'rgba(255,170,60,0.28)');
      mid.addColorStop(0.7, 'rgba(255,110,20,0.10)');
      mid.addColorStop(1,   'rgba(255,80,10,0)');
      ctx.beginPath();
      ctx.arc(sx, sy, sr * 1.1, 0, Math.PI * 2);
      ctx.fillStyle = mid;
      ctx.fill();

      // Core — bright white-yellow disc
      const core = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 0.28);
      core.addColorStop(0,   'rgba(255,255,235,1.0)');
      core.addColorStop(0.5, 'rgba(255,240,170,0.85)');
      core.addColorStop(1,   'rgba(255,200,80,0)');
      ctx.beginPath();
      ctx.arc(sx, sy, sr * 0.28, 0, Math.PI * 2);
      ctx.fillStyle = core;
      ctx.fill();
    }

    // Nebula wisps — drawn deepest, behind everything
    for (const w of bgWisps) {
      const a = w.alpha * (0.75 + 0.25 * Math.sin(w.phase));
      ctx.save();
      ctx.translate(w.cx, w.cy);
      ctx.rotate(w.angle);
      ctx.scale(1, w.ry / w.rx);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, w.rx);
      grad.addColorStop(0,   `rgba(${w.r},${w.g},${w.b},${a.toFixed(3)})`);
      grad.addColorStop(0.35,`rgba(${w.r},${w.g},${w.b},${(a * 0.30).toFixed(3)})`);
      grad.addColorStop(1,   `rgba(${w.r},${w.g},${w.b},0)`);
      ctx.beginPath();
      ctx.arc(0, 0, w.rx, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    // Stars + tinted galaxy cluster dots
    for (const s of stars) {
      const a = s.alpha * (0.68 + 0.32 * Math.sin(s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.cr||255},${s.cg||255},${s.cb||255},${a.toFixed(3)})`;
      ctx.fill();
    }

    // Debris trails (asteroid wakes — behind div layer, above background)
    for (const t of trails) {
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${t.tr},${t.tg},${t.tb},${t.alpha.toFixed(3)})`;
      ctx.fill();
    }

    // Shooting stars (drawn on top)
    for (const s of bgShoots) {
      const mag  = Math.hypot(s.vx, s.vy);
      const dx   = s.vx / mag, dy = s.vy / mag;
      const grad = ctx.createLinearGradient(
        s.x - dx * s.len, s.y - dy * s.len, s.x, s.y
      );
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(1, `rgba(255,255,255,${(s.life * 0.95).toFixed(3)})`);
      ctx.beginPath();
      ctx.moveTo(s.x - dx * s.len, s.y - dy * s.len);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }
  }

  // ── Sparkle burst ─────────────────────────────────────────
  function spawnSparkles(el, color) {
    const stage = document.getElementById('stage');
    const sr = stage.getBoundingClientRect();
    const r  = el.getBoundingClientRect();
    const cx = r.left + r.width  * 0.5 - sr.left;
    const cy = r.top  + r.height * 0.5 - sr.top;
    for (let i = 0; i < 18; i++) {
      const ang  = (i / 18) * Math.PI * 2 + Math.random() * 0.4;
      const dist = 60 + Math.random() * 90;
      const sz   = 4 + Math.random() * 7;
      const dur  = 0.45 + Math.random() * 0.35;
      const sp   = document.createElement('div');
      sp.className = 'sparkle';
      sp.style.cssText = `
        left:${cx - sz/2}px; top:${cy - sz/2}px;
        width:${sz}px; height:${sz}px;
        background:${color};
        box-shadow: 0 0 0 2px #000, 0 0 ${sz}px ${color};
        --tx:${Math.cos(ang) * dist}px;
        --ty:${Math.sin(ang) * dist}px;
        --dur:${dur}s;
      `;
      stage.appendChild(sp);
      setTimeout(() => sp.remove(), dur * 1000 + 50);
    }
  }

  // ── Shop queue — uses filtered set ────────────────────────
  function refillQueue() { shopQueue = [...getFilteredShops()].sort(() => Math.random() - 0.5); }
  function nextShop()    { if (!shopQueue.length) refillQueue(); return shopQueue.pop(); }

  // ── Asteroid factory ──────────────────────────────────────
  function makeAsteroid(shop, pal, variant, depth, prefill = false, prefillIdx = 0, prefillTotal = 1) {
    const stage  = document.getElementById('stage');
    const W      = stage.offsetWidth;
    const H      = stage.offsetHeight;
    const SIZES  = ['xs', 'sm', 'md', 'lg', 'xl'];
    const szKey  = SIZES[Math.min(4, Math.floor(depth * 5))];
    // Prefill: stratified x — divide [0, 1.4W] into prefillTotal zones and place
    // each asteroid randomly within its zone. Prevents random clumping on startup
    // while still looking natural. Normal spawns enter from just off the right edge.
    const zoneW  = prefill ? (W * 1.40) / prefillTotal : 0;
    const initX  = prefill ? prefillIdx * zoneW + Math.random() * zoneW : W + 180;
    const initY  = H * (0.06 + Math.random() * 0.88);
    const shape  = SHAPES[Math.floor(Math.random() * SHAPES.length)];

    // ── Variation rolls ──────────────────────────────────────
    // Jagged (40%): polygon clip-path instead of smooth border-radius blob
    const isJagged = Math.random() < 0.40;
    const clipShape = isJagged
      ? JAGGED_SHAPES[Math.floor(Math.random() * JAGGED_SHAPES.length)]
      : null;

    // Ice/crystal (18%): desaturated blue-white palette override
    const isIce = variant !== 'empty' && Math.random() < 0.18;
    const displayPal = isIce
      ? { c: '#cce8ff', cd: '#8fcff5', glow: 'rgba(180,230,255,0.85)' }
      : pal;

    // Randomised craters: 1–4, random size/position/ellipticity, no overlaps
    // Weighted toward fewer craters: 1=45%, 2=30%, 3=17%, 4=8%
    const _cr = Math.random();
    const craterCount = _cr < 0.45 ? 1 : _cr < 0.75 ? 2 : _cr < 0.92 ? 3 : 4;
    let craterHTML = '';
    const placed = []; // { cx, cy, rx, ry } in percentage units
    for (let c = 0; c < craterCount; c++) {
      const cw = 9  + Math.random() * 19;          // width %
      const ch = cw * (0.65 + Math.random() * 0.5); // height %
      const rx = cw / 2, ry = ch / 2;
      let cl, ct, tries = 0, ok = false;
      while (tries++ < 20) {
        cl = 8 + Math.random() * (84 - cw);
        ct = 8 + Math.random() * (84 - ch);
        const ncx = cl + rx, ncy = ct + ry;
        ok = placed.every(p => {
          const dx = ncx - p.cx, dy = ncy - p.cy;
          // Non-touch check: center distance must exceed both outer radii + 5% gap
          const minDist = Math.max(rx, ry) + Math.max(p.rx, p.ry) + 5;
          return Math.hypot(dx, dy) > minDist;
        });
        if (ok) break;
      }
      if (ok || tries >= 20) { // place anyway after 20 failed attempts (small asteroid)
        placed.push({ cx: cl + rx, cy: ct + ry, rx, ry });
        craterHTML += `<div class="a-crater" style="width:${cw.toFixed(1)}%;height:${ch.toFixed(1)}%;left:${cl.toFixed(1)}%;top:${ct.toFixed(1)}%"></div>`;
      }
    }

    const el = document.createElement('div');
    el.className = `asteroid ${szKey}${variant ? ' ' + variant : ''}${isIce ? ' ice' : ''}`;
    el.style.left   = `${initX}px`;
    el.style.top    = `${initY}px`;
    el.style.zIndex = Math.round(depth * 18) + 5;
    el.style.setProperty('--c',    displayPal.c);
    el.style.setProperty('--cd',   displayPal.cd);
    el.style.setProperty('--glow', displayPal.glow);

    el.innerHTML = `
      <div class="a-scene${isJagged ? ' jagged' : ''}">
        <div class="a-body${isJagged ? ' jagged' : ''}">
          ${craterHTML}
          <div class="a-crack"></div>
        </div>
      </div>`;

    // Apply shape — blob via border-radius, jagged via clip-path
    const body = el.querySelector('.a-body');
    if (isJagged) {
      body.style.clipPath = clipShape;
    } else {
      body.style.borderRadius = shape;
    }

    // Tumble: JS updates --body-rot on the .asteroid element each frame.
    // CSS uses rotate: var(--body-rot) on .a-body so hover/select scale still works.
    const rotSpeed = (Math.random() < 0.5 ? 1 : -1) * (0.8 + Math.random() * 1.8);
    let   rotAngle = Math.random() * 360;

    const cruiseVx = -(38 + depth * 80);
    const vx       = cruiseVx; // camera pan provides the rush — asteroids always at cruise
    const vy          = (Math.random() - 0.5) * 20;
    const wobbleAmp   = 8 + Math.random() * 18;
    const wobbleFreq  = 0.28 + Math.random() * 0.50;
    const wobblePhase = Math.random() * Math.PI * 2;

    const astData = { el, x: initX, y: initY, vx, vy, wobbleAmp, wobbleFreq, wobblePhase,
                      rotSpeed, rotAngle, depth, shop, pal, variant, shape };

    el.addEventListener('mouseenter', () => {
      if (selectedAst || el.classList.contains('dimmed')) return;
      el.classList.add('hovered');
    });
    el.addEventListener('mouseleave', () => el.classList.remove('hovered'));
    el.addEventListener('click', () => {
      if (!selectedAst && !el.classList.contains('dimmed')) selectAsteroid(astData);
    });
    el.addEventListener('touchend', e => {
      e.preventDefault();
      el.classList.remove('hovered'); // prevent stale hover state on touch devices
      if (!selectedAst && !el.classList.contains('dimmed')) selectAsteroid(astData);
    }, { passive: false });

    asteroids.push(astData);
    stage.appendChild(el);
    if (audioCtx) playThud();
    return astData;
  }

  // ── Select an asteroid ────────────────────────────────────
  function selectAsteroid(astData) {
    if (astData.variant === 'empty') {
      if (emptyFlashing.has(astData.el)) return; // prevent double-tap spam
      emptyFlashing.add(astData.el);
      setTimeout(() => emptyFlashing.delete(astData.el), 1200);
      playBuzz();
      if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      flashEmpty(astData);
      astData.vx = -320;
      astData.vy = (Math.random() < 0.5 ? 1 : -1) * (65 + Math.random() * 85);
      astData.wobbleAmp = 0;
      return;
    }

    selectedAst = astData;
    playCrack();
    if (navigator.vibrate) navigator.vibrate(65);

    asteroids.forEach(a => { if (a !== astData) a.el.classList.add('dimmed'); });

    const stage = document.getElementById('stage');
    const cx    = stage.offsetWidth  * 0.5;
    const cy    = stage.offsetHeight * 0.5;
    astData.el.style.transition = 'left 0.52s cubic-bezier(0.34,1.56,0.64,1), top 0.52s cubic-bezier(0.34,1.56,0.64,1)';
    astData.el.style.left   = `${cx}px`;
    astData.el.style.top    = `${cy}px`;
    astData.el.classList.remove('hovered');
    astData.el.classList.add('selected');
    astData.el.style.zIndex = 500;
    astData.x = cx;
    astData.y = cy;

    document.getElementById('backdrop').classList.add('visible');
    document.getElementById('repick-btn').style.display = 'block';

    setTimeout(() => {
      spawnSparkles(astData.el, astData.pal.c);
      showReveal(astData.shop, astData.pal);
      playChime();
      if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
    }, 500);
  }

  function flashEmpty(astData) {
    const stage = document.getElementById('stage');
    const sr  = stage.getBoundingClientRect();
    const r   = astData.el.getBoundingClientRect();
    const txt = document.createElement('div');
    txt.className   = 'empty-text';
    txt.textContent = 'EMPTY';
    txt.style.left      = `${r.left + r.width  * 0.5 - sr.left}px`;
    txt.style.top       = `${r.top  + r.height * 0.5 - sr.top}px`;
    txt.style.transform = 'translate(-50%,-50%)';
    stage.appendChild(txt);
    setTimeout(() => txt.remove(), 1100);
  }

  // ── Dismiss ───────────────────────────────────────────────
  function dismiss() {
    if (!selectedAst) return;
    selectedAst.el.style.transition = '';
    selectedAst.el.classList.remove('selected');
    selectedAst = null;
    hideReveal();
    asteroids.forEach(a => a.el.classList.remove('dimmed'));
    document.getElementById('backdrop').classList.remove('visible');
    document.getElementById('repick-btn').style.display = 'none';
  }

  // ── Reveal card ───────────────────────────────────────────
  function showReveal(shop, pal) {
    const card = document.getElementById('reveal-card');
    const logo = document.getElementById('rev-logo');
    const fb   = document.getElementById('rev-fb');
    card.style.setProperty('--rev-bg', pal.rev);
    const src = shop.logo || '';
    if (src) {
      logo.src = src; logo.style.display = 'block'; fb.style.display = 'none';
      logo.onerror = () => { logo.style.display = 'none'; fb.style.display = 'flex'; };
    } else {
      logo.style.display = 'none';
      fb.style.display   = 'flex';
      fb.textContent     = (shop.title || '?')[0].toUpperCase();
    }
    document.getElementById('rev-name').textContent  = shop.title || 'Unknown';
    document.getElementById('rev-venue').textContent = shop.venue  || '';
    document.getElementById('reveal-overlay').classList.add('visible');
  }
  function hideReveal() {
    document.getElementById('reveal-overlay').classList.remove('visible');
  }

  // ── Spawn ─────────────────────────────────────────────────
  function spawnAsteroid(now, prefill = false, prefillIdx = 0, prefillTotal = 1) {
    if (!running || !getFilteredShops().length) return;

    const shop    = nextShop();
    const pal     = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    const depth   = 0.20 + Math.random() * 0.80;
    const roll    = Math.random();
    const variant = roll < 0.50 ? 'empty'
                  : roll < 0.62 ? 'glowing'
                  : roll < 0.74 ? 'dim'
                  : null;

    makeAsteroid(shop, pal, variant, depth, prefill, prefillIdx, prefillTotal);
    lastSpawn = now;
  }

  // ── Main loop ─────────────────────────────────────────────
  function loop(now) {
    if (!running) return;
    const dt = Math.min(now - lastTime, 80);
    lastTime = now;

    // Count-based fill: spawn whenever below target, respecting min gap
    if (asteroids.length < TARGET_ASTEROIDS && now - lastSpawn > SPAWN_GAP) spawnAsteroid(now);

    // Debris trails — spawn particles behind fast/deep asteroids
    if (!selectedAst) {
      for (const a of asteroids) {
        if (a.x > 0 && a.depth > 0.45 && trails.length < 300 && Math.random() < a.depth * 0.14) {
          const hex = a.pal.c.replace('#', '');
          const tr  = parseInt(hex.slice(0,2), 16);
          const tg  = parseInt(hex.slice(2,4), 16);
          const tb  = parseInt(hex.slice(4,6), 16);
          const sz  = 60 + a.depth * 130; // approximate body pixel size
          trails.push({
            x: a.x + sz * 0.30 + (Math.random() - 0.5) * sz * 0.35,
            y: a.y             + (Math.random() - 0.5) * sz * 0.35,
            r:     1.0 + Math.random() * sz * 0.022,
            alpha: 0.50 + Math.random() * 0.35,
            vx:    a.vx * 0.06 + (Math.random() - 0.5) * 10,
            vy:    (Math.random() - 0.5) * 16,
            tr, tg, tb,
            decay: 1.6 + Math.random() * 1.8,
          });
        }
      }
    }
    // Tick + cull trails
    for (let i = trails.length - 1; i >= 0; i--) {
      const t = trails[i];
      t.x     += t.vx * dt * 0.001;
      t.y     += t.vy * dt * 0.001;
      t.alpha -= t.decay * dt * 0.001;
      if (t.alpha <= 0) trails.splice(i, 1);
    }

    tickStars(dt);
    drawStars();

    // Decelerate camera pan — ease-out over ~1.5s
    if (cameraVx !== 0) {
      cameraVx += (0 - cameraVx) * Math.min(dt * 0.003, 0.15);
      if (Math.abs(cameraVx) < 0.8) cameraVx = 0;
    }

    const stage = document.getElementById('stage');
    const H     = stage.offsetHeight;

    for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      if (a === selectedAst) continue;

      a.wobblePhase += a.wobbleFreq * dt * 0.001;
      a.rotAngle    += a.rotSpeed   * dt * 0.001;
      a.x += (a.vx + cameraVx) * dt * 0.001;
      a.y += a.vy * dt * 0.001 + Math.sin(a.wobblePhase) * a.wobbleAmp * dt * 0.006;

      if (a.y < 28)     { a.y = 28;     a.vy =  Math.abs(a.vy) * 0.7; }
      if (a.y > H - 28) { a.y = H - 28; a.vy = -Math.abs(a.vy) * 0.7; }

      a.el.style.left = `${a.x}px`;
      a.el.style.top  = `${a.y}px`;

      // Tumble: set CSS variable on .asteroid so .a-body's rotate() picks it up
      // without conflicting with the CSS-driven scale() for hover/selected states
      a.el.style.setProperty('--body-rot', `${a.rotAngle}deg`);

      if (a.x < -260) {
        a.el.remove();
        asteroids.splice(i, 1);
      }
    }

    requestAnimationFrame(loop);
  }

  // ── Start ─────────────────────────────────────────────────
  function startGame() {
    running   = true;
    lastTime  = performance.now();
    refillQueue();
    initStars();
    requestAnimationFrame(loop);

    // Prefill: stratified across [0, 1.4W] — 22 evenly zoned, random within zone.
    for (let i = 0; i < TARGET_ASTEROIDS; i++) {
      spawnAsteroid(performance.now(), true, i, TARGET_ASTEROIDS);
    }
    // Small gap before count-based fill kicks in (gives prefill time to render)
    lastSpawn = performance.now();
  }

  // ── Listeners ─────────────────────────────────────────────
  document.getElementById('backdrop').addEventListener('click', dismiss);

  document.getElementById('repick-btn').addEventListener('click', () => {
    dismiss();
    asteroids.forEach(a => a.el.remove());
    asteroids = [];
    trails    = [];
    lastSpawn = -Infinity;
    refillQueue();
  });

  let _resizeTimer = null;
  window.addEventListener('resize', () => {
    if (!running) return;
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => initStars(), 200);
  });

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    const overlay   = document.getElementById('loading-overlay');
    const loadState = document.getElementById('loading-state');
    const tapBtn    = document.getElementById('tap-prompt');

    try {
      allShops = await loadFBShops();
      loadState.style.display = 'none';
      tapBtn.style.display    = 'block';
      initFilters();

      tapBtn.addEventListener('click', () => {
        if (tapBtn.disabled) return;
        initAudio();
        overlay.style.opacity       = '0';
        overlay.style.pointerEvents = 'none';
        setTimeout(() => { overlay.style.display = 'none'; startGame(); }, 400);
      }, { once: true });

    } catch (e) {
      console.error('MakanSpace:', e);
      loadState.innerHTML = `<p style="color:#ff4040;font-weight:700;font-size:14px">
        Could not load restaurant data.<br>Please check data.js is available.</p>`;
    }
  }

  init();
  </script>
</body>
