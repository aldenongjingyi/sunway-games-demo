<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MakanBox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at 50% 50%, #1e6b32 0%, #14492a 70%, #0d2e1a 100%);
    }

    /* Loading Overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, #1e6b32 0%, #14492a 70%, #0d2e1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      gap: 20px;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-overlay p {
      font-size: 18px;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    #tap-prompt {
      display: none;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      padding: 16px 36px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 12px;
      transition: background 0.2s, transform 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    #tap-prompt:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.05);
    }

    /* Deck (visual stack at bottom-center) */
    #deck {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 170px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #deck .deck-card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      background-color: #b71c1c;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.06) 5px, rgba(255,255,255,0.06) 10px),
        repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(255,255,255,0.06) 5px, rgba(255,255,255,0.06) 10px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Card Table */
    #card-table {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Card */
    .card {
      position: absolute;
      width: 120px;
      height: 170px;
      perspective: 800px;
      cursor: pointer;
      z-index: 1;
      opacity: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      will-change: transform, opacity;
      transition: opacity 0.3s ease;
    }

    .card.dealt {
      opacity: 1;
    }

    .card.dealt:not(.revealed):hover {
      z-index: 10;
    }

    .card.dealt:not(.revealed):hover .card-inner {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.4));
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s ease, filter 0.2s ease;
      border-radius: 10px;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.flipped:not(.revealed):hover .card-inner {
      transform: rotateY(180deg) translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.4));
    }

    .card-back, .card-front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      overflow: hidden;
    }

    /* Card Back — classic playing card design */
    .card-back {
      background-color: #b71c1c;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 7px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 8px),
        repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 8px);
    }

    .card-back::after {
      content: '?';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      color: rgba(255,255,255,0.25);
    }

    /* Card Front */
    .card-front {
      transform: rotateY(180deg);
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .card-logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .card-logo-fallback {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: #333;
      line-height: 1.3;
      margin-top: 8px;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .card-venue {
      font-size: 9px;
      color: #999;
      margin-top: 3px;
      text-align: center;
    }

    /* Backdrop */
    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #backdrop.visible {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    /* Revealed card */
    .card.revealed {
      z-index: 1000;
      cursor: default;
    }

    /* Re-deal button */
    #redeal-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      display: none;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      background: #e74c3c;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      font-family: inherit;
    }

    #redeal-btn:hover {
      background: #c0392b;
      transform: translateX(-50%) scale(1.05);
    }

    /* Dimmed state for non-selected cards */
    .card.dimmed {
      opacity: 0.25;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .card {
        width: 90px;
        height: 127px;
      }

      .card-logo, .card-logo-fallback {
        width: 50px;
        height: 50px;
      }

      .card-logo-fallback { font-size: 22px; }
      .card-title { font-size: 9px; }
      .card-venue { font-size: 8px; }
      .card-back::after { font-size: 32px; }

      #deck {
        width: 90px;
        height: 127px;
        bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Shuffling the deck...</p>
    <div id="tap-prompt">Tap to Deal</div>
  </div>

  <div id="deck">
    <div class="deck-card" style="top: -4px; left: -2px;"></div>
    <div class="deck-card" style="top: -2px; left: -1px;"></div>
    <div class="deck-card" style="top: 0; left: 0;"></div>
  </div>

  <div id="card-table"></div>

  <div id="backdrop"></div>

  <button id="redeal-btn">Deal Again</button>

  <script src="data.js"></script>
  <script>
    // ========================================
    // Configuration
    // ========================================
    const CONFIG = {
      DEAL_STAGGER: 90,
      DEAL_ANIM_MS: 500,
      FLIP_MS: 600,
      MIN_ROT: -15,
      MAX_ROT: 15,
      GRID_PADDING: 20,
      CELL_JITTER: 0.3,
    };

    // ========================================
    // Sound Synthesis (Web Audio API)
    // ========================================
    let audioCtx = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playDealSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const dur = 0.04;
      const sr = audioCtx.sampleRate;
      const len = Math.floor(sr * dur);
      const buf = audioCtx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / len);
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 3000;
      filter.Q.value = 1.5;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      src.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      src.start(now);
      src.stop(now + dur);
    }

    function playFlipSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const dur = 0.15;
      const sr = audioCtx.sampleRate;
      const len = Math.floor(sr * dur);
      const buf = audioCtx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(500, now);
      filter.frequency.exponentialRampToValueAtTime(4000, now + 0.1);
      filter.Q.value = 2;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.2, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      src.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      src.start(now);
      src.stop(now + dur);
    }

    function playRevealSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      [523.25, 659.25].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const gain = audioCtx.createGain();
        const t = i * 0.12;
        gain.gain.setValueAtTime(0, now + t);
        gain.gain.linearRampToValueAtTime(0.15, now + t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + t + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + t);
        osc.stop(now + t + 0.4);
      });
    }

    // ========================================
    // Card Placement Algorithm
    // ========================================
    function getCardSize() {
      return window.innerWidth <= 600
        ? { w: 90, h: 127 }
        : { w: 120, h: 170 };
    }

    function computeMaxCards() {
      const { w: cardW, h: cardH } = getCardSize();
      const pad = CONFIG.GRID_PADDING;
      const usableW = window.innerWidth - pad * 2 - cardW;
      const usableH = window.innerHeight - pad * 2 - cardH - 50;
      const maxCols = Math.floor(usableW / (cardW * 1.05));
      const maxRows = Math.floor(usableH / (cardH * 1.05));
      return Math.max(1, maxCols * maxRows);
    }

    function computePositions(count) {
      const { w: cardW, h: cardH } = getCardSize();
      const pad = CONFIG.GRID_PADDING;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const usableW = vw - pad * 2 - cardW;
      const usableH = vh - pad * 2 - cardH - 50;

      const targetRatio = cardW / cardH;
      let bestCols = 5, bestRows = 4, bestScore = Infinity;

      for (let cols = 2; cols <= count; cols++) {
        const rows = Math.ceil(count / cols);
        const cellW = usableW / cols;
        const cellH = usableH / rows;
        if (cellW < cardW * 1.05 || cellH < cardH * 1.05) continue;
        const score = Math.abs((cellW / cellH) - targetRatio);
        if (score < bestScore) {
          bestScore = score;
          bestCols = cols;
          bestRows = rows;
        }
      }

      const cellW = usableW / bestCols;
      const cellH = usableH / bestRows;
      const gridW = bestCols * cellW;
      const gridH = bestRows * cellH;
      const offsetX = (vw - cardW - gridW) / 2;
      const offsetY = (vh - cardH - 50 - gridH) / 2;
      const positions = [];
      let idx = 0;

      for (let r = 0; r < bestRows && idx < count; r++) {
        for (let c = 0; c < bestCols && idx < count; c++) {
          const cx = offsetX + c * cellW + cellW / 2;
          const cy = offsetY + r * cellH + cellH / 2;
          const jx = (Math.random() - 0.5) * cellW * CONFIG.CELL_JITTER;
          const jy = (Math.random() - 0.5) * cellH * CONFIG.CELL_JITTER;
          const rot = CONFIG.MIN_ROT + Math.random() * (CONFIG.MAX_ROT - CONFIG.MIN_ROT);

          positions.push({
            x: Math.round(cx + jx - cardW / 2),
            y: Math.round(cy + jy - cardH / 2),
            rotation: Math.round(rot * 10) / 10,
          });
          idx++;
        }
      }

      // Shuffle so dealing order is random
      for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }

      return positions;
    }

    // ========================================
    // Card DOM Creation
    // ========================================
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function createCard(shop, pos, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = index;

      const logoSrc = shop.logo || '';
      const initial = (shop.title || '?').charAt(0).toUpperCase();
      const safeName = escapeHtml(shop.title || 'Unknown');
      const safeVenue = escapeHtml(shop.venue || '');

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-back"></div>
          <div class="card-front">
            ${logoSrc
              ? `<img class="card-logo" src="${logoSrc}" alt="${safeName}"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
              : ''}
            <div class="card-logo-fallback" style="display:${logoSrc ? 'none' : 'flex'}">${initial}</div>
            <p class="card-title">${safeName}</p>
            <p class="card-venue">${safeVenue}</p>
          </div>
        </div>
      `;

      // Store final position data
      card._finalX = pos.x;
      card._finalY = pos.y;
      card._finalRot = pos.rotation;

      return card;
    }

    // ========================================
    // Deal Animation
    // ========================================
    function getDeckOrigin() {
      const deck = document.getElementById('deck');
      const rect = deck.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
      };
    }

    function dealCards(shops, positions, table, stagger) {
      const { w: cardW, h: cardH } = getCardSize();
      const origin = getDeckOrigin();
      const cards = [];

      shops.forEach((shop, i) => {
        const card = createCard(shop, positions[i], i);
        table.appendChild(card);
        cards.push(card);

        // Start at deck position
        const startX = origin.x - cardW / 2;
        const startY = origin.y - cardH / 2;
        card.style.left = startX + 'px';
        card.style.top = startY + 'px';
        card.style.transform = 'rotate(0deg) scale(0.85)';

        // Animate to final position after stagger delay
        setTimeout(() => {
          playDealSound();
          card.style.transition = `left ${CONFIG.DEAL_ANIM_MS}ms cubic-bezier(0.22, 1, 0.36, 1),
                                   top ${CONFIG.DEAL_ANIM_MS}ms cubic-bezier(0.22, 1, 0.36, 1),
                                   transform ${CONFIG.DEAL_ANIM_MS}ms cubic-bezier(0.22, 1, 0.36, 1),
                                   opacity 0.15s ease`;
          card.classList.add('dealt');
          card.style.left = positions[i].x + 'px';
          card.style.top = positions[i].y + 'px';
          card.style.transform = `rotate(${positions[i].rotation}deg) scale(1)`;

          // Remove will-change after animation settles
          setTimeout(() => {
            card.style.willChange = 'auto';
            card.style.transition = 'opacity 0.3s ease';
          }, CONFIG.DEAL_ANIM_MS + 50);
        }, i * stagger);
      });

      return cards;
    }

    // ========================================
    // Card Interaction
    // ========================================
    let revealedCard = null;
    let isDealing = false;
    let currentCards = [];

    function setupInteraction(cards) {
      const backdrop = document.getElementById('backdrop');
      const redealBtn = document.getElementById('redeal-btn');

      cards.forEach(card => {
        card.addEventListener('click', () => {
          if (isDealing) return;
          if (card.classList.contains('flipped')) return;
          if (revealedCard) return;

          playFlipSound();
          card.classList.add('flipped');

          // Save original styles
          card._origLeft = card.style.left;
          card._origTop = card.style.top;
          card._origTransform = card.style.transform;

          // Move to center simultaneously with flip
          const { w: cardW, h: cardH } = getCardSize();
          const scale = window.innerWidth <= 600 ? 2.2 : 1.8;
          const cx = window.innerWidth / 2 - cardW / 2;
          const cy = window.innerHeight / 2 - cardH / 2;

          card.style.transition = 'left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
          card.style.left = cx + 'px';
          card.style.top = cy + 'px';
          card.style.transform = `rotate(0deg) scale(${scale})`;
          card.classList.add('revealed');

          backdrop.classList.add('visible');
          revealedCard = card;

          playRevealSound();

          // Dim other cards
          cards.forEach(c => {
            if (c !== card) c.classList.add('dimmed');
          });

          // Show re-deal button
          redealBtn.style.display = 'block';
        });
      });

      backdrop.addEventListener('click', () => dismiss(cards));
    }

    function dismiss(cards) {
      if (!revealedCard) return;
      const card = revealedCard;
      const backdrop = document.getElementById('backdrop');

      card.style.transition = 'left 0.4s ease, top 0.4s ease, transform 0.4s ease';
      card.style.left = card._origLeft;
      card.style.top = card._origTop;
      card.style.transform = card._origTransform;
      card.classList.remove('revealed');

      backdrop.classList.remove('visible');

      cards.forEach(c => c.classList.remove('dimmed'));

      revealedCard = null;
    }

    // ========================================
    // Initialization
    // ========================================
    let allShops = [];

    async function init() {
      const overlay = document.getElementById('loading-overlay');
      const spinnerEl = overlay.querySelector('.spinner');
      const loadingText = overlay.querySelector('p');
      const tapPrompt = document.getElementById('tap-prompt');
      const deck = document.getElementById('deck');
      const table = document.getElementById('card-table');
      const redealBtn = document.getElementById('redeal-btn');

      try {
        allShops = await loadFBShops();

        // Hide spinner, show tap prompt
        spinnerEl.style.display = 'none';
        loadingText.style.display = 'none';
        tapPrompt.style.display = 'block';

        tapPrompt.addEventListener('click', () => {
          initAudio();
          overlay.style.opacity = '0';
          overlay.style.pointerEvents = 'none';
          deck.style.opacity = '1';

          setTimeout(() => {
            overlay.style.display = 'none';
            startDeal(table, redealBtn);
          }, 400);
        }, { once: true });

      } catch (err) {
        console.error('Failed to load data:', err);
        spinnerEl.style.display = 'none';
        loadingText.textContent = 'Failed to load data. Ensure datas.json is served from the same origin.';
      }
    }

    function startDeal(table, redealBtn) {
      table.innerHTML = '';
      redealBtn.style.display = 'none';
      revealedCard = null;
      isDealing = true;

      const cardCount = Math.min(computeMaxCards(), allShops.length);
      const stagger = Math.min(CONFIG.DEAL_STAGGER, Math.max(30, 2000 / cardCount));
      const chosen = pickRandom(allShops, cardCount);
      const positions = computePositions(cardCount);
      const cards = dealCards(chosen, positions, table, stagger);
      currentCards = cards;

      const totalDealTime = cardCount * stagger + CONFIG.DEAL_ANIM_MS + 100;
      setTimeout(() => {
        isDealing = false;
        document.getElementById('deck').style.opacity = '0';
      }, totalDealTime);

      setupInteraction(cards);

      redealBtn.addEventListener('click', () => {
        document.getElementById('backdrop').classList.remove('visible');
        document.getElementById('deck').style.opacity = '1';
        setTimeout(() => startDeal(table, redealBtn), 300);
      });
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (isDealing || currentCards.length === 0) return;
        const { w: cardW, h: cardH } = getCardSize();
        const positions = computePositions(currentCards.length);
        currentCards.forEach((card, i) => {
          if (card.classList.contains('revealed')) return;
          card._finalX = positions[i].x;
          card._finalY = positions[i].y;
          card._finalRot = positions[i].rotation;
          card._origLeft = positions[i].x + 'px';
          card._origTop = positions[i].y + 'px';
          card._origTransform = `rotate(${positions[i].rotation}deg) scale(1)`;
          card.style.transition = 'left 0.4s ease, top 0.4s ease, transform 0.4s ease';
          card.style.left = positions[i].x + 'px';
          card.style.top = positions[i].y + 'px';
          card.style.transform = `rotate(${positions[i].rotation}deg) scale(1)`;
        });
      }, 150);
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
